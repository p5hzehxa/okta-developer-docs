    WebAuthnSettingEnableAutofillUI:
      type: boolean
      description: Enables the passkeys autofill UI to display available WebAuthn discoverable credentials ("resident key") from the Sign-In Widget username field
      default: false
      x-okta-lifecycle:
        features:
          - WEBAUTHN_AUTOFILL_UI
          - PASSKEYS_REBRAND
    WebAuthnSettingResidentKeyRequirement:
      description: |-
        Resident key requirement setting. Okta recommends using only `REQUIRED` or `DISCOURAGED` to make the requirement preference explicit. Using `PREFERRED` can sometimes lead to unpredictable behavior depending on the client platform and authenticator capabilities.

        > **Note:** This setting is only available when you have enabled the **Passkeys Rebrand** feature. See [Enable self-service features](https://help.okta.com/okta_help.htm?id=ext_Manage_Early_Access_features).
      type: string
      enum:
        - DISCOURAGED
        - PREFERRED
        - REQUIRED
      x-enumDescriptions:
        DISCOURAGED: The authenticator is requested to create a server-side credential, but may create a client-side discoverable credential at its discretion.
        PREFERRED: The authenticator is requested to create a client-side discoverable credential, but may create a server-side non-discoverable credential at its discretion.
        REQUIRED: The authenticator is required to create a client-side discoverable credential, and the operation fails if the authenticator is unable to do so.
      x-okta-lifecycle:
        features:
          - PASSKEYS_REBRAND
    WebAuthnSettingShowSignInWithAPasskeyButton:
      type: boolean
      description: |-
        Indicates if the **Sign in with a Passkey** button on the Sign-In Widget is shown.

         > **Note:** This setting is only available when you have enabled the **Passkeys Rebrand** feature. See [Enable self-service features](https://help.okta.com/okta_help.htm?id=ext_Manage_Early_Access_features).
      default: false
      x-okta-lifecycle:
        features:
          - PASSKEYS_REBRAND
    WebAuthnSettingCertBasedAttestationValidation:
      type: boolean
      description: |-
        Indicates whether certificate-based attestation validation is enabled. When enabled, the authenticator's attestation certificate is validated against known root certificates (custom AAGUIDs with associated certificates or the [FIDO Metadata Service](https://fidoalliance.org/metadata/)) to ensure its validity.

        > **Note:** This setting is only available when you have enabled the **Passkeys Rebrand** feature. See [Enable self-service features](https://help.okta.com/okta_help.htm?id=ext_Manage_Early_Access_features).
      default: false
      x-okta-lifecycle:
        features:
          - PASSKEYS_REBRAND
    WebAuthnSettingHardwareProtected:
      type: boolean
      description: |-
        Indicates whether the authenticator is required to store the private key on a hardware component

        > **Note:** This setting is only available when you have enabled the **Passkeys Rebrand** feature. See [Enable self-service features](https://help.okta.com/okta_help.htm?id=ext_Manage_Early_Access_features).
      default: false
      x-okta-lifecycle:
        features:
          - PASSKEYS_REBRAND
    WebAuthnSettingFipsCompliant:
      type: boolean
      description: |-
        Indicates whether the authenticator is required to be [Federal Information Processing Standards (FIPS)](https://csrc.nist.gov/glossary/term/federal_information_processing_standard) compliant

        > **Note:** This setting is only available when you have enabled the **Passkeys Rebrand** feature. See [Enable self-service features](https://help.okta.com/okta_help.htm?id=ext_Manage_Early_Access_features).
      default: false
      x-okta-lifecycle:
        features:
          - PASSKEYS_REBRAND
    WebAuthnSettingAllowSyncablePasskeys:
      type: boolean
      description: |-
        Indicates whether syncable passkeys are allowed. When enabled, users can register passkeys that are synchronized across their devices by using platform-specific mechanisms (such as iCloud Keychain for Apple devices or Google Password Manager for Android devices).

        > **Note:** This setting is only available when you have enabled the **Passkeys Rebrand** feature. See [Enable self-service features](https://help.okta.com/okta_help.htm?id=ext_Manage_Early_Access_features).
      default: true
      x-okta-lifecycle:
        features:
          - PASSKEYS_REBRAND
  securitySchemes:
    $ref: ../../base.yaml#/components/securitySchemes
