              $ref: '#/components/examples/AuthenticatorRequestWebAuthnWithNameAndDescription'
      required: true
  responses:
    AuthenticatorResponse:
      description: OK
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/AuthenticatorBase'
          examples:
            Duo:
              $ref: '#/components/examples/AuthenticatorResponseDuo'
