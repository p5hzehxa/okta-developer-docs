  /api/v1/authorizationServers/{authServerId}/clients:
    parameters:
      - $ref: '#/components/parameters/pathAuthServerId'
    get:
      summary: List all client resources for an authorization server
      description: |-
        Lists all client resources for which the specified authorization server has tokens.

        > **Note:** To list a specific user's client resources for which they have tokens or grants, use the [List all clients endpoint in the User Resources API](/openapi/okta-management/management/userresources/listuserclients).
      operationId: listOAuth2ClientsForAuthorizationServer
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: ./apps.yaml#/components/schemas/OAuth2Client
              examples:
                ListClients:
                  $ref: '#/components/examples/ListClientsResponse'
        '403':
          $ref: ./Common.yaml#/components/responses/ErrorAccessDenied403
        '404':
          $ref: ./Common.yaml#/components/responses/ErrorResourceNotFound404
        '429':
          $ref: ./Common.yaml#/components/responses/ErrorTooManyRequests429
