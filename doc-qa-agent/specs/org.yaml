            application/json:
              schema:
                $ref: '#/components/schemas/ClientPrivilegesSetting'
        '403':
          $ref: ./Common.yaml#/components/responses/ErrorAccessDenied403
        '429':
          $ref: ./Common.yaml#/components/responses/ErrorTooManyRequests429
      security:
        - apiToken: []
        - oauth2:
            - okta.orgs.manage
      tags:
        - OrgSettingAdmin
    x-okta-team-detail:
      x-team-slack: eng-ace
  /api/v1/org/settings/autoAssignAdminAppSetting:
