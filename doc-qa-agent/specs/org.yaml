  /api/v1/org/privacy/oktaSupport/cases/{caseNumber}:
    parameters:
      - $ref: '#/components/parameters/caseNumber'
    patch:
      summary: Update an Okta Support case
      description: |-
        Updates access to the org for an Okta Support case:

        * You can enable, disable, or extend access to your org for an Okta Support case.

        * You can approve Okta Support access to your org for self-assigned cases. A self-assigned case is created and assigned by the same Okta Support user.
      operationId: updateOktaSupportCase
      x-okta-iam-permissions:
        - okta.support.cases.manage
      x-okta-iam-admin-roles:
        - SUPER_ADMIN
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/OktaSupportCase'
            examples:
              AllowOktaSupportAccessStatus:
                $ref: '#/components/examples/AllowOktaSupportAccessStatusRequest'
              ExtendOktaSupportAccessStatus:
                $ref: '#/components/examples/ExtendOktaSupportAccessStatusRequest'
              RevokeOktaSupportAccessStatus:
                $ref: '#/components/examples/RevokeOktaSupportAccessStatusRequest'
              AllowSelfAssigned:
                $ref: '#/components/examples/AllowSelfAssignedRequest'
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OktaSupportCase'
              examples:
                AllowOktaSupportAccessStatus:
                  $ref: '#/components/examples/AllowOktaSupportAccessStatus'
                ExtendOktaSupportAccessStatus:
                  $ref: '#/components/examples/ExtendOktaSupportAccessStatus'
                RevokeOktaSupportAccessStatus:
                  $ref: '#/components/examples/RevokeOktaSupportAccessStatus'
                AllowSelfAssigned:
                  $ref: '#/components/examples/AllowSelfAssigned'
        '403':
          $ref: ./Common.yaml#/components/responses/ErrorAccessDenied403
        '429':
          $ref: ./Common.yaml#/components/responses/ErrorTooManyRequests429
      security:
        - apiToken: []
        - oauth2:
            - okta.orgs.manage
      tags:
        - OrgSettingSupport
    x-okta-team-detail:
      x-team-slack: eng-ace
  /api/v1/org/privacy/oktaSupport/extend:
    post:
      deprecated: true
      summary: Extend Okta Support access
      description: |-
        Extends the length of time that Okta Support can access your org by 24 hours. This means that 24 hours are added to the remaining access time.

        > **Note:** This resource is deprecated. Use the [Update an Okta Support case](/openapi/okta-management/management/tags/orgsettingsupport/other/updateoktasupportcase) resource to extend Okta Support access for a support case.
        > For the corresponding Okta Admin Console feature, see [Give access to Okta Support](https://help.okta.com/okta_help.htm?type=oie&id=settings-support-access).
      operationId: extendOktaSupport
      x-okta-iam-admin-roles:
        - SUPER_ADMIN
      parameters: []
      responses:
        '301':
          description: Moved Permanently
      security:
        - apiToken: []
