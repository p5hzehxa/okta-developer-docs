              url: /idp/idx/authenticators/poll
          legacyEventType: core.user_auth.login_success
          transaction:
            type: WEB
            id: ab609228fe84ce59cdcbfa690bgce016
            detail:
          uuid: dc9fd3c0-598c-11ef-8478-2b7584bf8d5a
          version: 0
          request:
            ipChain:
              -
                ip: 10.0.0.1
                geographicalContext:
                  city: New York
                  state: New York
                  country: United States
                  postalCode: 10013
                  geolocation:
                    lat: 40.3157
                    lon: -74.01
                version: V4
