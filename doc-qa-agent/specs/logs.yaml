            device_integrator: null
            disk_encryption_type: ALL_INTERNAL_VOLUMES
            screen_lock_type: BIOMETRIC
            jailbreak: null
            secure_hardware_present: true
          authenticationContext:
            authenticationProvider: null
            credentialProvider: null
            credentialType: null
            issuer: null
            interface: null
            authenticationStep: 0
            rootSessionId: idxBager62CSveUkTxvgRtonA
            externalSessionId: idxBager62CSveUkTxvgRtonA
          displayMessage: User login to Okta
          eventType: user.session.start
          outcome:
            result: SUCCESS
            reason: null
          published: 2024-08-13T15:58:20.353Z
          securityContext: &ListLogs-securityContext-value
            asNumber: 394089
            asOrg: ASN 0000
            isp: google
            domain: null
