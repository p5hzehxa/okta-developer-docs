              os: Mac OS X
              browser: CHROME
            zone: null
            device: Computer
            id: null
            ipAddress: 10.0.0.1
            geographicalContext:
              city: New York
              state: New York
              country: United States
              postalCode: 10013
              geolocation:
                lat: 40.3157
                lon: -74.01
          device:
