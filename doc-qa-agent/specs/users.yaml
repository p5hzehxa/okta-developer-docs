openapi: 3.0.3
info:
  title: Users API
  version: 1.0.0
servers:
  - url: https://subdomain.okta.com
tags:
  $ref: ../base.yaml#/tags
paths:
  /api/v1/users/{id}/blocks:
    parameters:
      - $ref: '#/components/parameters/pathId'
    get:
      summary: List all user blocks
      description: Lists information about how the user is blocked from accessing their account
      operationId: listUserBlocks
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/UserBlock'
              examples:
                BlocksUnknownDevices:
                  $ref: '#/components/examples/ListUserBlocksUnknownDevicesResponse'
                BlocksAnyDevices:
                  $ref: '#/components/examples/ListUserBlocksAnyDevicesResponse'
        '403':
          $ref: ./Common.yaml#/components/responses/ErrorAccessDenied403
        '404':
          $ref: ./Common.yaml#/components/responses/ErrorResourceNotFound404
        '429':
          $ref: ./Common.yaml#/components/responses/ErrorTooManyRequests429
      security:
        - apiToken: []
        - oauth2:
            - okta.users.read
      tags:
        - User
    x-okta-team-detail:
      x-team-slack: amp-eng-authenticator-platform
  /api/v1/users/{userId}/roles:
    parameters:
      - $ref: '#/components/parameters/pathUserId'
    get:
      summary: List all user role assignments
      description: Lists all roles assigned to a user (identified by `userId`)
      operationId: listAssignedRolesForUser
      parameters:
        - $ref: ./roles.yaml#/components/parameters/pathQueryRoleExpand
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                type: array
                items:
                  oneOf:
                    - $ref: ./roles.yaml#/components/schemas/StandardRole
                    - $ref: ./roles.yaml#/components/schemas/CustomRole
                  discriminator:
                    propertyName: type
                    mapping:
                      API_ACCESS_MANAGEMENT_ADMIN: ./roles.yaml#/components/schemas/StandardRole
                      APP_ADMIN: ./roles.yaml#/components/schemas/StandardRole
                      GROUP_MEMBERSHIP_ADMIN: ./roles.yaml#/components/schemas/StandardRole
                      HELP_DESK_ADMIN: ./roles.yaml#/components/schemas/StandardRole
                      MOBILE_ADMIN: ./roles.yaml#/components/schemas/StandardRole
                      ORG_ADMIN: ./roles.yaml#/components/schemas/StandardRole
                      READ_ONLY_ADMIN: ./roles.yaml#/components/schemas/StandardRole
                      REPORT_ADMIN: ./roles.yaml#/components/schemas/StandardRole
                      SUPER_ADMIN: ./roles.yaml#/components/schemas/StandardRole
                      USER_ADMIN: ./roles.yaml#/components/schemas/StandardRole
                      WORKFLOWS_ADMIN: ./roles.yaml#/components/schemas/CustomRole
                      ACCESS_CERTIFICATIONS_ADMIN: ./roles.yaml#/components/schemas/CustomRole
                      ACCESS_REQUESTS_ADMIN: ./roles.yaml#/components/schemas/CustomRole
                      CUSTOM: ./roles.yaml#/components/schemas/CustomRole
              examples:
                Standard roles:
                  $ref: '#/components/examples/StandardRolesListResponse'
                Custom roles:
                  $ref: '#/components/examples/StandardAndCustomRolesListResponse'
                IAM-based standard roles:
                  $ref: '#/components/examples/IAMStandardRolesListResponse'
        '403':
          $ref: ./Common.yaml#/components/responses/ErrorAccessDenied403
        '404':
          $ref: ./Common.yaml#/components/responses/ErrorResourceNotFound404
        '429':
          $ref: ./Common.yaml#/components/responses/ErrorTooManyRequests429
      security:
        - apiToken: []
        - oauth2:
            - okta.roles.read
      tags:
        - RoleAssignmentAUser
    post:
      summary: Assign a user role
      description: |-
        Assigns a [standard role](/openapi/okta-management/guides/roles/#standard-roles) to a user.

        You can also assign a custom role to a user, but the preferred method to assign a custom role to a user is to create a binding between the custom role, the resource set, and the user. See [Create a role resource set binding](/openapi/okta-management/management/roledresourcesetbinding/createresourcesetbinding).

        > **Notes:**
        > * The request payload is different for standard and custom role assignments.
        > * For IAM-based standard role assignments, use the request payload for standard roles. However, the response payload for IAM-based role assignments is similar to the custom role's assignment response.
      operationId: assignRoleToUser
      parameters:
        - name: disableNotifications
          description: Setting this to `true` grants the user third-party admin status
          in: query
          schema:
            type: boolean
            default: false
      x-codegen-request-body-name: assignRoleRequest
      requestBody:
        content:
          application/json:
            schema:
              type: object
              x-okta-ignore-redocly-rules-for-sdk: true
              oneOf:
                - $ref: ./roles.yaml#/components/schemas/StandardRoleAssignmentSchema
                - $ref: ./roles.yaml#/components/schemas/CustomRoleAssignmentSchema
              discriminator:
                propertyName: type
                mapping:
                  API_ACCESS_MANAGEMENT_ADMIN: ./roles.yaml#/components/schemas/StandardRoleAssignmentSchema
                  APP_ADMIN: ./roles.yaml#/components/schemas/StandardRoleAssignmentSchema
                  GROUP_MEMBERSHIP_ADMIN: ./roles.yaml#/components/schemas/StandardRoleAssignmentSchema
                  HELP_DESK_ADMIN: ./roles.yaml#/components/schemas/StandardRoleAssignmentSchema
                  ORG_ADMIN: ./roles.yaml#/components/schemas/StandardRoleAssignmentSchema
                  READ_ONLY_ADMIN: ./roles.yaml#/components/schemas/StandardRoleAssignmentSchema
                  REPORT_ADMIN: ./roles.yaml#/components/schemas/StandardRoleAssignmentSchema
                  SUPER_ADMIN: ./roles.yaml#/components/schemas/StandardRoleAssignmentSchema
                  USER_ADMIN: ./roles.yaml#/components/schemas/StandardRoleAssignmentSchema
                  WORKFLOWS_ADMIN: ./roles.yaml#/components/schemas/StandardRoleAssignmentSchema
                  ACCESS_CERTIFICATIONS_ADMIN: ./roles.yaml#/components/schemas/StandardRoleAssignmentSchema
                  ACCESS_REQUESTS_ADMIN: ./roles.yaml#/components/schemas/StandardRoleAssignmentSchema
                  CUSTOM: ./roles.yaml#/components/schemas/CustomRoleAssignmentSchema
        required: true
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                type: object
                x-okta-ignore-redocly-rules-for-sdk: true
                oneOf:
                  - $ref: ./roles.yaml#/components/schemas/StandardRole
                  - $ref: ./roles.yaml#/components/schemas/CustomRole
                discriminator:
                  propertyName: type
                  mapping:
                    API_ACCESS_MANAGEMENT_ADMIN: ./roles.yaml#/components/schemas/StandardRole
                    APP_ADMIN: ./roles.yaml#/components/schemas/StandardRole
                    GROUP_MEMBERSHIP_ADMIN: ./roles.yaml#/components/schemas/StandardRole
                    HELP_DESK_ADMIN: ./roles.yaml#/components/schemas/StandardRole
                    ORG_ADMIN: ./roles.yaml#/components/schemas/StandardRole
                    READ_ONLY_ADMIN: ./roles.yaml#/components/schemas/StandardRole
                    REPORT_ADMIN: ./roles.yaml#/components/schemas/StandardRole
                    SUPER_ADMIN: ./roles.yaml#/components/schemas/StandardRole
                    USER_ADMIN: ./roles.yaml#/components/schemas/StandardRole
                    WORKFLOWS_ADMIN: ./roles.yaml#/components/schemas/CustomRole
                    ACCESS_CERTIFICATIONS_ADMIN: ./roles.yaml#/components/schemas/CustomRole
                    ACCESS_REQUESTS_ADMIN: ./roles.yaml#/components/schemas/CustomRole
                    CUSTOM: ./roles.yaml#/components/schemas/CustomRole
              examples:
                Standard roles:
                  $ref: '#/components/examples/StandardRoleResponseUser'
                Custom roles:
                  $ref: '#/components/examples/CustomRoleResponseUser'
                IAM-based standard roles:
                  $ref: '#/components/examples/IAMStandardRoleResponseUser'
        '400':
          $ref: ./Common.yaml#/components/responses/ErrorApiValidationFailed400
        '403':
          $ref: ./Common.yaml#/components/responses/ErrorAccessDenied403
        '404':
          $ref: ./Common.yaml#/components/responses/ErrorResourceNotFound404
        '429':
          $ref: ./Common.yaml#/components/responses/ErrorTooManyRequests429
      security:
        - apiToken: []
        - oauth2:
            - okta.roles.manage
      tags:
        - RoleAssignmentAUser
    x-okta-team-detail:
      x-team-slack: eng-dda
  /api/v1/users/{userId}/roles/{roleAssignmentId}:
    parameters:
      - $ref: '#/components/parameters/pathUserId'
      - $ref: '#/components/parameters/pathRoleAssignmentId'
    get:
      summary: Retrieve a user role assignment
      description: Retrieves a role assigned to a user (identified by `userId`). The `roleAssignmentId` parameter is the unique identifier for either a standard role assignment object or a custom role resource set binding object.
      operationId: getUserAssignedRole
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: ./roles.yaml#/components/schemas/StandardRole
                  - $ref: ./roles.yaml#/components/schemas/CustomRole
                discriminator:
                  propertyName: type
                  mapping:
                    API_ACCESS_MANAGEMENT_ADMIN: ./roles.yaml#/components/schemas/StandardRole
                    APP_ADMIN: ./roles.yaml#/components/schemas/StandardRole
                    GROUP_MEMBERSHIP_ADMIN: ./roles.yaml#/components/schemas/StandardRole
                    HELP_DESK_ADMIN: ./roles.yaml#/components/schemas/StandardRole
                    ORG_ADMIN: ./roles.yaml#/components/schemas/StandardRole
                    READ_ONLY_ADMIN: ./roles.yaml#/components/schemas/StandardRole
                    REPORT_ADMIN: ./roles.yaml#/components/schemas/StandardRole
                    SUPER_ADMIN: ./roles.yaml#/components/schemas/StandardRole
                    USER_ADMIN: ./roles.yaml#/components/schemas/StandardRole
                    WORKFLOWS_ADMIN: ./roles.yaml#/components/schemas/CustomRole
                    ACCESS_CERTIFICATIONS_ADMIN: ./roles.yaml#/components/schemas/CustomRole
                    ACCESS_REQUESTS_ADMIN: ./roles.yaml#/components/schemas/CustomRole
                    CUSTOM: ./roles.yaml#/components/schemas/CustomRole
              examples:
                Standard roles:
                  $ref: '#/components/examples/StandardRoleResponseUser'
                Custom roles:
                  $ref: '#/components/examples/CustomRoleResponseUser'
                IAM-based standard roles:
                  $ref: '#/components/examples/IAMStandardRoleResponseUser'
        '403':
          $ref: ./Common.yaml#/components/responses/ErrorAccessDenied403
        '404':
          $ref: ./Common.yaml#/components/responses/ErrorResourceNotFound404
        '429':
          $ref: ./Common.yaml#/components/responses/ErrorTooManyRequests429
      security:
        - apiToken: []
        - oauth2:
            - okta.roles.read
      tags:
        - RoleAssignmentAUser
    delete:
      summary: Unassign a user role
      description: Unassigns a role assignment (identified by `roleAssignmentId`) from a user (identified by `userId`)
      operationId: unassignRoleFromUser
      responses:
        '204':
          description: No Content
          content: {}
        '403':
          $ref: ./Common.yaml#/components/responses/ErrorAccessDenied403
        '404':
          $ref: ./Common.yaml#/components/responses/ErrorResourceNotFound404
        '429':
          $ref: ./Common.yaml#/components/responses/ErrorTooManyRequests429
      security:
        - apiToken: []
        - oauth2:
            - okta.roles.manage
      tags:
        - RoleAssignmentAUser
    x-okta-team-detail:
      x-team-slack: eng-dda
  /api/v1/users/{userId}/roles/{roleAssignmentId}/targets/catalog/apps:
    parameters:
      - $ref: '#/components/parameters/pathUserId'
      - $ref: '#/components/parameters/pathRoleAssignmentId'
    get:
      summary: List all admin role app targets
      description: Lists all app targets for an `APP_ADMIN` role assigned to a user. The response is a list that includes OIN-cataloged apps or app instances. The response payload for an app instance contains the `id` property, but an OIN-cataloged app payload doesn't.
      operationId: listApplicationTargetsForApplicationAdministratorRoleForUser
      parameters:
        - $ref: ./Common.yaml#/components/parameters/queryAfter
        - $ref: ./Common.yaml#/components/parameters/queryLimit
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: ./roles.yaml#/components/schemas/CatalogApplication
        '403':
          $ref: ./Common.yaml#/components/responses/ErrorAccessDenied403
        '404':
          $ref: ./Common.yaml#/components/responses/ErrorResourceNotFound404
        '429':
          $ref: ./Common.yaml#/components/responses/ErrorTooManyRequests429
      security:
        - apiToken: []
        - oauth2:
            - okta.roles.read
      tags:
        - RoleBTargetAdmin
    put:
      summary: Assign all apps as target to admin role
      description: Assigns all apps as target to an `APP_ADMIN` role
      operationId: assignAllAppsAsTargetToRoleForUser
      responses:
        '200':
          description: Success
          content: {}
        '403':
          $ref: ./Common.yaml#/components/responses/ErrorAccessDenied403
        '404':
          $ref: ./Common.yaml#/components/responses/ErrorResourceNotFound404
        '429':
          $ref: ./Common.yaml#/components/responses/ErrorTooManyRequests429
      security:
        - apiToken: []
        - oauth2:
            - okta.roles.manage
      tags:
        - RoleBTargetAdmin
    x-okta-team-detail:
      x-team-slack: eng-dda
  /api/v1/users/{userId}/roles/{roleAssignmentId}/targets/catalog/apps/{appName}:
    parameters:
      - $ref: '#/components/parameters/pathUserId'
      - $ref: '#/components/parameters/pathRoleAssignmentId'
      - $ref: ./oauth.yaml#/components/parameters/pathAppName
    put:
      summary: Assign an admin role app target
      description: |
        Assigns an OIN app target for an `APP_ADMIN` role assignment to an admin user. When you assign the first app target, you reduce the scope of the role assignment.
        The role no longer applies to all app targets, but applies only to the specified target.

        Assigning an OIN app target overrides any existing app instance targets of the OIN app.
        For example, if a user was assigned to administer a specific Facebook instance, a successful request to add an OIN app target with `facebook` for `appName` makes that user the admin for all Facebook instances.
      operationId: assignAppTargetToAdminRoleForUser
      responses:
        '204':
          description: No Content
          content: {}
        '403':
          $ref: ./Common.yaml#/components/responses/ErrorAccessDenied403
        '404':
          $ref: ./Common.yaml#/components/responses/ErrorResourceNotFound404
        '429':
          $ref: ./Common.yaml#/components/responses/ErrorTooManyRequests429
      security:
        - apiToken: []
        - oauth2:
            - okta.roles.manage
      tags:
        - RoleBTargetAdmin
    delete:
      summary: Unassign an admin role app target
      description: |
        Unassigns an OIN app target from an `APP_ADMIN` role assignment to an admin user.

        > **Note:** You can't remove the last OIN app target from a role assignment since this causes an exception.
        > If you need a role assignment that applies to all apps, delete the `APP_ADMIN` role assignment to the user and recreate a new one.
      operationId: unassignAppTargetFromAppAdminRoleForUser
      responses:
        '204':
          description: No Content
          content: {}
        '403':
          $ref: ./Common.yaml#/components/responses/ErrorAccessDenied403
        '404':
          $ref: ./Common.yaml#/components/responses/ErrorResourceNotFound404
        '429':
          $ref: ./Common.yaml#/components/responses/ErrorTooManyRequests429
      security:
        - apiToken: []
        - oauth2:
            - okta.roles.manage
      tags:
        - RoleBTargetAdmin
    x-okta-team-detail:
      x-team-slack: eng-dda
  /api/v1/users/{userId}/roles/{roleAssignmentId}/targets/catalog/apps/{appName}/{appId}:
    parameters:
      - $ref: '#/components/parameters/pathUserId'
      - $ref: '#/components/parameters/pathRoleAssignmentId'
      - $ref: ./oauth.yaml#/components/parameters/pathAppName
      - $ref: ./Common.yaml#/components/parameters/pathAppId
    put:
      summary: Assign an admin role app instance target
      description: |
        Assigns an app instance target to an `APP_ADMIN` role assignment to an admin user. When you assign the first OIN app or app instance target, you reduce the scope of the role assignment.
        The role no longer applies to all app targets, but applies only to the specified target.

        > **Note:** You can target a mixture of both OIN app and app instance targets, but can't assign permissions to manage all instances of an OIN app and then assign a subset of permission to the same OIN app.
        > For example, you can't specify that an admin has access to manage all instances of the Salesforce app and then also manage specific configurations of the Salesforce app.
      operationId: assignAppInstanceTargetToAppAdminRoleForUser
      responses:
        '204':
          description: No Content
          content: {}
        '403':
          $ref: ./Common.yaml#/components/responses/ErrorAccessDenied403
        '404':
          $ref: ./Common.yaml#/components/responses/ErrorResourceNotFound404
        '429':
          $ref: ./Common.yaml#/components/responses/ErrorTooManyRequests429
      security:
        - apiToken: []
        - oauth2:
            - okta.roles.manage
      tags:
        - RoleBTargetAdmin
    delete:
      summary: Unassign an admin role app instance target
      description: |-
        Unassigns an app instance target from an `APP_ADMIN` role assignment to an admin user.

        > **Note:** You can't remove the last app instance target from a role assignment since this causes an exception.
        > If you need a role assignment that applies to all apps, delete the `APP_ADMIN` role assignment and recreate a new one.
      operationId: unassignAppInstanceTargetFromAdminRoleForUser
      responses:
        '204':
          description: No Content
          content: {}
        '403':
          $ref: ./Common.yaml#/components/responses/ErrorAccessDenied403
        '404':
          $ref: ./Common.yaml#/components/responses/ErrorResourceNotFound404
        '429':
          $ref: ./Common.yaml#/components/responses/ErrorTooManyRequests429
      security:
        - apiToken: []
        - oauth2:
            - okta.roles.manage
      tags:
        - RoleBTargetAdmin
    x-okta-team-detail:
      x-team-slack: eng-dda
  /api/v1/users/{userId}/roles/{roleAssignmentId}/targets/groups:
    parameters:
      - $ref: '#/components/parameters/pathUserId'
      - $ref: '#/components/parameters/pathRoleAssignmentId'
    get:
      summary: List all admin role group targets
      description: |
        Lists all group targets for a `USER_ADMIN`, `HELP_DESK_ADMIN`, or `GROUP_MEMBERSHIP_ADMIN` role assignment to an admin user.
        If the role isn't scoped to specific group targets, an empty array `[]` is returned.
      operationId: listGroupTargetsForRole
      parameters:
        - $ref: ./Common.yaml#/components/parameters/queryAfter
        - $ref: ./Common.yaml#/components/parameters/queryLimit
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: ./groups.yaml#/components/schemas/Group
        '403':
          $ref: ./Common.yaml#/components/responses/ErrorAccessDenied403
        '404':
          $ref: ./Common.yaml#/components/responses/ErrorResourceNotFound404
        '429':
          $ref: ./Common.yaml#/components/responses/ErrorTooManyRequests429
      security:
        - apiToken: []
        - oauth2:
            - okta.roles.read
      tags:
        - RoleBTargetAdmin
    x-okta-team-detail:
      x-team-slack: eng-dda
  /api/v1/users/{userId}/roles/{roleAssignmentId}/targets/groups/{groupId}:
    parameters:
      - $ref: '#/components/parameters/pathUserId'
      - $ref: '#/components/parameters/pathRoleAssignmentId'
      - $ref: ./groups.yaml#/components/parameters/pathGroupId
    put:
      summary: Assign an admin role group target
      description: |
        Assigns a group target for a `USER_ADMIN`, `HELP_DESK_ADMIN`, or `GROUP_MEMBERSHIP_ADMIN` role assignment to an admin user.
        When you assign the first group target, you reduce the scope of the role assignment. The role no longer applies to all targets but applies only to the specified target.
      operationId: assignGroupTargetToUserRole
      responses:
        '204':
          description: No Content
          content: {}
        '403':
          $ref: ./Common.yaml#/components/responses/ErrorAccessDenied403
        '404':
          $ref: ./Common.yaml#/components/responses/ErrorResourceNotFound404
        '429':
          $ref: ./Common.yaml#/components/responses/ErrorTooManyRequests429
      security:
        - apiToken: []
        - oauth2:
            - okta.roles.manage
      tags:
        - RoleBTargetAdmin
    delete:
      summary: Unassign an admin role group target
      description: |
        Unassigns a group target from a `USER_ADMIN`, `HELP_DESK_ADMIN`, or `GROUP_MEMBERSHIP_ADMIN` role assignment to an admin user.

        > **Note:** You can't remove the last group target from a role assignment since this causes an exception.
        > If you need a role assignment that applies to all groups, delete the role assignment to the user and recreate a new one.
      operationId: unassignGroupTargetFromUserAdminRole
      responses:
        '204':
          description: No Content
          content: {}
        '403':
          $ref: ./Common.yaml#/components/responses/ErrorAccessDenied403
        '404':
          $ref: ./Common.yaml#/components/responses/ErrorResourceNotFound404
        '429':
          $ref: ./Common.yaml#/components/responses/ErrorTooManyRequests429
      security:
        - apiToken: []
        - oauth2:
            - okta.roles.manage
      tags:
        - RoleBTargetAdmin
    x-okta-team-detail:
      x-team-slack: eng-dda
  /api/v1/users/{userId}/roles/{roleIdOrEncodedRoleId}/targets:
    parameters:
      - $ref: '#/components/parameters/pathUserId'
      - $ref: '#/components/parameters/pathRoleIdOrEncodedRoleId'
    get:
      summary: Retrieve a role target by assignment type
      description: |
        Retrieves all role targets for an `APP_ADMIN`, `USER_ADMIN`, `HELP_DESK_ADMIN`, or `GROUP_MEMBERSHIP_ADMIN` role assignment to an admin user by user or group assignment type.
        If the role isn't scoped to specific group targets or any app targets, an empty array `[]` is returned.
      operationId: getRoleTargetsByUserIdAndRoleId
      parameters:
        - $ref: '#/components/parameters/assignmentType'
        - $ref: ./Common.yaml#/components/parameters/queryAfter
        - $ref: ./Common.yaml#/components/parameters/queryLimit
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/RoleTarget'
              examples:
                Group Target:
                  $ref: '#/components/examples/RoleTargetGroupResponse'
                App Target:
                  $ref: '#/components/examples/RoleTargetAppResponse'
                App Instance Target:
                  $ref: '#/components/examples/RoleTargetAppInstanceResponse'
        '403':
          $ref: ./Common.yaml#/components/responses/ErrorAccessDenied403
        '404':
          $ref: ./Common.yaml#/components/responses/ErrorResourceNotFound404
        '429':
          $ref: ./Common.yaml#/components/responses/ErrorTooManyRequests429
      security:
        - apiToken: []
        - oauth2:
            - okta.roles.read
      tags:
        - RoleBTargetAdmin
  /api/v1/users/{userId}/subscriptions:
    parameters:
      - $ref: '#/components/parameters/pathUserId'
    get:
      summary: List all subscriptions for a user
      description: Lists all subscriptions available to a specified user. Returns an `AccessDeniedException` message if requests are made for another user.
      operationId: listSubscriptionsUser
      parameters:
        - in: path
          name: userId
          required: true
          schema:
            type: string
            description: The unique ID of the user
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                items:
                  $ref: ./roles.yaml#/components/schemas/Subscription
                type: array
        '403':
          $ref: ./Common.yaml#/components/responses/ErrorAccessDenied403
        '404':
          description: Not Found
        '429':
          $ref: ./Common.yaml#/components/responses/ErrorTooManyRequests429
      security:
        - apiToken: []
        - oauth2:
            - okta.users.read
      tags:
        - Subscription
    x-okta-team-detail:
      x-team-slack: eng-dda
  /api/v1/users/{userId}/subscriptions/{notificationType}:
    parameters:
      - $ref: '#/components/parameters/pathUserId'
      - $ref: ./roles.yaml#/components/parameters/pathNotificationType
    get:
      summary: Retrieve a subscription for a user
      description: Retrieves a subscription by `notificationType` for a specified user. Returns an `AccessDeniedException` message if requests are made for another user.
      operationId: getSubscriptionsNotificationTypeUser
      parameters:
        - in: path
          name: userId
          required: true
          schema:
            type: string
            description: The unique ID of the user
        - $ref: ./roles.yaml#/components/parameters/pathNotificationType
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                $ref: ./roles.yaml#/components/schemas/Subscription
        '403':
          $ref: ./Common.yaml#/components/responses/ErrorAccessDenied403
        '404':
          description: Not Found
        '429':
          $ref: ./Common.yaml#/components/responses/ErrorTooManyRequests429
      security:
        - apiToken: []
        - oauth2:
            - okta.users.read
      tags:
        - Subscription
    x-okta-team-detail:
      x-team-slack: eng-dda
  /api/v1/users/{userId}/subscriptions/{notificationType}/subscribe:
    parameters:
      - $ref: '#/components/parameters/pathUserId'
