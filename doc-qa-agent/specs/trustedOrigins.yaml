openapi: 3.0.3
info:
  title: Trusted origins API
  version: 1.0.0
servers:
  - url: https://example.okta.com
tags:
  $ref: ../../base.yaml#/tags
paths:
  /api/v1/trustedOrigins:
    get:
      summary: List all trusted origins
      description: Lists all trusted origins
      operationId: listTrustedOrigins
      parameters:
        - name: q
          description: A search string that prefix matches against the `name` and `origin`
          in: query
          schema:
            type: string
        - name: filter
          description: |
            [Filter](https://developer.okta.com/docs/api/#filter) trusted origins with a supported expression for a subset of properties. You can filter on the following properties: `name`, `origin`, `status`, and `type` (type of scopes).
          in: query
          schema:
            type: string
          examples:
            By name:
              value: name eq "Example trusted origin"
        - name: after
          description: After cursor provided by a prior request
          in: query
          schema:
            type: string
        - name: limit
          description: Specifies the number of results
          in: query
          schema:
            type: integer
            format: int32
            default: 20
            maximum: 200
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/TrustedOrigin'
              examples:
                TrustedOriginsResponse:
                  $ref: '#/components/examples/TrustedOriginsResponse'
        '403':
          $ref: ../Common.yaml#/components/responses/ErrorAccessDenied403
        '429':
          $ref: ../Common.yaml#/components/responses/ErrorTooManyRequests429
      security:
        - apiToken: []
        - oauth2:
            - okta.trustedOrigins.read
      tags:
        - TrustedOrigin
    post:
      summary: Create a trusted origin
      description: Creates a trusted origin
      operationId: createTrustedOrigin
      x-codegen-request-body-name: trustedOrigin
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TrustedOriginWrite'
            examples:
              TrustedOriginBody:
                $ref: '#/components/examples/TrustedOriginBody'
              TrustedOriginBodyWithIframeEmbedding:
                $ref: '#/components/examples/TrustedOriginBodyWithIframeEmbedding'
              TrustedOriginBodyWithIframeEmbeddingSignIn:
                $ref: '#/components/examples/TrustedOriginBodyWithIframeEmbeddingSignIn'
        required: true
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TrustedOrigin'
              examples:
                TrustedOriginResponse:
                  $ref: '#/components/examples/TrustedOriginResponse'
                TrustedOriginResponseWithIframeEmbedding:
                  $ref: '#/components/examples/TrustedOriginResponseWithIframeEmbedding'
                TrustedOriginResponseWithIframeEmbeddingSignIn:
                  $ref: '#/components/examples/TrustedOriginResponseWithIframeEmbeddingSignIn'
        '400':
          $ref: ../Common.yaml#/components/responses/ErrorApiValidationFailed400
        '403':
          $ref: ../Common.yaml#/components/responses/ErrorAccessDenied403
        '429':
          $ref: ../Common.yaml#/components/responses/ErrorTooManyRequests429
      security:
        - apiToken: []
        - oauth2:
            - okta.trustedOrigins.manage
      tags:
        - TrustedOrigin
    x-okta-team-detail:
      x-team-slack: amp-eng-resource-insights
  /api/v1/trustedOrigins/{trustedOriginId}:
    parameters:
      - $ref: '#/components/parameters/pathTrustedOriginId'
    get:
      summary: Retrieve a trusted origin
      description: Retrieves a trusted origin
      operationId: getTrustedOrigin
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TrustedOrigin'
              examples:
                TrustedOriginResponse:
                  $ref: '#/components/examples/TrustedOriginResponse'
                TrustedOriginResponseWithIframeEmbedding:
                  $ref: '#/components/examples/TrustedOriginResponseWithIframeEmbedding'
                TrustedOriginResponseWithIframeEmbeddingSignIn:
                  $ref: '#/components/examples/TrustedOriginResponseWithIframeEmbeddingSignIn'
        '403':
          $ref: ../Common.yaml#/components/responses/ErrorAccessDenied403
        '404':
          $ref: ../Common.yaml#/components/responses/ErrorResourceNotFound404
        '429':
          $ref: ../Common.yaml#/components/responses/ErrorTooManyRequests429
      security:
        - apiToken: []
        - oauth2:
            - okta.trustedOrigins.read
      tags:
        - TrustedOrigin
    put:
      summary: Replace a trusted origin
      description: Replaces a trusted origin
      operationId: replaceTrustedOrigin
      x-codegen-request-body-name: trustedOrigin
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TrustedOrigin'
            examples:
              TrustedOriginPutBody:
                $ref: '#/components/examples/TrustedOriginPutBody'
              TrustedOriginPutBodyWithIframeEmbedding:
                $ref: '#/components/examples/TrustedOriginPutBodyWithIframeEmbedding'
        required: true
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TrustedOrigin'
              examples:
                TrustedOriginPutResponse:
                  $ref: '#/components/examples/TrustedOriginPutResponse'
                TrustedOriginPutResponseWithIFrameEmbedding:
                  $ref: '#/components/examples/TrustedOriginPutResponseWithIframeEmbedding'
        '400':
          $ref: ../Common.yaml#/components/responses/ErrorApiValidationFailed400
        '403':
          $ref: ../Common.yaml#/components/responses/ErrorAccessDenied403
        '404':
          $ref: ../Common.yaml#/components/responses/ErrorResourceNotFound404
        '429':
          $ref: ../Common.yaml#/components/responses/ErrorTooManyRequests429
      security:
        - apiToken: []
        - oauth2:
            - okta.trustedOrigins.manage
      tags:
        - TrustedOrigin
    delete:
      summary: Delete a trusted origin
      description: Deletes a trusted origin
      operationId: deleteTrustedOrigin
      responses:
        '204':
          description: Success
          content: {}
        '403':
          $ref: ../Common.yaml#/components/responses/ErrorAccessDenied403
        '404':
          $ref: ../Common.yaml#/components/responses/ErrorResourceNotFound404
        '429':
          $ref: ../Common.yaml#/components/responses/ErrorTooManyRequests429
      security:
        - apiToken: []
        - oauth2:
            - okta.trustedOrigins.manage
      tags:
        - TrustedOrigin
    x-okta-team-detail:
      x-team-slack: amp-eng-resource-insights
  /api/v1/trustedOrigins/{trustedOriginId}/lifecycle/activate:
    parameters:
      - $ref: '#/components/parameters/pathTrustedOriginId'
    post:
      summary: Activate a trusted origin
      description: Activates a trusted origin. Sets the `status` to `ACTIVE`.
      operationId: activateTrustedOrigin
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TrustedOrigin'
              examples:
                TrustedOriginResponse:
                  $ref: '#/components/examples/TrustedOriginResponse'
        '403':
          $ref: ../Common.yaml#/components/responses/ErrorAccessDenied403
        '404':
          $ref: ../Common.yaml#/components/responses/ErrorResourceNotFound404
        '429':
          $ref: ../Common.yaml#/components/responses/ErrorTooManyRequests429
      security:
        - apiToken: []
        - oauth2:
            - okta.trustedOrigins.manage
      tags:
        - TrustedOrigin
    x-okta-team-detail:
      x-team-slack: amp-eng-resource-insights
  /api/v1/trustedOrigins/{trustedOriginId}/lifecycle/deactivate:
    parameters:
      - $ref: '#/components/parameters/pathTrustedOriginId'
    post:
      summary: Deactivate a trusted origin
      description: Deactivates a trusted origin. Sets the `status` to `INACTIVE`.
      operationId: deactivateTrustedOrigin
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TrustedOrigin'
              examples:
                TrustedOriginInactiveResponse:
                  $ref: '#/components/examples/TrustedOriginInactiveResponse'
        '403':
          $ref: ../Common.yaml#/components/responses/ErrorAccessDenied403
        '404':
          $ref: ../Common.yaml#/components/responses/ErrorResourceNotFound404
        '429':
          $ref: ../Common.yaml#/components/responses/ErrorTooManyRequests429
      security:
        - apiToken: []
        - oauth2:
            - okta.trustedOrigins.manage
      tags:
        - TrustedOrigin
    x-okta-team-detail:
      x-team-slack: amp-eng-resource-insights
components:
  examples:
    TrustedOriginBody:
      summary: Trusted origin request body
      value:
        name: New trusted origin
        origin: http://example.com
        scopes:
          - type: CORS
          - type: REDIRECT
    TrustedOriginBodyWithIframeEmbedding:
      summary: Trusted origin request body with iFrame embedding (Okta End-User Dashboard and Okta sign-in page)
      description: |
        Creates a new trusted origin for iFrame embedding of an Okta resource within that origin. In this example, the type of Okta resource is both the Okta End-User Dashboard and the Okta sign-in page.
      value:
        name: New trusted origin
        origin: http://example.com
        scopes:
          - type: IFRAME_EMBED
            allowedOktaApps:
              - OKTA_ENDUSER
    TrustedOriginBodyWithIframeEmbeddingSignIn:
      summary: Trusted origin request body with iFrame embedding (Okta sign-in page)
      description: |
        Creates a new trusted origin for iFrame embedding of an Okta resource within that origin. In this example, the Okta resource is the Okta sign-in page.
      value:
        name: New trusted origin
        origin: http://example.com
        scopes:
          - type: IFRAME_EMBED
            allowedOktaApps: []
    TrustedOriginPutBody:
      summary: Trusted origin request body
      value:
        $ref: '#/components/examples/TrustedOriginPut'
    TrustedOriginPutBodyWithIframeEmbedding:
      summary: Trusted origin request body with iFrame embedding
      value:
        $ref: '#/components/examples/TrustedOriginPutWithIframeEmbedding'
    TrustedOriginPut:
      value:
        id: tosue7JvguwJ7U6kz0g3
        name: Updated Example trusted origin
        origin: http://updated.example.com
        scopes:
          - type: CORS
