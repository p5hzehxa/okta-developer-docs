        status: ACTIVE
        created: '2017-12-16T05:01:12.000Z'
        createdBy: 00ut5t92p6IEOi4bu0g3
        lastUpdated: '2017-12-16T05:01:12.000Z'
        lastUpdatedBy: 00ut5t92p6IEOi4bu0g3
        _links:
          self:
