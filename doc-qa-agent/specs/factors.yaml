openapi: 3.0.3
info:
  title: Factors API
  version: 1.0.0
servers:
  - url: https://example.okta.com
tags:
  $ref: ../../base.yaml#/tags
paths:
  /api/v1/users/{userId}/factors:
    parameters:
      - $ref: ../Common.yaml#/components/parameters/pathUserId
    get:
      summary: List all enrolled factors
      description: |-
        Lists all enrolled factors for the specified user that are included in the highest priority [authenticator enrollment policy](https://developer.okta.com/docs/api/openapi/okta-management/management/tags/policy/) that applies to the user.

        Only enrolled factors that are `REQUIRED` or `OPTIONAL` in the highest priority authenticator enrollment policy can be returned.

        > **Note:** When admins use this endpoint for other users, the authenticator enrollment policy that's evaluated can vary depending on how client-specific conditions are configured in the rules of an authenticator enrollment policy. The client-specific conditions of the admin's client are used during policy evaluation instead of the client-specific conditions of the user. This can affect which authenticator enrollment policy is evaluated and which factors are returned.
        >
        > For example, an admin in Europe lists all enrolled factors for a user in North America. The network zone of the admin's client (in Europe) is used during policy evaluation instead of the network zone of the user (in North America).
      operationId: listFactors
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/UserFactor'
              examples:
                ListFactorsResponse:
                  $ref: '#/components/examples/ListFactorsResults'
        '403':
          $ref: ../Common.yaml#/components/responses/ErrorAccessDenied403
        '404':
          $ref: ../Common.yaml#/components/responses/ErrorResourceNotFound404
        '429':
          $ref: ../Common.yaml#/components/responses/ErrorTooManyRequests429
      security:
        - apiToken: []
        - oauth2:
            - okta.users.read
      tags:
        - UserFactor
    post:
      summary: Enroll a factor
      operationId: enrollFactor
      description: |-
        Enrolls a supported factor for the specified user

        > **Notes:** 
        >   * All responses return the enrolled factor with a status of either `PENDING_ACTIVATION` or `ACTIVE`.
        >   * You can't use the Factors API to enroll Okta Fastpass (`signed_nonce`) for a user. See [Configure Okta Fastpass](https://help.okta.com/okta_help.htm?type=oie&id=ext-fp-configure).

        #### Additional SMS/Call factor information

        * **Rate limits**: Okta may return a `429 Too Many Requests` status code if you attempt to resend an SMS or a voice call challenge (OTP) within the same time window. The current [rate limit](https://developer.okta.com/docs/reference/rate-limits/) is one SMS/CALL challenge per phone number every 30 seconds.

        * **Existing phone numbers**: Okta may return a `400 Bad Request` status code if a user attempts to enroll with a different phone number when the user has an existing mobile phone or has an existing phone with voice call capability. A user can enroll only one mobile phone for `sms` and enroll only one voice call capable phone for `call` factor.

        #### Additional WebAuthn factor information

        * For detailed information on the WebAuthn standard, including an up-to-date list of supported browsers, see [webauthn.me](https://a0.to/webauthnme-okta-docs).

        * When you enroll a WebAuthn factor, the `activation` object in `_embedded` contains properties used to help the client to create a new WebAuthn credential for use with Okta. See the [WebAuthn spec for PublicKeyCredentialCreationOptions](https://www.w3.org/TR/webauthn/#dictionary-makecredentialoptions).

        #### Additional Custom TOTP factor information

        * The enrollment process involves passing both the `factorProfileId` and `sharedSecret` properties for a token.

        * A factor profile represents a particular configuration of the Custom TOTP factor. It includes certain properties that match the hardware token that end users possess, such as the HMAC algorithm, passcode length, and time interval. There can be multiple Custom TOTP factor profiles per org, but users can only enroll in one Custom TOTP factor. Admins can [create Custom TOTP factor profiles](https://help.okta.com/okta_help.htm?id=ext-mfa-totp) in the Admin Console. Then, copy the `factorProfileId` from the Admin Console into the API request.

        * <x-lifecycle class="oie"></x-lifecycle>
        For Custom TOTP enrollment, Okta automaticaly enrolls a user with a `token:software:totp` factor and the `push` factor if the user isn't currently enrolled with these factors.
      parameters:
        - name: updatePhone
          description: If `true`, indicates that you are replacing the currently registered phone number for the specified user. This parameter is ignored if the existing phone number is used by an activated factor.
          in: query
          schema:
            type: boolean
            default: false
        - name: templateId
          in: query
          description: ID of an existing custom SMS template. See the [SMS Templates API](../Template). This parameter is only used by `sms` factors. If the provided ID doesn't exist, the default template is used instead.
          schema:
            type: string
            example: cstk2flOtuCMDJK4b0g3
        - name: tokenLifetimeSeconds
          description: Defines how long the token remains valid
          in: query
          schema:
            type: integer
            format: int32
            minimum: 1
            maximum: 86400
            default: 300
          x-okta-added-version: 1.3.0
        - name: activate
          description: If `true`, the factor is immediately activated as part of the enrollment. An activation process isn't required. Currently auto-activation is supported by `sms`, `call`, `email` and `token:hotp` (Custom TOTP) factors.
          in: query
          schema:
            type: boolean
            default: false
          x-okta-added-version: 1.3.0
        - name: Accept-Language
          description: An ISO 639-1 two-letter language code that defines a localized message to send. This parameter is only used by `sms` factors. If a localized message doesn't exist or the `templateId` is incorrect, the default template is used instead.
          in: header
          schema:
            type: string
            example: fr
      x-codegen-request-body-name: body
      requestBody:
        description: Factor
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserFactor'
            examples:
              question:
                $ref: '#/components/examples/EnrollFactorQuestionRequest'
              sms:
                $ref: '#/components/examples/EnrollFactorSmsRequest'
              call:
                $ref: '#/components/examples/EnrollFactorCallRequest'
              token:software:totp:
                $ref: '#/components/examples/EnrollFactorOVTotpRequest'
              push:
                $ref: '#/components/examples/EnrollFactorOVPushRequest'
              google:
                $ref: '#/components/examples/EnrollFactorGoogleRequest'
              rsa_securId:
                $ref: '#/components/examples/EnrollFactorRsaSecurIdRequest'
              symantec_vip:
                $ref: '#/components/examples/EnrollFactorSymantecVipRequest'
              yubikey:
                $ref: '#/components/examples/EnrollFactorYubikeyRequest'
              email:
                $ref: '#/components/examples/EnrollFactorEmailRequest'
              u2f:
                $ref: '#/components/examples/EnrollFactorU2fRequest'
              webAuthn:
                $ref: '#/components/examples/EnrollFactorWebauthnRequest'
              customTotp:
                $ref: '#/components/examples/EnrollFactorCustomTotpRequest'
        required: true
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserFactor'
              examples:
                question:
                  $ref: '#/components/examples/EnrollFactorQuestionResponse'
                sms:
                  $ref: '#/components/examples/EnrollFactorSmsResponse'
                call:
                  $ref: '#/components/examples/EnrollFactorCallResponse'
                token:software:totp:
                  $ref: '#/components/examples/EnrollFactorOVTotpResponse'
                push:
                  $ref: '#/components/examples/EnrollFactorOVPushResponse'
                google:
                  $ref: '#/components/examples/EnrollFactorGoogleResponse'
                rsa_securId:
                  $ref: '#/components/examples/EnrollFactorRsaSecurIdResponse'
                symantec_vip:
                  $ref: '#/components/examples/EnrollFactorSymantecVipResponse'
                yubikey:
                  $ref: '#/components/examples/EnrollFactorYubikeyResponse'
                email:
                  $ref: '#/components/examples/EnrollFactorEmailResponse'
                u2f:
                  $ref: '#/components/examples/EnrollFactorU2fResponse'
                webAuthn:
                  $ref: '#/components/examples/EnrollFactorWebauthnResponse'
                customTotp:
                  $ref: '#/components/examples/EnrollFactorCustomTotpResponse'
        '400':
          $ref: ../Common.yaml#/components/responses/ErrorApiValidationFailed400
        '403':
          $ref: ../Common.yaml#/components/responses/ErrorAccessDenied403
        '404':
          $ref: ../Common.yaml#/components/responses/ErrorResourceNotFound404
        '429':
          $ref: ../Common.yaml#/components/responses/ErrorTooManyRequests429
      security:
        - apiToken: []
        - oauth2:
            - okta.users.manage
      tags:
        - UserFactor
    x-okta-team-detail:
      x-team-slack: amp-eng-authenticator-platform
  /api/v1/users/{userId}/factors/catalog:
    parameters:
      - $ref: ../Common.yaml#/components/parameters/pathUserId
    get:
      summary: List all supported factors
      description: |-
        Lists all the supported factors that can be enrolled for the specified user that are included in the highest priority [authenticator enrollment policy](https://developer.okta.com/docs/api/openapi/okta-management/management/tags/policy/) that applies to the user.

        Only factors that are `REQUIRED` or `OPTIONAL` in the highest priority authenticator enrollment policy can be returned.

        > **Note:** When admins use this endpoint for other users, the authenticator enrollment policy that's evaluated can vary depending on how client-specific conditions are configured in the rules of an authenticator enrollment policy. The client-specific conditions of the admin's client are used during policy evaluation instead of the client-specific conditions of the user. This can affect which authenticator enrollment policy is evaluated and which factors are returned.
        >
        > For example, an admin in Europe lists all supported factors for a user in North America. The network zone of the admin's client (in Europe) is used during policy evaluation instead of the network zone of the user (in North America).
      operationId: listSupportedFactors
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/UserFactorSupported'
              examples:
                List of supported factors:
                  $ref: '#/components/examples/SupportedFactorResults'
        '403':
          $ref: ../Common.yaml#/components/responses/ErrorAccessDenied403
        '404':
          $ref: ../Common.yaml#/components/responses/ErrorResourceNotFound404
        '429':
          $ref: ../Common.yaml#/components/responses/ErrorTooManyRequests429
      security:
        - apiToken: []
        - oauth2:
            - okta.users.read
      tags:
        - UserFactor
    x-okta-team-detail:
      x-team-slack: amp-eng-authenticator-platform
  /api/v1/users/{userId}/factors/questions:
    parameters:
      - $ref: ../Common.yaml#/components/parameters/pathUserId
    get:
      summary: List all supported security questions
      description: Lists all available security questions for the specified user
      operationId: listSupportedSecurityQuestions
      x-okta-no-scope-required: true
      responses:
        '200':
          description: Success
          content:
            application/json:
              example:
                - question: disliked_food
                  questionText: What is the food you least liked as a child?
                - question: name_of_first_plush_toy
                  questionText: What is the name of your first stuffed animal?
                - question: first_award
                  questionText: What did you earn your first medal or award for?
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/UserFactorSecurityQuestionProfile'
        '403':
          $ref: ../Common.yaml#/components/responses/ErrorAccessDenied403
        '404':
          $ref: ../Common.yaml#/components/responses/ErrorResourceNotFound404
        '429':
          $ref: ../Common.yaml#/components/responses/ErrorTooManyRequests429
      security:
        - apiToken: []
      tags:
        - UserFactor
    x-okta-team-detail:
      x-team-slack: amp-eng-authenticator-platform
  /api/v1/org/factors/yubikey_token/tokens:
    parameters:
      - name: after
        in: query
        description: Specifies the pagination cursor for the next page of tokens
        schema:
          type: string
      - name: expand
        in: query
        description: Embeds the [user](/openapi/okta-management/management/tags/user) resource if the YubiKey token is assigned to a user and `expand` is set to `user`
        schema:
          type: string
      - name: filter
        in: query
        description: The expression used to filter tokens
        schema:
          type: string
          enum:
            - profile.email
            - profile.serial
            - activated
            - user.id
            - created
            - status
            - lastVerified
      - name: forDownload
        in: query
        description: Returns tokens in a CSV to download instead of in the response. When you use this query parameter, the `limit` default changes to 1000.
        schema:
          type: boolean
          default: false
      - name: limit
        in: query
        description: Specifies the number of results per page
        schema:
          type: integer
          default: 20
          maximum: 200
      - name: sortBy
        in: query
        description: The value of how the tokens are sorted
        schema:
          type: string
          enum:
            - profile.email
            - profile.serial
            - activated
            - user.id
            - created
            - status
            - lastVerified
      - name: sortOrder
        in: query
        description: Specifies the sort order, either `ASC` or `DESC`
        schema:
          type: string
          enum:
            - ASC
            - DESC
    get:
      summary: List all YubiKey OTP tokens
      description: Lists all YubiKey OTP tokens
      operationId: listYubikeyOtpTokens
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/UserFactorYubikeyOtpToken'
              examples:
                ListYubikeyOptTokensResponse:
                  $ref: '#/components/examples/ListYubikeyOptTokensResponse'
        '403':
          $ref: ../Common.yaml#/components/responses/ErrorAccessDenied403
        '404':
          $ref: ../Common.yaml#/components/responses/ErrorResourceNotFound404
        '429':
          $ref: ../Common.yaml#/components/responses/ErrorTooManyRequests429
      security:
        - apiToken: []
        - oauth2:
            - okta.users.read
      tags:
        - UserFactor
    post:
      summary: Upload a YubiKey OTP seed
      description: Uploads a seed for a user to enroll a YubiKey OTP
      operationId: uploadYubikeyOtpTokenSeed
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                serialNumber:
                  type: string
                  description: The unique identifier assigned to each YubiKey device
                publicId:
                  type: string
                  description: The YubiKey's public ID
                privateId:
                  type: string
                  description: The YubiKey's private ID
                aesKey:
                  type: string
                  description: The cryptographic key used in the AES (Advanced Encryption Standard) algorithm to encrypt and decrypt the YubiKey OTP
            examples:
              uploadYubikeyOtpSeedRequest:
                $ref: '#/components/examples/UploadYubikeyTokenSeedRequest'
        required: true
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserFactorYubikeyOtpToken'
              examples:
                yubikeyToken:
                  $ref: '#/components/examples/UploadYubikeyTokenSeedResponse'
        '400':
          $ref: ../Common.yaml#/components/responses/ErrorApiValidationFailed400
        '403':
          $ref: ../Common.yaml#/components/responses/ErrorAccessDenied403
        '404':
          $ref: ../Common.yaml#/components/responses/ErrorResourceNotFound404
        '429':
          $ref: ../Common.yaml#/components/responses/ErrorTooManyRequests429
      security:
        - apiToken: []
        - oauth2:
            - okta.users.manage
      tags:
        - UserFactor
    x-okta-team-detail:
      x-team-slack: amp-eng-workforce-authenticators
  /api/v1/org/factors/yubikey_token/tokens/{tokenId}:
    parameters:
      - $ref: '#/components/parameters/yubikeyTokenId'
    get:
      summary: Retrieve a YubiKey OTP token
      description: Retrieves the specified YubiKey OTP token by `id`
      operationId: getYubikeyOtpTokenById
      parameters:
        - name: tokenId
          in: path
          required: true
          description: The YubiKey OTP token ID
          schema:
            type: string
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserFactorYubikeyOtpToken'
              examples:
                Token:
                  $ref: '#/components/examples/GetYubikeyOptTokenResponse'
        '403':
          $ref: ../Common.yaml#/components/responses/ErrorAccessDenied403
        '404':
          $ref: ../Common.yaml#/components/responses/ErrorResourceNotFound404
        '429':
          $ref: ../Common.yaml#/components/responses/ErrorTooManyRequests429
      security:
        - apiToken: []
        - oauth2:
            - okta.users.read
      tags:
        - UserFactor
    x-okta-team-detail:
      x-team-slack: amp-eng-workforce-authenticators
  /api/v1/users/{userId}/factors/{factorId}/resend:
    parameters:
      - $ref: ../Common.yaml#/components/parameters/pathUserId
      - $ref: '#/components/parameters/pathFactorId'
    post:
      summary: Resend a factor enrollment
      description: |-
        Resends an `sms`, `call`, or `email` factor challenge as part of an enrollment flow.

        For `call` and `sms` factors, Okta enforces a rate limit of one OTP challenge per device every 30 seconds. You can configure your `sms` and `call` factors to use a third-party telephony provider. See the [Telephony inline hook reference](https://developer.okta.com/docs/reference/telephony-hook/). Okta alternates between SMS providers with every resend request to ensure delivery of SMS and Call OTPs across different carriers.

        > **Note:** Resend operations aren't allowed after a factor exceeds the activation rate limit. See [Activate a factor](./#tag/UserFactor/operation/activateFactor).
      operationId: resendEnrollFactor
      parameters:
        - name: templateId
          in: query
          description: ID of an existing custom SMS template. See the [SMS Templates API](../Template). This parameter is only used by `sms` factors.
          schema:
            example: cstk2flOtuCMDJK4b0g3
            type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ResendUserFactor'
            examples:
              sms:
                value:
                  factorType: sms
                  provider: OKTA
                  profile:
                    phoneNumber: +1-555-415-1337
        required: true
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResendUserFactor'
              examples:
                sms:
                  $ref: '#/components/examples/EnrollFactorSmsResponse'
        '400':
          $ref: ../Common.yaml#/components/responses/ErrorApiValidationFailed400
        '403':
          $ref: ../Common.yaml#/components/responses/ErrorAccessDenied403
        '404':
          $ref: ../Common.yaml#/components/responses/ErrorResourceNotFound404
        '429':
          $ref: ../Common.yaml#/components/responses/ErrorTooManyRequests429
      security:
        - apiToken: []
        - oauth2:
            - okta.users.manage
      tags:
        - UserFactor
    x-okta-team-detail:
      x-team-slack: amp-eng-authenticator-platform
  /api/v1/users/{userId}/factors/{factorId}:
    parameters:
      - $ref: ../Common.yaml#/components/parameters/pathUserId
      - $ref: '#/components/parameters/pathFactorId'
    get:
      summary: Retrieve a factor
      description: Retrieves an existing factor for the specified user
      operationId: getFactor
      responses:
        '200':
          $ref: '#/components/responses/GetFactorResponse'
        '403':
          $ref: ../Common.yaml#/components/responses/ErrorAccessDenied403
        '404':
          $ref: ../Common.yaml#/components/responses/ErrorResourceNotFound404
        '429':
          $ref: ../Common.yaml#/components/responses/ErrorTooManyRequests429
      security:
        - apiToken: []
        - oauth2:
            - okta.users.read
      tags:
        - UserFactor
    delete:
      summary: Unenroll a factor
      description: |-
        Unenrolls an existing factor for the specified user. You can't unenroll a factor from a deactivated user. Unenrolling a factor allows the user to enroll a new factor.

        > **Note:** If you unenroll the `push` or the `signed_nonce` factors, Okta also unenrolls any other `totp`, `signed_nonce`, or Okta Verify `push` factors associated with the user.
      operationId: unenrollFactor
      parameters:
        - name: removeRecoveryEnrollment
          description: If `true`, removes the phone number as both a recovery method and a factor. This parameter is only used for the `sms` and `call` factors.
          in: query
          schema:
            type: boolean
            default: false
      responses:
        '204':
          description: No Content
          content: {}
        '403':
          $ref: ../Common.yaml#/components/responses/ErrorAccessDenied403
        '404':
          $ref: ../Common.yaml#/components/responses/ErrorResourceNotFound404
        '429':
          $ref: ../Common.yaml#/components/responses/ErrorTooManyRequests429
      security:
        - apiToken: []
        - oauth2:
            - okta.users.manage
      tags:
        - UserFactor
    x-okta-team-detail:
      x-team-slack: amp-eng-authenticator-platform
  /api/v1/users/{userId}/factors/{factorId}/lifecycle/activate:
    parameters:
      - $ref: ../Common.yaml#/components/parameters/pathUserId
      - $ref: '#/components/parameters/pathFactorId'
    post:
      summary: Activate a factor
      description: |-
        Activates a factor. Some factors (`call`, `email`, `push`, `sms`, `token:software:totp`, `u2f`, and `webauthn`) require activation to complete the enrollment process.

        Okta enforces a rate limit of five activation attempts within five minutes. After a user exceeds the rate limit, Okta returns an error message.

        > **Notes:** 
        > * If the user exceeds their SMS, call, or email factor activation rate limit, then an [OTP resend request](./#tag/UserFactor/operation/resendEnrollFactor) isn't allowed for the same factor.
        > * You can't use the Factors API to activate Okta Fastpass (`signed_nonce`) for a user. See [Configure Okta Fastpass](https://help.okta.com/okta_help.htm?type=oie&id=ext-fp-configure).
      operationId: activateFactor
      x-codegen-request-body-name: body
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserFactorActivateRequest'
            examples:
              token:software:totp:
                $ref: '#/components/examples/FactorPasscodeRequest'
              sms:
                $ref: '#/components/examples/FactorPasscodeRequest'
              call:
                $ref: '#/components/examples/FactorPasscodeRequest'
              email:
                $ref: '#/components/examples/FactorPasscodeRequest'
              u2f:
                $ref: '#/components/examples/ActivateFactorU2fRequest'
              webauthn:
                $ref: '#/components/examples/ActivateFactorWebauthnRequest'
        required: false
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserFactorActivateResponse'
              examples:
                token:software:totp:
                  $ref: '#/components/examples/ActivateFactorTotpResponse'
                sms:
                  $ref: '#/components/examples/ActivateFactorSmsResponse'
                call:
                  $ref: '#/components/examples/ActivateFactorCallResponse'
                push:
                  $ref: '#/components/examples/ActivateFactorPushResponse'
                email:
                  $ref: '#/components/examples/ActivateFactorEmailResponse'
                u2f:
                  $ref: '#/components/examples/ActivateFactorU2fResponse'
                webauthn:
                  $ref: '#/components/examples/ActivateFactorWebauthnResponse'
        '400':
          $ref: ../Common.yaml#/components/responses/ErrorApiValidationFailed400
        '403':
          $ref: ../Common.yaml#/components/responses/ErrorAccessDenied403
        '404':
          $ref: ../Common.yaml#/components/responses/ErrorResourceNotFound404
        '429':
          $ref: ../Common.yaml#/components/responses/ErrorTooManyRequests429
      security:
        - apiToken: []
        - oauth2:
            - okta.users.manage
      tags:
        - UserFactor
    x-okta-team-detail:
      x-team-slack: amp-eng-authenticator-platform
  /api/v1/users/{userId}/factors/{factorId}/transactions/{transactionId}:
    parameters:
      - $ref: ../Common.yaml#/components/parameters/pathUserId
      - $ref: '#/components/parameters/pathFactorId'
      - $ref: '#/components/parameters/pathTransactionId'
    get:
      summary: Retrieve a factor transaction status
      description: |-
        Retrieves the status of a `push` factor verification transaction

         > **Note:**
         > The response body for a number matching push challenge to an Okta Verify `push` factor enrollment is different from the response body of a standard push challenge. 
         > The number matching push challenge [response body](https://developer.okta.com/docs/api/openapi/okta-management/management/tags/userfactor/other/getfactortransactionstatus!c=200&path=1/_embedded&t=response) contains the correct answer for the challenge.
         > Use [Verify a factor](/openapi/okta-management/management/userfactor/verifyfactor) to configure which challenge is sent.
      operationId: getFactorTransactionStatus
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserFactorPushTransaction'
              examples:
                WAITING (with number matching challenge):
                  $ref: '#/components/examples/UserFactorVerifyPushTransactionWaitingNMC'
                WAITING:
                  $ref: '#/components/examples/UserFactorVerifyPushTransactionWaiting'
                SUCCESS:
                  $ref: '#/components/examples/UserFactorVerifyPushTransactionApproved'
                REJECTED:
                  $ref: '#/components/examples/UserFactorVerifyPushTransactionRejected'
                TIMEOUT:
                  $ref: '#/components/examples/UserFactorVerifyPushTransactionTimeout'
        '403':
          $ref: ../Common.yaml#/components/responses/ErrorAccessDenied403
        '404':
          $ref: ../Common.yaml#/components/responses/ErrorResourceNotFound404
        '429':
          $ref: ../Common.yaml#/components/responses/ErrorTooManyRequests429
      security:
        - apiToken: []
        - oauth2:
            - okta.users.read
      tags:
        - UserFactor
    x-okta-team-detail:
      x-team-slack: amp-eng-authenticator-platform
  /api/v1/users/{userId}/factors/{factorId}/verify:
    parameters:
      - $ref: ../Common.yaml#/components/parameters/pathUserId
      - $ref: '#/components/parameters/pathFactorId'
    post:
      summary: Verify a factor
      description: |-
        Verifies an OTP for a factor. Some factors (`call`, `email`, `push`, `sms`, `u2f`, and `webauthn`) must first issue a challenge before you can verify the factor. Do this by making a request without a body. After a challenge is issued, make another request to verify the factor.

        > **Notes:**
        > - You can send standard push challenges or number matching push challenges to Okta Verify `push` factor enrollments. Use a [request body](https://developer.okta.com/docs/api/openapi/okta-management/management/userfactor/verifyfactor!path=2/useNumberMatchingChallenge&t=request) for number matching push challenges. 
        > - To verify a `push` factor, use the **poll** link returned when you issue the challenge. See [Retrieve a factor transaction status](/openapi/okta-management/management/tags/userfactor/other/getfactortransactionstatus).
      operationId: verifyFactor
      parameters:
        - name: templateId
          description: ID of an existing custom SMS template. See the [SMS Templates API](../Template). This parameter is only used by `sms` factors.
          in: query
          schema:
            type: string
            example: cstk2flOtuCMDJK4b0g3
        - name: tokenLifetimeSeconds
          description: Defines how long the token remains valid
          in: query
          schema:
            type: integer
            format: int32
            minimum: 1
            maximum: 86400
            default: 300
          x-okta-added-version: 1.3.0
        - name: X-Forwarded-For
          description: Public IP address for the user agent
          in: header
          schema:
            type: string
          x-okta-added-version: 1.11.0
        - name: User-Agent
          description: Type of user agent detected when the request is made. Required to verify `push` factors.
          in: header
          schema:
            type: string
          x-okta-added-version: 1.11.0
        - name: Accept-Language
          description: An ISO 639-1 two-letter language code that defines a localized message to send. This parameter is only used by `sms` factors. If a localized message doesn't exist or the `templateId` is incorrect, the default template is used instead.
          in: header
          schema:
            type: string
            example: fr
      x-codegen-request-body-name: body
      requestBody:
        description: |-
          Verifies an OTP for a factor. Some factors (`call`, `email`, `push`, `sms`, `u2f`, and `webauthn`) must first issue a challenge before you can verify the factor. Do this by making a request without a body. After a challenge is issued, make another request to verify the factor.

          > **Note:**
          > Unlike standard push challenges that don't require a request body, a number matching [`push`](https://developer.okta.com/docs/api/openapi/okta-management/management/userfactor/verifyfactor!path=2/useNumberMatchingChallenge&t=request) challenge requires a request body. `useNumberMatchingChallenge` must be set to `true`.
          > When a number matching challenge is issued for an Okta Verify `push` factor enrollment, a `correctAnswer` challenge object is returned in the [`_embedded`](https://developer.okta.com/docs/api/openapi/okta-management/management/userfactor/verifyfactor!c=200&path=_embedded&t=response) object.
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserFactorVerifyRequest'
            examples:
              sms verify:
                $ref: '#/components/examples/FactorPasscodeRequest'
              call verify:
                $ref: '#/components/examples/FactorPasscodeRequest'
              push challenge with number matching:
                $ref: '#/components/examples/NumberMatchingChallengeRequest'
              email verify:
                $ref: '#/components/examples/FactorPasscodeRequest'
              u2f verify:
                $ref: '#/components/examples/UserFactorVerifyU2fRequest'
              webAuthn verify:
                $ref: '#/components/examples/UserFactorVerifyWebauthnRequest'
              security question verify:
                $ref: '#/components/examples/UserFactorVerifySecurityQuestionRequest'
              totp verify:
                $ref: '#/components/examples/FactorPasscodeRequest'
              token verify:
                $ref: '#/components/examples/FactorPasscodeRequest'
              yubikey verify:
                $ref: '#/components/examples/FactorPasscodeRequest'
        required: false
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserFactorVerifyResponse'
              examples:
                sms challenge:
                  $ref: '#/components/examples/UserFactorChallengeSmsResponse'
                sms verify:
                  $ref: '#/components/examples/UserFactorVerifySuccessSmsResponse'
                call challenge:
                  $ref: '#/components/examples/UserFactorChallengeCallResponse'
                call verify:
                  $ref: '#/components/examples/UserFactorVerifyCallSuccessResponse'
                email challenge:
                  $ref: '#/components/examples/UserFactorChallengeEmailResponse'
                email verify:
                  $ref: '#/components/examples/UserFactorVerifyEmailSuccessResponse'
                u2f challenge:
                  $ref: '#/components/examples/UserFactorChallengeU2fResponse'
                u2f verify:
                  $ref: '#/components/examples/UserFactorVerifyU2fResponse'
                webAuthn challenge:
                  $ref: '#/components/examples/UserFactorChallengeWebauthnResponse'
                webAuthn verify:
                  $ref: '#/components/examples/UserFactorVerifyWebauthnResponse'
                security question verify:
                  $ref: '#/components/examples/UserFactorVerifySuccessSqResponse'
                totp verify:
                  $ref: '#/components/examples/UserFactorVerifySuccessTotpResponse'
                token verify:
                  $ref: '#/components/examples/UserFactorVerifySuccessTokenResponse'
                yubikey verify:
                  $ref: '#/components/examples/UserFactorVerifySuccessYubikeyResponse'
        '201':
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserFactorVerifyResponseWaiting'
              examples:
                push challenge with number matching:
                  $ref: '#/components/examples/UserFactorChallengePushResponseWithNumberMatchingChallenge'
                push challenge:
                  $ref: '#/components/examples/UserFactorChallengePushResponse'
        '400':
          $ref: ../Common.yaml#/components/responses/ErrorApiValidationFailed400
        '403':
          $ref: ../Common.yaml#/components/responses/ErrorAccessDenied403
        '404':
          $ref: ../Common.yaml#/components/responses/ErrorResourceNotFound404
        '429':
          $ref: ../Common.yaml#/components/responses/ErrorTooManyRequests429
      security:
        - apiToken: []
        - oauth2:
            - okta.users.manage
      tags:
        - UserFactor
    x-okta-team-detail:
      x-team-slack: amp-eng-authenticator-platform
components:
  parameters:
    pathFactorId:
      name: factorId
      description: ID of an existing user factor
      in: path
      required: true
      schema:
        type: string
        example: zAgrsaBe0wVGRugDYtdv
    pathTransactionId:
      name: transactionId
      description: ID of an existing factor verification transaction
      in: path
      required: true
      schema:
        type: string
        example: gPAQcN3NDjSGOCAeG2Jv
    yubikeyTokenId:
      name: tokenId
      description: ID of a YubiKey token
      in: path
      required: true
      schema:
        type: string
        example: ykkxdtCA1fKVxyu6R0g3
  schemas:
    ResendUserFactor:
      type: object
      properties:
        factorType:
          description: Type of the factor
          type: string
          enum:
            - call
            - email
            - sms
      discriminator:
        propertyName: factorType
        mapping:
          call: '#/components/schemas/UserFactorCall'
          email: '#/components/schemas/UserFactorEmail'
          sms: '#/components/schemas/UserFactorSMS'
    UserFactor:
      type: object
      x-okta-ignore-redocly-rules-for-sdk: true
      properties:
        factorType:
          $ref: '#/components/schemas/UserFactorType'
        created:
          description: Timestamp when the factor was enrolled
          type: string
          format: date-time
          example: 2022-08-25T00:31:00.000Z
          readOnly: true
        id:
          description: ID of the factor
          type: string
          example: caf8m6jbcvUH8mAep1d7
          readOnly: true
        lastUpdated:
          description: Timestamp when the factor was last updated
          type: string
          format: date-time
          example: 2022-08-25T00:31:00.000Z
          readOnly: true
        provider:
          description: Provider for the factor. Each provider can support a subset of factor types.
          type: string
        profile:
          type: object
          x-okta-ignore-redocly-rules-for-sdk: true
          description: Specific attributes related to the factor
        status:
          $ref: '#/components/schemas/UserFactorStatus'
        vendorName:
          description: Name of the factor vendor. This is usually the same as the provider except for On-Prem MFA, which depends on admin settings.
          type: string
          example: OKTA
          readOnly: true
        _embedded:
          type: object
          additionalProperties:
            type: object
            properties: {}
          readOnly: true
        _links:
          $ref: '#/components/schemas/UserFactorLinks'
      discriminator:
        propertyName: factorType
        mapping:
          call: '#/components/schemas/UserFactorCall'
          email: '#/components/schemas/UserFactorEmail'
          push: '#/components/schemas/UserFactorPush'
          question: '#/components/schemas/UserFactorSecurityQuestion'
          sms: '#/components/schemas/UserFactorSMS'
          token: '#/components/schemas/UserFactorToken'
          token:hardware: '#/components/schemas/UserFactorTokenHardware'
          token:hotp: '#/components/schemas/UserFactorTokenHOTP'
          token:software:totp: '#/components/schemas/UserFactorTokenSoftwareTOTP'
          u2f: '#/components/schemas/UserFactorU2F'
          web: '#/components/schemas/UserFactorWeb'
          webauthn: '#/components/schemas/UserFactorWebAuthn'
    UserFactorProvider:
      type: string
      enum:
        - CUSTOM
        - DUO
        - FIDO
        - GOOGLE
        - OKTA
        - RSA
        - SYMANTEC
        - YUBICO
    UserFactorResultType:
      description: Result of a factor verification attempt
      type: string
      readOnly: true
      enum:
        - CANCELLED
        - CHALLENGE
        - ERROR
        - FAILED
        - PASSCODE_REPLAYED
        - REJECTED
        - SUCCESS
        - TIMEOUT
        - TIME_WINDOW_EXCEEDED
        - WAITING
    UserFactorStatus:
      example: ACTIVE
      description: Status of the factor
      type: string
      readOnly: true
      enum:
        - ACTIVE
        - DISABLED
        - ENROLLED
        - EXPIRED
        - INACTIVE
        - NOT_SETUP
        - PENDING_ACTIVATION
    UserFactorSupported:
      type: object
      x-okta-ignore-redocly-rules-for-sdk: true
      properties:
        enrollment:
          type: string
          description: Indicates if the factor is required for the specified user
          example: OPTIONAL
          enum:
            - OPTIONAL
            - REQUIRED
        factorType:
          $ref: '#/components/schemas/UserFactorType'
        provider:
          $ref: '#/components/schemas/UserFactorProvider'
        vendorName:
          description: Name of the factor vendor. This is usually the same as the provider except for On-Prem MFA, which depends on admin settings.
          type: string
          example: OKTA
          readOnly: true
        status:
          $ref: '#/components/schemas/UserFactorStatus'
        _links:
          $ref: '#/components/schemas/UserFactorLinks'
        _embedded:
          type: object
          description: Embedded resources related to the factor
          additionalProperties:
            type: object
            properties: {}
          readOnly: true
    UserFactorType:
      description: Type of factor
      type: string
      enum:
        - call
        - sms
        - email
        - question
        - push
        - token
        - token:hardware
        - token:hotp
        - token:software:totp
        - u2f
        - web
        - webauthn
        - signed_nonce
    UserFactorCall:
      title: call
      allOf:
        - $ref: '#/components/schemas/UserFactor'
        - type: object
          properties:
            factorType:
              example: call
            profile:
              $ref: '#/components/schemas/UserFactorCallProfile'
            provider:
              enum:
                - OKTA
    UserFactorCallProfile:
      type: object
      properties:
        phoneExtension:
          description: Extension of the associated `phoneNumber`
          type: string
          example: 1234
          nullable: true
          maxLength: 15
        phoneNumber:
          description: Phone number of the factor. Format phone numbers to use the [E.164 standard](https://www.itu.int/rec/T-REC-E.164/).
          example: '+15554151337'
          type: string
          pattern: ^\+[1-9]\d{1,14}$
          maxLength: 15
    UserFactorTokenHOTP:
      title: token:hotp
      allOf:
        - $ref: '#/components/schemas/UserFactor'
        - type: object
          properties:
            factorType:
              example: token:hotp
            factorProfileId:
              description: ID of an existing Custom TOTP factor profile. To create this, see [Custom TOTP factor](https://help.okta.com/okta_help.htm?id=ext-mfa-totp).
              type: string
            profile:
              $ref: '#/components/schemas/UserFactorTokenHOTPProfile'
            provider:
              enum:
                - CUSTOM
    UserFactorTokenHOTPProfile:
      type: object
      properties:
        sharedSecret:
          description: Unique secret key used to generate the OTP
          type: string
          example: 484f97be3213b117e3a20438e291540a
    UserFactorEmail:
      title: email
      allOf:
        - $ref: '#/components/schemas/UserFactor'
        - type: object
          properties:
            factorType:
              example: email
            profile:
              $ref: '#/components/schemas/UserFactorEmailProfile'
            provider:
              enum:
                - OKTA
    UserFactorEmailProfile:
      type: object
      properties:
        email:
          description: |-
            Email address of the user. This must be either the primary or secondary email address associated with the Okta user account.

            > **Note:** For Identity Engine orgs, you can only enroll the primary email address of the user.
          maxLength: 100
          example: z.cool@example.com
          type: string
    UserFactorTokenHardware:
      title: token:hardware
      allOf:
        - $ref: '#/components/schemas/UserFactor'
        - type: object
          properties:
            factorType:
              example: token:hardware
            profile:
              $ref: '#/components/schemas/UserFactorTokenProfile'
            provider:
              enum:
                - YUBICO
            verify:
              type: object
              properties:
                passCode:
                  description: OTP for the current time window
                  type: string
                  example: cccccceukngdfgkukfctkcvfidnetljjiknckkcjulji
    UserFactorPush:
      title: push
      allOf:
        - $ref: '#/components/schemas/UserFactor'
        - type: object
          properties:
            profile:
              $ref: '#/components/schemas/UserFactorPushProfile'
            provider:
              enum:
                - OKTA
    UserFactorPushProfile:
      type: object
      properties:
        credentialId:
          description: ID for the factor credential
          example: dade.murphy@example.com
          type: string
        deviceToken:
          description: Token used to identify the device
          example: fwf7ku6bsiSCieh6y1d7
          type: string
        deviceType:
          description: Type of device
          example: SmartPhone_IPhone
          type: string
        name:
          description: Name of the device
          example: My Phone
          type: string
        platform:
          description: OS version of the associated device
          example: IOS
          type: string
        version:
          description: Installed version of Okta Verify
          example: '9.0'
          type: string
    UserFactorPushTransaction:
      type: object
      x-okta-ignore-redocly-rules-for-sdk: true
      properties:
        factorResult:
          description: Result of the verification transaction
          type: string
          enum:
            - WAITING (with number matching challenge)
            - WAITING
            - SUCCESS
            - REJECTED
            - TIMEOUT
      discriminator:
        propertyName: factorResult
        mapping:
          WAITING: '#/components/schemas/UserFactorPushTransactionWaitingNoNMC'
          WAITING (with number matching challenge): '#/components/schemas/UserFactorPushTransactionWaitingNMC'
          SUCCESS: '#/components/schemas/UserFactorPushTransactionSuccess'
          REJECTED: '#/components/schemas/UserFactorPushTransactionRejected'
          TIMEOUT: '#/components/schemas/UserFactorPushTransactionTimeout'
    UserFactorPushTransactionRejected:
      allOf:
        - $ref: '#/components/schemas/UserFactorPushTransaction'
        - type: object
          properties:
            profile:
              type: object
              properties:
                credentialId:
                  description: ID for the factor credential
                  example: dade.murphy@example.com
                  type: string
            _links:
              allOf:
                - $ref: '#/components/schemas/LinksVerify'
                - type: object
                  properties:
                    factor:
                      $ref: '#/components/schemas/UserFactor'
    UserFactorPushTransactionSuccess:
      $ref: '#/components/schemas/UserFactorPushTransaction'
    UserFactorPushTransactionTimeout:
      allOf:
        - $ref: '#/components/schemas/UserFactorPushTransaction'
        - type: object
          properties:
            profile:
              type: object
              properties:
                credentialId:
                  description: ID for the factor credential
                  example: dade.murphy@example.com
                  type: string
            _links:
              allOf:
                - $ref: '#/components/schemas/LinksVerify'
                - type: object
                  properties:
                    factor:
                      $ref: '#/components/schemas/UserFactor'
    UserFactorPushTransactionWaitingNoNMC:
      allOf:
        - $ref: '#/components/schemas/UserFactorPushTransaction'
        - type: object
          properties:
            profile:
              type: object
              properties:
                credentialId:
                  description: ID for the factor credential
                  example: dade.murphy@example.com
                  type: string
            _links:
              allOf:
                - $ref: '#/components/schemas/LinksPoll'
                - $ref: '#/components/schemas/LinksCancel'
    UserFactorPushTransactionWaitingNMC:
      allOf:
        - $ref: '#/components/schemas/UserFactorPushTransaction'
        - type: object
          properties:
            profile:
              type: object
              properties:
                credentialId:
                  description: ID for the factor credential
                  example: dade.murphy@example.com
                  type: string
            _links:
              allOf:
                - $ref: '#/components/schemas/LinksPoll'
                - $ref: '#/components/schemas/LinksCancel'
            _embedded:
              $ref: '#/components/schemas/NumberFactorChallengeEmbeddedLinks'
    UserFactorSecurityQuestion:
      title: question
      allOf:
        - $ref: '#/components/schemas/UserFactor'
        - type: object
          properties:
            factorType:
              example: question
            profile:
              $ref: '#/components/schemas/UserFactorSecurityQuestionProfile'
            provider:
              enum:
                - OKTA
    UserFactorSecurityQuestionProfile:
      type: object
      properties:
        answer:
          description: Answer to the question
          minLength: 4
          type: string
          writeOnly: true
        question:
          description: Unique key for the question
          example: disliked_food
          enum:
            - disliked_food
            - name_of_first_plush_toy
            - first_award
            - favorite_security_question
            - favorite_toy
            - first_computer_game
            - favorite_movie_quote
            - first_sports_team_mascot
            - first_music_purchase
            - favorite_art_piece
            - grandmother_favorite_desert
            - first_thing_cooked
            - childhood_dream_job
            - first_kiss_location
            - place_where_significant_other_was_met
            - favorite_vacation_location
            - new_years_two_thousand
            - favorite_speaker_actor
            - favorite_book_movie_character
            - favorite_sports_player
          type: string
        questionText:
          description: Human-readable text that's displayed to the user
          example: What is the food you least liked as a child?
          type: string
          readOnly: true
    UserFactorSMS:
      title: sms
      allOf:
        - $ref: '#/components/schemas/UserFactor'
        - type: object
          properties:
            factorType:
              example: sms
            profile:
              $ref: '#/components/schemas/UserFactorSMSProfile'
            provider:
              enum:
                - OKTA
    UserFactorSMSProfile:
      type: object
      properties:
        phoneNumber:
          description: Phone number of the factor. You should format phone numbers to use the [E.164 standard](https://www.itu.int/rec/T-REC-E.164/).
          example: '+15554151337'
          type: string
          pattern: ^\+[1-9]\d{1,14}$
          maxLength: 15
    UserFactorToken:
      x-okta-ignore-redocly-rules-for-sdk: true
      title: token
      allOf:
        - $ref: '#/components/schemas/UserFactor'
        - type: object
          properties:
            factorType:
              example: token
            profile:
              $ref: '#/components/schemas/UserFactorTokenProfile'
            provider:
              enum:
                - RSA
                - SYMANTEC
            verify:
              oneOf:
                - $ref: '#/components/schemas/UserFactorTokenVerifyRSA'
                - $ref: '#/components/schemas/UserFactorTokenVerifySymantec'
    UserFactorTokenProfile:
      type: object
      properties:
        credentialId:
          description: ID for the factor credential
          example: dade.murphy@example.com
          type: string
    UserFactorTokenVerifyRSA:
      title: RSA SecurID
      type: object
      properties:
        passCode:
          description: OTP for the current time window
          type: string
          example: 5275875498
    UserFactorTokenVerifySymantec:
      title: Symantec VIP
      type: object
      properties:
        nextPassCode:
          description: OTP for the next time window
          type: integer
          example: 3956685498
        passCode:
          description: OTP for the current time window
          type: string
          example: 5275875498
    UserFactorTokenSoftwareTOTP:
      title: token:software:totp
      allOf:
        - $ref: '#/components/schemas/UserFactor'
        - type: object
          properties:
            factorType:
              example: token:software:totp
            profile:
              $ref: '#/components/schemas/UserFactorTokenProfile'
            provider:
              enum:
                - OKTA
                - GOOGLE
    UserFactorU2F:
      title: u2f
      allOf:
        - $ref: '#/components/schemas/UserFactor'
        - type: object
          properties:
            factorType:
              example: u2f
            profile:
              $ref: '#/components/schemas/UserFactorU2FProfile'
            provider:
              enum:
                - FIDO
    UserFactorU2FProfile:
      type: object
      properties:
        credentialId:
          description: ID for the factor credential
          example: dade.murphy@example.com
          type: string
    UserFactorWebAuthn:
      title: webauthn
      allOf:
        - $ref: '#/components/schemas/UserFactor'
        - type: object
          properties:
            factorType:
              example: webauthn
            profile:
              $ref: '#/components/schemas/UserFactorWebAuthnProfile'
            provider:
              enum:
                - FIDO
    UserFactorWebAuthnProfile:
      type: object
      readOnly: true
      properties:
        authenticatorName:
          description: |-
            Human-readable name of the authenticator

            > **Note:** This name is set from the AAGUID metadata during enrollment. It can't be changed in the Admin Console or by using any Okta APIs.
          example: MacBook Touch ID
          type: string
        credentialId:
          description: ID for the factor credential
          example: AHoOEhwvYiMv6SSwLp7KYRNttXtg_kYgQoQiEIWPFH_T3Ztp5Vj3bQ5H0LypIFR8ka8kfiCJ3I5qVpxrsd6JTMWKcE3xNh_U2QVF0Kwlan8Fiw
          type: string
    UserFactorWeb:
      title: web
      allOf:
        - $ref: '#/components/schemas/UserFactor'
        - type: object
          properties:
            factorType:
              example: web
            profile:
              $ref: '#/components/schemas/UserFactorWebProfile'
            provider:
              enum:
                - DUO
    UserFactorWebProfile:
      type: object
      properties:
        credentialId:
          description: ID for the factor credential
          example: dade.murphy@example.com
          type: string
    UserFactorActivateRequest:
      type: object
      x-okta-ignore-redocly-rules-for-sdk: true
      oneOf:
        - title: call
          description: Attempts to activate a `call` factor with the specified passcode
          properties:
            passCode:
              $ref: '#/components/schemas/UserFactorPassCode'
        - title: email
          description: Attempts to activate an `email` factor with the specified passcode
          properties:
            passCode:
              $ref: '#/components/schemas/UserFactorPassCode'
        - title: push
          type: object
          nullable: true
          description: |-
            Sends an asynchronous push notification to the device for approval by the user. You must poll the transaction to determine the state of the verification. See [Retrieve a factor transaction status](./#tag/UserFactor/operation/getFactorTransactionStatus).

            Activations have a short lifetime of several minutes and return a `TIMEOUT` if not completed before the timestamp specified in the `expiresAt` param. Use the published activate link to restart the activation process if the activation expires.
          properties:
            useNumberMatchingChallenge:
              $ref: '#/components/schemas/useNumberMatchingChallenge'
        - title: sms
          description: Attempts to activate an `sms` factor with the specified passcode
          properties:
