      properties:
        expiresAt:
          description: Timestamp when the factor verification attempt expires
          type: string
          format: date-time
          example: 2022-08-25T00:31:00.000Z
          readOnly: true
        factorResult:
          $ref: '#/components/schemas/UserFactorActivatePushResult'
