openapi: 3.0.3
info:
  title: Your OIN Integrations API
  description: Resources for OIN Integration Submissions
  version: 1.0.0
tags: {$ref: ../base.yaml#/tags}
paths:
  /integrations/api/v1/submissions/{submissionId}:
    parameters:
      - $ref: '#/components/parameters/pathSubmissionId'
    get:
      x-okta-lifecycle:
        lifecycle: PRODUCT_DEV
        SKUs: [ Integrator Free ]
      summary: Retrieve an OIN integration
      description: Retrieves an OIN Integration by ID
      operationId: getSubmissionByOperationId
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SubmissionResponseWithApiResponse'
              examples:
                SubmissionSamlResponse:
                  $ref: '#/components/examples/SubmissionSamlResponse'
                SubmissionOidcResponse:
                  $ref: '#/components/examples/SubmissionOidcResponse'
                SubmissionScimResponse:
                  $ref: '#/components/examples/SubmissionScimResponse'
                SubmissionEMResponse:
                  $ref: '#/components/examples/SubmissionEMResponse'
                SubmissionAPIServiceResponse:
                  $ref: '#/components/examples/SubmissionAPIServiceResponse'
                SubmissionUniversalLogoutResponse:
                  $ref: '#/components/examples/SubmissionUniversalLogoutResponse'
        '400':
          $ref: './Common.yaml#/components/responses/ErrorApiValidationFailed400'
        '403':
          $ref: './Common.yaml#/components/responses/ErrorAccessDenied403'
        '404':
          $ref: './Common.yaml#/components/responses/ErrorResourceNotFound404'
        '429':
          $ref: './Common.yaml#/components/responses/ErrorTooManyRequests429'
      security:
        - apiToken: []
        - oauth2:
            - okta.manifests.read
      tags: [YourOinIntegrations]
    put:
      x-okta-lifecycle:
        lifecycle: PRODUCT_DEV
        SKUs: [ Integrator Free ]
      summary: Replace an OIN integration
      description: Replaces the properties of an OIN Integration identified by ID
      operationId: replaceSubmission
      parameters:
        - $ref: '#/components/parameters/pathSubmissionId'
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SubmissionRequest'
            examples:
              SubmissionSaml:
                $ref: '#/components/examples/SubmissionSamlRequest'
              SubmissionOidc:
                $ref: '#/components/examples/SubmissionOidcRequest'
              SubmissionScim:
                $ref: '#/components/examples/SubmissionScimRequest'
              SubmissionEM:
                $ref: '#/components/examples/SubmissionEMRequest'
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SubmissionResponseWithApiResponse'
              examples:
                SubmissionSaml:
                  $ref: '#/components/examples/SubmissionSamlResponse'
                SubmissionOidc:
                  $ref: '#/components/examples/SubmissionOidcResponse'
                SubmissionScim:
                  $ref: '#/components/examples/SubmissionScimResponse'
                SubmissionEM:
                  $ref: '#/components/examples/SubmissionEMResponse'
                SubmissionAPIServiceResponse:
                  $ref: '#/components/examples/SubmissionAPIServiceResponse'
        '400':
          $ref: './Common.yaml#/components/responses/ErrorApiValidationFailed400'
        '403':
          $ref: './Common.yaml#/components/responses/ErrorAccessDenied403'
        '404':
          $ref: './Common.yaml#/components/responses/ErrorResourceNotFound404'
        '429':
          $ref: './Common.yaml#/components/responses/ErrorTooManyRequests429'
      security:
        - apiToken: []
        - oauth2:
            - okta.manifests.manage
      tags: [YourOinIntegrations]
    x-okta-team-detail:
      x-team-slack: isv-submissions
  /integrations/api/v1/submissions:
    get:
      x-okta-lifecycle:
        lifecycle: PRODUCT_DEV
        SKUs: [ Integrator Free ]
      summary: List all OIN integrations
      description: Lists all OIN Integration submissions created through the org
      operationId: listSubmissions
      parameters:
        - $ref: './Common.yaml#/components/parameters/queryLimit'
        - name: after
          in: query
          description: Specify the pagination cursor (OIN Integration instance `id`) for the next page of OIN Integrations.
          schema:
            type: string
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/SubmissionResponseWithApiResponse'
              examples:
                SubmissionsResponse:
                  $ref: '#/components/examples/SubmissionsResponse'
        '400':
          $ref: './Common.yaml#/components/responses/ErrorApiValidationFailed400'
        '403':
          $ref: './Common.yaml#/components/responses/ErrorAccessDenied403'
        '404':
          $ref: './Common.yaml#/components/responses/ErrorResourceNotFound404'
        '429':
          $ref: './Common.yaml#/components/responses/ErrorTooManyRequests429'
      security:
        - apiToken: []
        - oauth2:
            - okta.manifests.read
      tags: [YourOinIntegrations]
    post:
      x-okta-lifecycle:
        lifecycle: PRODUCT_DEV
        SKUs: [ Integrator Free ]
      summary: Create an OIN integration
      description: Creates an OIN Integration submission for verification and publication
      operationId: createSubmission
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SubmissionRequest'
            examples:
              SubmissionSaml:
                $ref: '#/components/examples/SubmissionSamlRequest'
              SubmissionOidc:
                $ref: '#/components/examples/SubmissionOidcRequest'
              SubmissionScim:
                $ref: '#/components/examples/SubmissionScimRequest'
              SubmissionEM:
                $ref: '#/components/examples/SubmissionEMRequest'
      responses:
        '201':
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SubmissionResponseWithApiResponse'
              examples:
                SubmissionSaml:
                  $ref: '#/components/examples/SubmissionSamlResponse'
                SubmissionOidc:
                  $ref: '#/components/examples/SubmissionOidcResponse'
                SubmissionScim:
                  $ref: '#/components/examples/SubmissionScimResponse'
                SubmissionEM:
                  $ref: '#/components/examples/SubmissionEMResponse'
        '400':
          $ref: './Common.yaml#/components/responses/ErrorApiValidationFailed400'
        '403':
          $ref: './Common.yaml#/components/responses/ErrorAccessDenied403'
        '404':
          $ref: './Common.yaml#/components/responses/ErrorResourceNotFound404'
        '429':
          $ref: './Common.yaml#/components/responses/ErrorTooManyRequests429'
      security:
        - apiToken: []
        - oauth2:
            - okta.manifests.manage
      tags: [YourOinIntegrations]
    x-okta-team-detail:
      x-team-slack: isv-submissions
  /integrations/api/v1/submissions/logo:
    post:
      x-okta-lifecycle:
        lifecycle: PRODUCT_DEV
        SKUs: [ Integrator Free ]
      summary: Upload an OIN integration logo
      description: Uploads a logo to your org. The image uploaded must adhere to the [OIN logo guidelines](https://developer.okta.com/docs/guides/submit-app-prereq/main/#logo-guidelines). Use the URL returned in the response header to specify the [`logo`](/openapi/okta-management/management/tag/YourOinIntegrations/#tag/YourOinIntegrations/operation/createSubmission!path=logo&t=request) parameter when you [create your OIN Integration submission](/openapi/okta-management/management/tag/YourOinIntegrations/#tag/YourOinIntegrations/operation/createSubmission). This logo appears in the OIN catalog for your app integration.
      operationId: uploadSubmissionLogo
      requestBody:
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                file:
                  type: string
                  format: binary
      responses:
        '201':
          description: Success
          headers:
            location:
              schema:
                type: string
                format: uri
                description: Uploaded logo URL
        '400':
          $ref: './Common.yaml#/components/responses/ErrorApiValidationFailed400'
        '403':
          $ref: './Common.yaml#/components/responses/ErrorAccessDenied403'
        '404':
          $ref: './Common.yaml#/components/responses/ErrorResourceNotFound404'
        '429':
          $ref: './Common.yaml#/components/responses/ErrorTooManyRequests429'
      security:
        - apiToken: []
        - oauth2:
            - okta.manifests.manage
      tags: [YourOinIntegrations]

    x-okta-team-detail:
      x-team-slack: isv-submissions
  /integrations/api/v1/submissions/logo/default:
    post:
      x-okta-lifecycle:
        lifecycle: PRODUCT_DEV
        SKUs: [ Integrator Free ]
      summary: Upload a default logo for an OIN integration
      description: Uploads a default logo to the OIN submission. The image must adhere to the [OIN logo guidelines](https://developer.okta.com/docs/guides/submit-app-prereq/main/#logo-guidelines). Use the URL returned in the response header to specify the [`logo`](/openapi/okta-management/management/tag/YourOinIntegrations/#tag/YourOinIntegrations/operation/createSubmission!path=logo&t=request) parameter when you [create your OIN Integration submission](/openapi/okta-management/management/tag/YourOinIntegrations/#tag/YourOinIntegrations/operation/createSubmission). This logo appears in the OIN catalog for your app integration.
      operationId: uploadSubmissionDefaultLogo
      requestBody:
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                file:
                  type: string
                  format: binary
      responses:
        '201':
