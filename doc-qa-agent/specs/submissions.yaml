    Capability:
      type: string
      enum:
        - SSO
        - UNIVERSAL_LOGOUT
        - PROVISIONING
        - ENTITLEMENTS
        - API_SERVICE

    Protocol:
      type: string
      enum:
        - OIDC
        - SAML
        - GTR
        - SCIM
        - ACTIONS
        - OAUTH2

    ActionProviderType:
        type: string
        enum:
            - workflows

    ActionProviderPayloadType:
      type: string
      enum:
        - WORKFLOWS
      description: Type of action provider

    SubmissionCapabilities:
      type: object
      properties:
        capabilities:
          type: array
          items:
            $ref: '#/components/schemas/SubmissionCapability'
      required:
        - capabilities

    ValidationDetailProvider:
      type: object
      description: Action provider validation details
      properties:
        type:
          $ref: '#/components/schemas/ActionProviderPayloadType'
        externalId:
          type: string
          description: The unique identifier of the action flow in the provider system
      discriminator:
        propertyName: type
        mapping:
          WORKFLOWS: '#/components/schemas/WorkflowsValidationDetailProvider'
      required:
        - type
        - externalId

    WorkflowsValidationDetailProvider:
      x-okta-ignore-redocly-rules-for-sdk: true
      allOf:
        - $ref: '#/components/schemas/ValidationDetailProvider'
      properties:
        result:
          $ref: '#/components/schemas/WorkflowsValidationErrorType'
      required:
        - result

    ValidationDetail:
      type: object
      description: Validation detail
      properties:
        id:
          type: string
          description: Action identifier
          example: "okta:action1"
        provider:
          $ref: '#/components/schemas/WorkflowsValidationDetailProvider'
      required:
        - id
        - provider


    WorkflowsValidationErrorType:
        type: string
        description: Validation error type
        enum:
          - DUPLICATE_FLOW_NAME
          - INVALID_EVENT_CARD
          - INVALID_FLOW_NAME
          - MISSING_FIELDS
          - PROHIBITED_CHAR_IN_OPTION_LABEL
          - INVALID_DEPENDENT_OPTIONS
          - INVALID_DYNAMIC_INPUT_FLOW
          - INVALID_DYNAMIC_OUTPUT_FLOW
          - INVALID_FLOW_REFERENCE
          - INVALID_CHAR_IN_AUTH_PARAM_LABEL
          - NO_CHILD_FLOW_FOR_AUTH_PARAM_LABEL

    SubmissionCapability:
      type: object
      description: Simple capability structure for capabilities endpoints (PUT/GET /capabilities)
      properties:
        capability:
          $ref: '#/components/schemas/Capability'
        supportedProtocols:
          type: array
          items:
            $ref: '#/components/schemas/Protocol'
      required:
        - capability
        - supportedProtocols

    SubmissionCapabilityEnhanced:
      description: Enhanced capability structure with embedded protocol configurations for submission GET endpoint
      oneOf:
        - $ref: '#/components/schemas/SsoCapability'
        - $ref: '#/components/schemas/UniversalLogoutCapability'
        - $ref: '#/components/schemas/ProvisioningCapability'
        - $ref: '#/components/schemas/EntitlementsCapability'
        - $ref: '#/components/schemas/ApiServiceCapability'
      discriminator:
        propertyName: capability
        mapping:
          SSO: '#/components/schemas/SsoCapability'
          UNIVERSAL_LOGOUT: '#/components/schemas/UniversalLogoutCapability'
          PROVISIONING: '#/components/schemas/ProvisioningCapability'
          ENTITLEMENTS: '#/components/schemas/EntitlementsCapability'
          API_SERVICE: '#/components/schemas/ApiServiceCapability'

    GlobalTokenRevocation:
      type: object
      properties:
        endpoint:
          type: string
          format: uri
          description: URL of the authorization server's global token revocation endpoint
        subjectFormat:
          type: string
          description: The format of the subject
          enum:
            - EMAIL
            - ISS_SUB
        authMethod:
          type: string
          description: Authentication method <br> **Note:** Currently, only the `SIGNED_JWT` method is supported
          enum:
            - SIGNED_JWT
        partialLogout:
          type: boolean
          description: Allow partial support for Universal Logout
          default: false
      required:
        - endpoint
        - subjectFormat
        - authMethod

    SsoCapability:
      type: object
      description: SSO capability configuration with embedded protocol details
      properties:
        capability:
          type: string
          enum: [SSO]
          description: SSO capability identifier
        supportedProtocols:
          type: array
          description: List of supported SSO protocols
          items:
            type: string
            enum: [OIDC, SAML, GTR]
      required:
        - capability
        - supportedProtocols

    UniversalLogoutCapability:
      type: object
      description: |
        Universal Logout capability configuration with embedded protocol details.
        
        **Protocol validation rule:**
        - The `actions` parameter is required when `supportedProtocols` is set to `ACTIONS`.
      properties:
        capability:
          type: string
          enum: [UNIVERSAL_LOGOUT]
          description: Universal Logout capability identifier
        supportedProtocols:
          type: array
          description: List of supported logout protocols
          minItems: 1
          items:
            type: string
            enum: [GTR, ACTIONS]
        actions:
          type: array
          description: Configuration for the Actions protocol. This parameter is required when `supportedProtocols` is set to `ACTIONS`.
          items:
            $ref: '#/components/schemas/SubmissionAction'
      required:
        - capability
        - supportedProtocols

    ProvisioningCapability:
      type: object
      description: |
        Provisioning capability configuration with embedded protocol details.
        
        *Protocol validation rule:**
        - The `actions` parameter is required when `supportedProtocols` is set to `ACTIONS`.
      properties:
        capability:
          type: string
          enum: [PROVISIONING]
          description: Provisioning capability identifier
        supportedProtocols:
          type: array
          description: List of supported provisioning protocols
          minItems: 1
          items:
            type: string
            enum: [SCIM, ACTIONS, OAUTH2]
        actions:
          type: array
          description: Configuration for the Actions protocol. This parameter is required when `supportedProtocols` is set to `ACTIONS`.
          items:
            $ref: '#/components/schemas/SubmissionAction'
      required:
        - capability
        - supportedProtocols

    EntitlementsCapability:
      type: object
      description: |
        Entitlements capability configuration with embedded protocol details.
        
        **Protocol validation rule:**
        - The `actions` parameter is required when `supportedProtocols` is set to `ACTIONS`.
      properties:
        capability:
          type: string
          enum: [ENTITLEMENTS]
          description: Entitlements capability identifier
        supportedProtocols:
          type: array
          description: List of supported entitlements protocols
          minItems: 1
          items:
            type: string
            enum: [ACTIONS]
        actions:
          type: array
          description: Configuration for the Actions protocol. This parameter is required when `supportedProtocols` is set to `ACTIONS`.
          items:
            $ref: '#/components/schemas/SubmissionAction'
      required:
        - capability
        - supportedProtocols

    ApiServiceCapability:
      type: object
      description: API Service capability configuration with embedded protocol details
      properties:
        capability:
          type: string
          enum: [API_SERVICE]
          description: API Service capability identifier
        supportedProtocols:
          type: array
          description: List of supported protocols
          items:
            type: string
            enum: [OAUTH2]
      required:
        - capability
        - supportedProtocols

