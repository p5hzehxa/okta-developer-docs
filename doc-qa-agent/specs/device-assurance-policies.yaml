                WindowsWithDeviceTrustConnectorThirdPartySignalProvidersAndAntivirusEnabled:
                  $ref: '#/components/examples/DeviceAssuranceWindowsWithDeviceTrustConnectorThirdPartySignalProvidersAndAntivirusEnabledResponse'
                WindowsWithDevicePostureIdPThirdPartySignalProviders:
                  $ref: '#/components/examples/DeviceAssuranceWindowsWithDevicePostureIdPThirdPartySignalProvidersResponse'
                AndroidWithAndroidDeviceTrustThirdPartySignalProviders:
                  $ref: '#/components/examples/DeviceAssuranceAndroidWithAndroidDeviceTrustThirdPartySignalProvidersResponse'
                AndroidWithDevicePostureIdPThirdPartySignalProviders:
                  $ref: '#/components/examples/DeviceAssuranceAndroidWithDevicePostureIdPThirdPartySignalProvidersResponse'
                iOSWithDevicePostureIdPThirdPartySignalProviders:
                  $ref: '#/components/examples/DeviceAssuranceIosWithDevicePostureIdPSignalProvidersResponse'
                AndroidWithDynamicVersionRequirement:
                  $ref: '#/components/examples/DeviceAssuranceAndroidWithDynamicVersionRequirementResponse'
                iOSWithDynamicVersionRequirement:
                  $ref: '#/components/examples/DeviceAssuranceIosWithDynamicVersionRequirementResponse'
                MacOSWithDynamicVersionRequirement:
                  $ref: '#/components/examples/DeviceAssuranceMacOSWithDynamicVersionRequirementResponse'
                WindowsWithDynamicVersionRequirements:
                  $ref: '#/components/examples/DeviceAssuranceWindowsWithDynamicVersionRequirementsResponse'
                WindowsWithWin11DynamicVersionRequirementAndWin10MinimumVersionString:
                  $ref: '#/components/examples/DeviceAssuranceWindowsWithWin11DynamicVersionRequirementAndWin10MinimumVersionStringResponse'
                WindowsWithWin11MinimumVersionStringAndWin10DynamicVersionRequirement:
                  $ref: '#/components/examples/DeviceAssuranceWindowsWithWin11MinimumVersionStringAndWin10DynamicVersionRequirementResponse'
                AndroidWithGracePeriod:
                  $ref: '#/components/examples/DeviceAssuranceAndroidWithGracePeriodResponse'
                iOSWithGracePeriod:
                  $ref: '#/components/examples/DeviceAssuranceIosWithGracePeriodResponse'
                MacOSWithGracePeriod:
                  $ref: '#/components/examples/DeviceAssuranceMacOSWithGracePeriodResponse'
                WindowsWithGracePeriod:
                  $ref: '#/components/examples/DeviceAssuranceWindowsWithGracePeriodResponse'
                ChromeOSWithGracePeriod:
                  $ref: '#/components/examples/DeviceAssuranceChromeOSWithGracePeriodResponse'
                MacOSWithDevicePostureChecks:
                  $ref: '#/components/examples/DeviceAssuranceMacOSWithDevicePostureChecksResponse'
                WindowsWithDevicePostureChecks:
                  $ref: '#/components/examples/DeviceAssuranceWindowsWithDevicePostureChecksResponse'
        '403':
          $ref: ./Common.yaml#/components/responses/ErrorAccessDenied403
        '404':
          $ref: ./Common.yaml#/components/responses/ErrorResourceNotFound404
        '429':
          $ref: ./Common.yaml#/components/responses/ErrorTooManyRequests429
      security:
        - apiToken: []
        - oauth2:
            - okta.deviceAssurance.read
      tags:
        - DeviceAssurance
    put:
      summary: Replace a device assurance policy
      description: Replaces a device assurance policy by `deviceAssuranceId`
      operationId: replaceDeviceAssurancePolicy
      x-codegen-request-body-name: deviceAssurance
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DeviceAssurance'
            examples:
              Android:
                $ref: '#/components/examples/DeviceAssuranceAndroidRequest'
              iOS:
                $ref: '#/components/examples/DeviceAssuranceIosRequest'
              MacOS:
                $ref: '#/components/examples/DeviceAssuranceMacOSRequest'
              Windows:
                $ref: '#/components/examples/DeviceAssuranceWindowsRequest'
              ChromeOSWithDeviceTrustConnectorThirdPartySignalProviders:
                $ref: '#/components/examples/DeviceAssuranceChromeOSWithDeviceTrustConnectorThirdPartySignalProvidersRequest'
              ChromeOSWithDevicePostureIdPThirdPartySignalProviders:
                $ref: '#/components/examples/DeviceAssuranceChromeOSWithDevicePostureIdPThirdPartySignalProvidersRequest'
              MacOSWithDeviceTrustConnectorThirdPartySignalProviders:
                $ref: '#/components/examples/DeviceAssuranceMacOSWithDeviceTrustConnectorThirdPartySignalProvidersRequest'
              MacOSWithDevicePostureIdPThirdPartySignalProviders:
                $ref: '#/components/examples/DeviceAssuranceMacOSWithDevicePostureIdPThirdPartySignalProvidersRequest'
              WindowsWithDeviceTrustConnectorThirdPartySignalProviders:
                $ref: '#/components/examples/DeviceAssuranceWindowsWithDeviceTrustConnectorThirdPartySignalProvidersRequest'
              WindowsWithDeviceTrustConnectorThirdPartySignalProvidersAndAntivirusEnabled:
                $ref: '#/components/examples/DeviceAssuranceWindowsWithDeviceTrustConnectorThirdPartySignalProvidersAndAntivirusEnabledRequest'
              WindowsWithDevicePostureIdPThirdPartySignalProviders:
                $ref: '#/components/examples/DeviceAssuranceWindowsWithDevicePostureIdPThirdPartySignalProvidersRequest'
              AndroidWithAndroidDeviceTrustThirdPartySignalProviders:
                $ref: '#/components/examples/DeviceAssuranceAndroidWithAndroidDeviceTrustThirdPartySignalProvidersRequest'
              AndroidWithDevicePostureIdPThirdPartySignalProviders:
                $ref: '#/components/examples/DeviceAssuranceAndroidWithDevicePostureIdPThirdPartySignalProvidersRequest'
              iOSWithDevicePostureIdPThirdPartySignalProviders:
                $ref: '#/components/examples/DeviceAssuranceIosWithDevicePostureIdPSignalProvidersRequest'
              AndroidWithDynamicVersionRequirement:
                $ref: '#/components/examples/DeviceAssuranceAndroidWithDynamicVersionRequirementRequest'
              iOSWithDynamicVersionRequirement:
                $ref: '#/components/examples/DeviceAssuranceIosWithDynamicVersionRequirementRequest'
              MacOSWithDynamicVersionRequirement:
                $ref: '#/components/examples/DeviceAssuranceMacOSWithDynamicVersionRequirementRequest'
              WindowsWithDynamicVersionRequirements:
                $ref: '#/components/examples/DeviceAssuranceWindowsWithDynamicVersionRequirementsRequest'
              WindowsWithWin11DynamicVersionRequirementAndWin10MinimumVersionString:
                $ref: '#/components/examples/DeviceAssuranceWindowsWithWin11DynamicVersionRequirementAndWin10MinimumVersionStringRequest'
              WindowsWithWin11MinimumVersionStringAndWin10DynamicVersionRequirement:
                $ref: '#/components/examples/DeviceAssuranceWindowsWithWin11MinimumVersionStringAndWin10DynamicVersionRequirementRequest'
              AndroidWithGracePeriod:
                $ref: '#/components/examples/DeviceAssuranceAndroidWithGracePeriodRequest'
              iOSWithGracePeriod:
                $ref: '#/components/examples/DeviceAssuranceIosWithGracePeriodRequest'
              MacOSWithGracePeriod:
                $ref: '#/components/examples/DeviceAssuranceMacOSWithGracePeriodRequest'
              WindowsWithGracePeriod:
                $ref: '#/components/examples/DeviceAssuranceWindowsWithGracePeriodRequest'
              ChromeOSWithGracePeriod:
                $ref: '#/components/examples/DeviceAssuranceChromeOSWithGracePeriodRequest'
              MacOSWithDevicePostureChecks:
                $ref: '#/components/examples/DeviceAssuranceMacOSWithDevicePostureChecksRequest'
              WindowsWithDevicePostureChecks:
                $ref: '#/components/examples/DeviceAssuranceWindowsWithDevicePostureChecksRequest'
        required: true
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DeviceAssurance'
              examples:
                Android:
                  $ref: '#/components/examples/DeviceAssuranceAndroidResponse'
                iOS:
                  $ref: '#/components/examples/DeviceAssuranceIosResponse'
                MacOS:
                  $ref: '#/components/examples/DeviceAssuranceMacOSResponse'
                Windows:
                  $ref: '#/components/examples/DeviceAssuranceWindowsResponse'
                ChromeOSWithDeviceTrustConnectorThirdPartySignalProviders:
                  $ref: '#/components/examples/DeviceAssuranceChromeOSWithDeviceTrustConnectorThirdPartySignalProvidersResponse'
                ChromeOSWithDevicePostureIdPThirdPartySignalProviders:
                  $ref: '#/components/examples/DeviceAssuranceChromeOSWithDevicePostureIdPThirdPartySignalProvidersResponse'
                MacOSWithDeviceTrustConnectorThirdPartySignalProviders:
                  $ref: '#/components/examples/DeviceAssuranceMacOSWithDeviceTrustConnectorThirdPartySignalProvidersResponse'
                MacOSWithDevicePostureIdPThirdPartySignalProviders:
                  $ref: '#/components/examples/DeviceAssuranceMacOSWithDevicePostureIdPThirdPartySignalProvidersResponse'
                WindowsWithDeviceTrustConnectorThirdPartySignalProviders:
                  $ref: '#/components/examples/DeviceAssuranceWindowsWithDeviceTrustConnectorThirdPartySignalProvidersResponse'
                WindowsWithDeviceTrustConnectorThirdPartySignalProvidersAndAntivirusEnabled:
                  $ref: '#/components/examples/DeviceAssuranceWindowsWithDeviceTrustConnectorThirdPartySignalProvidersAndAntivirusEnabledResponse'
                WindowsWithDevicePostureIdPThirdPartySignalProviders:
                  $ref: '#/components/examples/DeviceAssuranceWindowsWithDevicePostureIdPThirdPartySignalProvidersResponse'
                AndroidWithAndroidDeviceTrustThirdPartySignalProviders:
                  $ref: '#/components/examples/DeviceAssuranceAndroidWithAndroidDeviceTrustThirdPartySignalProvidersResponse'
                AndroidWithDevicePostureIdPThirdPartySignalProviders:
                  $ref: '#/components/examples/DeviceAssuranceAndroidWithDevicePostureIdPThirdPartySignalProvidersResponse'
                iOSWithDevicePostureIdPThirdPartySignalProviders:
                  $ref: '#/components/examples/DeviceAssuranceIosWithDevicePostureIdPSignalProvidersResponse'
                AndroidWithDynamicVersionRequirement:
                  $ref: '#/components/examples/DeviceAssuranceAndroidWithDynamicVersionRequirementResponse'
                iOSWithDynamicVersionRequirement:
                  $ref: '#/components/examples/DeviceAssuranceIosWithDynamicVersionRequirementResponse'
                MacOSWithDynamicVersionRequirement:
                  $ref: '#/components/examples/DeviceAssuranceMacOSWithDynamicVersionRequirementResponse'
                WindowsWithDynamicVersionRequirements:
                  $ref: '#/components/examples/DeviceAssuranceWindowsWithDynamicVersionRequirementsResponse'
                WindowsWithWin11DynamicVersionRequirementAndWin10MinimumVersionString:
                  $ref: '#/components/examples/DeviceAssuranceWindowsWithWin11DynamicVersionRequirementAndWin10MinimumVersionStringResponse'
                WindowsWithWin11MinimumVersionStringAndWin10DynamicVersionRequirement:
                  $ref: '#/components/examples/DeviceAssuranceWindowsWithWin11MinimumVersionStringAndWin10DynamicVersionRequirementResponse'
                AndroidWithGracePeriod:
                  $ref: '#/components/examples/DeviceAssuranceAndroidWithGracePeriodResponse'
                iOSWithGracePeriod:
                  $ref: '#/components/examples/DeviceAssuranceIosWithGracePeriodResponse'
                MacOSWithGracePeriod:
                  $ref: '#/components/examples/DeviceAssuranceMacOSWithGracePeriodResponse'
                WindowsWithGracePeriod:
                  $ref: '#/components/examples/DeviceAssuranceWindowsWithGracePeriodResponse'
                ChromeOSWithGracePeriod:
                  $ref: '#/components/examples/DeviceAssuranceChromeOSWithGracePeriodResponse'
                MacOSWithDevicePostureChecks:
