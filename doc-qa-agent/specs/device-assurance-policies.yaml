              MacOSWithGracePeriod:
                $ref: '#/components/examples/DeviceAssuranceMacOSWithGracePeriodRequest'
              WindowsWithGracePeriod:
                $ref: '#/components/examples/DeviceAssuranceWindowsWithGracePeriodRequest'
              ChromeOSWithGracePeriod:
                $ref: '#/components/examples/DeviceAssuranceChromeOSWithGracePeriodRequest'
              MacOSWithDevicePostureChecks:
