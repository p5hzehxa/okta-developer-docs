    delete:
      summary: Delete a device assurance policy
      description: Deletes a device assurance policy by `deviceAssuranceId`. If the device assurance policy is currently being used in the org Authentication Policies, the delete will not be allowed.
      operationId: deleteDeviceAssurancePolicy
      responses:
        '204':
          description: No Content
        '403':
          $ref: ./Common.yaml#/components/responses/ErrorAccessDenied403
        '404':
          $ref: ./Common.yaml#/components/responses/ErrorResourceNotFound404
        '409':
          description: Conflict
          headers: {}
          content:
            application/json:
              schema:
                $ref: ./Common.yaml#/components/schemas/Error
              examples:
                ErrorDeviceAssuranceInUse:
                  $ref: '#/components/examples/ErrorDeviceAssuranceInUse'
        '429':
          $ref: ./Common.yaml#/components/responses/ErrorTooManyRequests429
      security:
        - apiToken: []
        - oauth2:
            - okta.deviceAssurance.manage
      tags:
        - DeviceAssurance
components:
  examples:
    DeviceAssuranceAndroidRequest:
      summary: Android request
      value:
        name: Device assurance Android
        osVersion:
          minimum: 12
        diskEncryptionType:
          include:
            - USER
            - FULL
        jailbreak: false
        platform: ANDROID
        screenLockType:
          include:
            - BIOMETRIC
        secureHardwarePresent: true
    DeviceAssuranceIosRequest:
      summary: iOS request
      value:
        name: Device assurance iOS
        osVersion:
          minimum: 12.4.5
        jailbreak: false
        platform: IOS
        screenLockType:
          include:
            - BIOMETRIC
    DeviceAssuranceMacOSRequest:
      summary: macOS request
      value:
        name: Device assurance macOS
        osVersion:
          minimum: 12.4.5
        diskEncryptionType:
          include:
            - ALL_INTERNAL_VOLUMES
        platform: MACOS
        screenLockType:
          include:
            - PASSCODE
            - BIOMETRIC
        secureHardwarePresent: true
    DeviceAssuranceWindowsRequest:
      summary: Windows request
      value:
        name: Device assurance Windows
        osVersion:
          minimum: 12.4.5.9
        diskEncryptionType:
          include:
            - ALL_INTERNAL_VOLUMES
        platform: WINDOWS
        screenLockType:
          include:
            - PASSCODE
            - BIOMETRIC
        secureHardwarePresent: true
    DeviceAssuranceMacOSWithDeviceTrustConnectorThirdPartySignalProvidersRequest:
      x-okta-lifecycle:
        features:
          - GOOGLE_DEVICE_CONTEXT_CONNECTOR
      summary: macOS with Device Trust Connector as third-party signal provider request
      value:
        name: Device assurance macOS
        osVersion:
          minimum: 12.4.5
        diskEncryptionType:
          include:
            - ALL_INTERNAL_VOLUMES
        platform: MACOS
        screenLockType:
          include:
            - PASSCODE
            - BIOMETRIC
        secureHardwarePresent: true
        thirdPartySignalProviders:
          dtc:
            osVersion:
              minimum: 10.0.19041.1110
            diskEncrypted: true
            osFirewall: true
            screenLockSecured: true
            browserVersion:
              minimum: 15393.27.0
            deviceEnrollmentDomain": testDomain
            builtInDnsClientEnabled": true
            chromeRemoteDesktopAppBlocked": true
            safeBrowsingProtectionLevel": true
            siteIsolationEnabled": true
            passwordProtectionWarningTrigger": PASSWORD_PROTECTION_OFF
            realtimeUrlCheckMode": true
    DeviceAssuranceMacOSWithDevicePostureIdPThirdPartySignalProvidersRequest:
      x-okta-lifecycle:
        features:
          - DEVICE_ASSURANCE_CUSTOM_POSTURE_PROVIDER
      summary: macOS with Device Posture IdP as third-party signal provider request
      value:
        name: Device assurance macOS
        osVersion:
          minimum: 12.4.5
        diskEncryptionType:
          include:
            - ALL_INTERNAL_VOLUMES
        platform: MACOS
        screenLockType:
          include:
            - PASSCODE
            - BIOMETRIC
        secureHardwarePresent: true
        thirdPartySignalProviders:
          devicePostureIdP:
            managed: true
            compliant: true
    DeviceAssuranceWindowsWithDeviceTrustConnectorThirdPartySignalProvidersRequest:
      x-okta-lifecycle:
        features:
          - GOOGLE_DEVICE_CONTEXT_CONNECTOR
      summary: Windows with Device Trust Connector as third-party signal provider request
      value:
        name: Device assurance Windows
        osVersion:
          minimum: 12.4.5.9
        diskEncryptionType:
          include:
            - ALL_INTERNAL_VOLUMES
        platform: WINDOWS
        screenLockType:
          include:
            - PASSCODE
            - BIOMETRIC
        secureHardwarePresent: true
        thirdPartySignalProviders:
          dtc:
            osVersion:
              minimum: 10.0.19041.1110
            diskEncrypted: true
            osFirewall: true
            screenLockSecured: true
            browserVersion:
              minimum: 15393.27.0
            deviceEnrollmentDomain: testDomain
            builtInDnsClientEnabled: true
            chromeRemoteDesktopAppBlocked: true
            safeBrowsingProtectionLevel: ENHANCED_PROTECTION
            siteIsolationEnabled: true
            passwordProtectionWarningTrigger: PASSWORD_PROTECTION_OFF
            realtimeUrlCheckMode: true
            secureBootEnabled: true
            windowsMachineDomain: testMachineDomain
            windowsUserDomain: testUserDomain
            crowdStrikeCustomerId: testCustomerId
            crowdStrikeAgentId": testAgentId
            keyTrustLevel: CHROME_BROWSER_HW_KEY
    DeviceAssuranceWindowsWithDeviceTrustConnectorThirdPartySignalProvidersAndAntivirusEnabledRequest:
      x-okta-lifecycle:
        features:
          - CHROME_DTC_ANTIVIRUS_SUPPORT
      summary: Windows with Device Trust Connector as third-party signal provider and antivirus enabled request
      value:
        name: Device assurance Windows
        osVersion:
          minimum: 12.4.5.9
        diskEncryptionType:
          include:
            - ALL_INTERNAL_VOLUMES
        platform: WINDOWS
        screenLockType:
          include:
            - PASSCODE
            - BIOMETRIC
        secureHardwarePresent: true
        thirdPartySignalProviders:
          dtc:
            osVersion:
