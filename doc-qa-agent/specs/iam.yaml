    get:
      summary: List all users with role assignments
      description: Lists all users with role assignments
      operationId: listUsersWithRoleAssignments
      parameters:
        - name: after
          description: Specifies the pagination cursor for the next page of targets
          in: query
          schema:
            type: string
          required: false
        - name: limit
          in: query
          description: Specifies the number of results returned. Defaults to `100`.
          schema:
            type: integer
            format: int32
            default: 100
          required: false
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RoleAssignedUsers'
              examples:
                User List:
                  $ref: '#/components/examples/RoleAssignedUsersResponseExample'
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: ./Common.yaml#/components/schemas/Error
        '429':
          $ref: ./Common.yaml#/components/responses/ErrorTooManyRequests429
      security:
        - apiToken: []
        - oauth2:
            - okta.roles.read
      tags:
        - RoleAssignmentAUser
    x-okta-team-detail:
      x-team-slack: eng-dda
  /api/v1/iam/resource-sets:
