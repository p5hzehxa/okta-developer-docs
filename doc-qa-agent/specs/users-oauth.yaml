openapi: 3.0.3
info:
  title: User OAuth APIs
  version: 1.0.0
servers:
  - url: https://example.okta.com
tags:
  $ref: ../base.yaml#/tags
paths:
  /api/v1/users/{userId}/clients/{clientId}/tokens:
    parameters:
      - $ref: ./Common.yaml#/components/parameters/pathUserId
      - $ref: ./oauth.yaml#/components/parameters/pathClientId
    get:
      summary: List all refresh tokens for a client
      description: Lists all refresh tokens issued for the specified user and client
      operationId: listRefreshTokensForUserAndClient
      parameters:
        - name: expand
          in: query
          description: 'Valid value: `scope`. If specified, scope details are included in the `_embedded` attribute.'
          schema:
            type: string
            example: scope
        - name: after
          in: query
          description: The cursor to use for pagination. It is an opaque string that specifies your current location in the list and is obtained from the `Link` response header. See [Pagination](https://developer.okta.com/docs/api/#pagination).
          schema:
            type: string
        - name: limit
          in: query
          description: Specifies the number of tokens to return
          schema:
            type: integer
            format: int32
            minimum: 1
            maximum: 200
            default: 20
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: ./apps.yaml#/components/schemas/OAuth2RefreshToken
        '403':
          $ref: ./Common.yaml#/components/responses/ErrorAccessDenied403
        '404':
          $ref: ./Common.yaml#/components/responses/ErrorResourceNotFound404
        '429':
          $ref: ./Common.yaml#/components/responses/ErrorTooManyRequests429
      security:
        - apiToken: []
        - oauth2:
            - okta.users.read
      tags:
        - UserOAuth
    delete:
      summary: Revoke all refresh tokens for a client
      description: Revokes all refresh tokens issued for the specified user and client
      operationId: revokeTokensForUserAndClient
      responses:
        '204':
          description: No Content
          content: {}
        '403':
          $ref: ./Common.yaml#/components/responses/ErrorAccessDenied403
        '404':
          $ref: ./Common.yaml#/components/responses/ErrorResourceNotFound404
        '429':
          $ref: ./Common.yaml#/components/responses/ErrorTooManyRequests429
      security:
        - apiToken: []
        - oauth2:
            - okta.users.manage
      tags:
        - UserOAuth
    x-okta-team-detail:
      x-team-slack: amp-eng-outbound-fed
  /api/v1/users/{userId}/clients/{clientId}/tokens/{tokenId}:
    parameters:
      - $ref: ./Common.yaml#/components/parameters/pathUserId
      - $ref: ./oauth.yaml#/components/parameters/pathClientId
      - $ref: ./authorizationServers.yaml#/components/parameters/pathTokenId
    get:
      summary: Retrieve a refresh token for a client
      description: Retrieves a refresh token issued for the specified user and client
      operationId: getRefreshTokenForUserAndClient
      parameters:
        - name: expand
          in: query
          description: 'Valid value: `scope`. If specified, scope details are included in the `_embedded` attribute.'
          schema:
            type: string
            example: scope
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                $ref: ./apps.yaml#/components/schemas/OAuth2RefreshToken
        '403':
          $ref: ./Common.yaml#/components/responses/ErrorAccessDenied403
        '404':
          $ref: ./Common.yaml#/components/responses/ErrorResourceNotFound404
        '429':
          $ref: ./Common.yaml#/components/responses/ErrorTooManyRequests429
      security:
        - apiToken: []
        - oauth2:
            - okta.users.read
      tags:
        - UserOAuth
    delete:
      summary: Revoke a token for a client
      description: Revokes the specified refresh and access tokens
      operationId: revokeTokenForUserAndClient
      responses:
        '204':
          description: No Content
          content: {}
        '403':
          $ref: ./Common.yaml#/components/responses/ErrorAccessDenied403
        '404':
          $ref: ./Common.yaml#/components/responses/ErrorResourceNotFound404
        '429':
          $ref: ./Common.yaml#/components/responses/ErrorTooManyRequests429
      security:
        - apiToken: []
        - oauth2:
            - okta.users.manage
      tags:
        - UserOAuth
    x-okta-team-detail:
      x-team-slack: amp-eng-outbound-fed
components:
  securitySchemes:
    $ref: ../base.yaml#/components/securitySchemes
