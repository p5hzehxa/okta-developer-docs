openapi: 3.0.3
info:
  title: Authorization Server Public Keys Management API
  version: 1.0.0
servers:
  - url: https://example.okta.com
tags:
  $ref: '../base.yaml#/tags'
paths:
  /api/v1/authorizationServers/{authServerId}/resourceservercredentials/keys:
    parameters:
      - $ref: './authorizationServers.yaml#/components/parameters/pathAuthServerId'
    get:
      summary: List all Custom Authorization Server Public JSON Web Keys
      description: Lists all the public keys used by the custom authorization server
      operationId: listOAuth2ResourceServerJsonWebKeys
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/OAuth2ResourceServerJsonWebKey'
              examples:
                ListOAuth2ResourceServerJsonWebKeys:
                  $ref: '#/components/examples/ListOAuth2ResourceServerJsonWebKeys'
        '401':
          $ref: './Common.yaml#/components/responses/ErrorInvalidToken401'
        '403':
          $ref: './Common.yaml#/components/responses/ErrorAccessDenied403'
        '404':
          $ref: './Common.yaml#/components/responses/ErrorResourceNotFound404'
        '429':
          $ref: './Common.yaml#/components/responses/ErrorTooManyRequests429'
      security:
        - apiToken: [ ]
        - oauth2:
            - okta.authorizationServers.read
      tags:
        - OAuth2ResourceServerCredentialsKeys
    post:
      summary: Add a JSON Web Key
      description: |-
        Adds a new JSON Web Key to the custom authorization server`s JSON web keys.
        > **Note:** This API doesn't allow you to add a key if the existing key doesn't have a `kid`. Use the [Replace an Authorization Server](/openapi/okta-management/management/authorizationserver/replaceauthorizationserver) operation to update the JWKS or [Delete a Custom Authorization Server Public JSON Web Key](/openapi/okta-management/management/oauth2resourceservercredentialskeys/deleteoauth2resourceserverjsonwebkey) and re-add the key with a `kid`.
        > **Note:** This API doesn't allow you to add a key with an ACTIVE status. You need to add an INACTIVE key first, and then ACTIVATE the key.
      operationId: addOAuth2ResourceServerJsonWebKey
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/OAuth2ResourceServerJsonWebKeyRequestBody'
            examples:
              addOAuth2ResourceServerJsonWebKeyRequestBody:
                $ref: '#/components/examples/AddOAuth2ResourceServerJsonWebKeyRequest'
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OAuth2ResourceServerJsonWebKey'
              examples:
                getOAuth2ResourceServerKey:
                  $ref: '#/components/examples/OAuth2ResourceServerJsonWebKey'
        '400':
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: './Common.yaml#/components/schemas/Error'
              examples:
                ErrorJsonWebKeyNonUniqueKid:
                  $ref: '#/components/examples/ErrorJsonWebKeyNonUniqueKid'
                ErrorJsonWebKeyKidLengthTooShort:
                  $ref: '#/components/examples/ErrorJsonWebKeyKidLengthTooShort'
                ErrorJsonWebKeyTooManyKids:
                  $ref: '#/components/examples/ErrorJsonWebKeyTooManyKids'
                ErrorJsonWebKeyCannotAddActiveKey:
                  $ref: '#/components/examples/ErrorJsonWebKeyCannotAddActiveKey'
        '401':
          $ref: './Common.yaml#/components/responses/ErrorInvalidToken401'
        '403':
          $ref: './Common.yaml#/components/responses/ErrorAccessDenied403'
        '429':
          $ref: './Common.yaml#/components/responses/ErrorTooManyRequests429'
      security:
        - apiToken: [ ]
        - oauth2:
            - okta.authorizationServers.manage
      tags:
        - OAuth2ResourceServerCredentialsKeys
  /api/v1/authorizationServers/{authServerId}/resourceservercredentials/keys/{keyId}:
    parameters:
      - $ref: './authorizationServers.yaml#/components/parameters/pathAuthServerId'
      - $ref: '#/components/parameters/CustomAsPathJsonWebKeyId'
    get:
      summary: Retrieve a Custom Authorization Server Public JSON Web Key
      description: Retrieves a custom authorization server public JSON web key by key `id`
      operationId: getOAuth2ResourceServerJsonWebKey
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                $ref: '#/components/schemas/OAuth2ResourceServerJsonWebKey'
              examples:
                OAuthResourceServerJsonWebKeyResponseExample:
                  $ref: '#/components/examples/OAuth2ResourceServerJsonWebKey'
        '401':
          $ref: './Common.yaml#/components/responses/ErrorInvalidToken401'
        '403':
          $ref: './Common.yaml#/components/responses/ErrorAccessDenied403'
        '404':
          $ref: './Common.yaml#/components/responses/ErrorResourceNotFound404'
        '429':
          $ref: './Common.yaml#/components/responses/ErrorTooManyRequests429'
      security:
        - apiToken: [ ]
        - oauth2:
            - okta.authorizationServers.read
      tags:
        - OAuth2ResourceServerCredentialsKeys
    delete:
      summary: Delete a Custom Authorization Server Public JSON Web Key
      description: Deletes a custom authorization server public JSON web key by key `id`. You can only delete an inactive key.
      operationId: deleteOAuth2ResourceServerJsonWebKey
      responses:
        '204':
          description: No Content
        '400':
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: './Common.yaml#/components/schemas/Error'
              examples:
                ErrorDeleteCustomAsActiveJsonWebKey:
                  $ref: '#/components/examples/ErrorDeleteCustomAsActiveJsonWebKey'
        '401':
          $ref: './Common.yaml#/components/responses/ErrorInvalidToken401'
        '403':
          $ref: './Common.yaml#/components/responses/ErrorAccessDenied403'
        '404':
          $ref: './Common.yaml#/components/responses/ErrorResourceNotFound404'
        '429':
          $ref: './Common.yaml#/components/responses/ErrorTooManyRequests429'
      security:
        - apiToken: [ ]
        - oauth2:
            - okta.authorizationServers.manage
      tags:
        - OAuth2ResourceServerCredentialsKeys
  /api/v1/authorizationServers/{authServerId}/resourceservercredentials/keys/{keyId}/lifecycle/activate:
    parameters:
      - $ref: './authorizationServers.yaml#/components/parameters/pathAuthServerId'
      - $ref: '#/components/parameters/CustomAsPathJsonWebKeyId'
    post:
      summary: Activate a Custom Authorization Server Public JSON Web Key
      description: |-
        Activates a custom authorization server public JSON web key by key `id`.
        > **Note:** You can have only one active key at any given time for the authorization server. When you activate an inactive key, Okta automatically deactivates the current active key.
      operationId: activateOAuth2ResourceServerJsonWebKey
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OAuth2ResourceServerJsonWebKey'
              examples:
                activateOAuth2ResourceServerJsonWebKeyResponse:
                  $ref: '#/components/examples/OAuth2ResourceServerJsonWebKey'
        '401':
          $ref: './Common.yaml#/components/responses/ErrorInvalidToken401'
        '403':
          $ref: './Common.yaml#/components/responses/ErrorAccessDenied403'
        '404':
          $ref: './Common.yaml#/components/responses/ErrorResourceNotFound404'
        '429':
          $ref: './Common.yaml#/components/responses/ErrorTooManyRequests429'
      security:
        - apiToken: [ ]
        - oauth2:
            - okta.authorizationServers.manage
      tags:
        - OAuth2ResourceServerCredentialsKeys
  /api/v1/authorizationServers/{authServerId}/resourceservercredentials/keys/{keyId}/lifecycle/deactivate:
    parameters:
      - $ref: './authorizationServers.yaml#/components/parameters/pathAuthServerId'
      - $ref: '#/components/parameters/CustomAsPathJsonWebKeyId'
    post:
      summary: Deactivate a Custom Authorization Server Public JSON Web Key
      description: |-
        Deactivates a custom authorization server public JSON web key by key `id`.
        > **Note:** Deactivating the active key isn't allowed if the authorization server has access token encryption enabled. You can activate another key, which makes the current key inactive.
      operationId: deactivateOAuth2ResourceServerJsonWebKey
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OAuth2ResourceServerJsonWebKey'
              examples:
                deactivateOAuth2ResourceServerJsonWebKeyResponse:
                  $ref: '#/components/examples/OAuth2ResourceServerJsonWebKey'
        '400':
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: './Common.yaml#/components/schemas/Error'
              examples:
                ErrorDeactivateActiveKey:
                  $ref: '#/components/examples/ErrorDeactivateActiveKey'
        '401':
          $ref: './Common.yaml#/components/responses/ErrorInvalidToken401'
        '403':
          $ref: './Common.yaml#/components/responses/ErrorAccessDenied403'
        '404':
          $ref: './Common.yaml#/components/responses/ErrorResourceNotFound404'
        '429':
          $ref: './Common.yaml#/components/responses/ErrorTooManyRequests429'
      security:
        - apiToken: [ ]
        - oauth2:
            - okta.authorizationServers.manage
      tags:
        - OAuth2ResourceServerCredentialsKeys
components:
  examples:
    AddOAuth2ResourceServerJsonWebKeyRequest:
      summary: JSON Web Key request example
      value:
        kid: 'ASHJHGasa782333-Sla3x3POBiIxDreBCdZuFs5B'
        kty: RSA
        use: enc
        e: AQAB
        n: "AJncrzOrouIUCSMlRL0HU.....Kuine49_CEVR4GPn="
        status: INACTIVE
    OAuth2ResourceServerJsonWebKey:
      summary: JSON Web Key example
      value:
        id: apk2f4zrZbs8nUa7p0g4
        kid: 'ASHJHGasa782333-Sla3x3POBiIxDreBCdZuFs5B'
        kty: RSA
        alg: RS256
        use: enc
        e: AQAB
        n: "AJncrzOrouIUCSMlRL0HU.....Kuine49_CEVR4GPn="
        status: INACTIVE
        created: '2023-04-06T21:32:33.000Z'
        lastUpdated: '2023-04-06T21:32:33.000Z'
        _links:
          delete:
            href: https://{yourOktaDomain}/api/v1/authorizationServers/{authorizationServerId}/resourceservercredentials/keys/RQ8DuhdxCczyMvy7GNJb4Ka3lQ99vrSo3oFBUiZjzzc/lifecycle/delete
            hints:
              allow:
                - DELETE
    ListOAuth2ResourceServerJsonWebKeys:
      summary: All OAuth2 Resource Server JSON Web Keys
      value:
        - status: ACTIVE
          id: apk40n33xfjbPaf6D0g5
          e: AQAB
          n: "g0MirhrysJMPm_wK45jvMbbyanfhl-jmTBv0o69GeifPaISaXGv8LKn3-CyJvUJcjjeHE17KtumJWVxUDRzFqtIMZ1ctCZyIAuWO0n
              LKilg7_EIDXJrS8k14biqkPO1lXGFwtjo3zLHeFSLw6sWf-CEN9zv6Ff3IAXb-RMYpfh-bVrxIgWsWCxjLW-UKI3la-gs0nWHH2PJr5HLJuI
              JIOL5HLJuIJIOLWahqTnm_r1LSCSYr6N4C-fh--w2_BW8DzTHalBYe76bNr0d7AqtR4tGazmrvrc79Wa2bjyxmhhN1u9jSaZQqq-3VZEod8q3,
              WHH2PJ5v1LoXniJQ4a2W8nDVqb6h4E8MUKYOpljTfQ"
          kid: RQ8DuhdxCczyMvy7GNJb4Ka3lQ99vrSo3oFBUiZjzzc
          kty: RSA
          use: enc
          created: '2023-04-06T21:32:33.000Z'
