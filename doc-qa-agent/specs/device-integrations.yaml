openapi: 3.0.3
info:
  title: Device Integrations API
  version: 1.0.0
servers:
  - url: https://example.okta.com
tags:
  $ref: ../base.yaml#/tags
paths:
  /api/v1/device-integrations:
    get:
      x-okta-lifecycle:
        features:
          - DEVICE_INTEGRATIONS_PUBLIC_API
      summary: List all device integrations
      description: Lists all device integrations for your org. Examples include Device Posture Provider, Windows Security Center, Chrome Device Trust, OSQuery, and Android Device Trust.
      operationId: listDeviceIntegrations
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/DeviceIntegrations'
        '401':
          $ref: ./Common.yaml#/components/responses/ErrorInvalidToken401
        '403':
          $ref: ./Common.yaml#/components/responses/ErrorAccessDenied403
        '429':
          $ref: ./Common.yaml#/components/responses/ErrorTooManyRequests429
      security:
        - apiToken: []
        - oauth2:
            - okta.deviceIntegrations.read
      tags:
        - DeviceIntegrations
  /api/v1/device-integrations/{deviceIntegrationId}:
    parameters:
      - $ref: '#/components/parameters/pathDeviceIntegrationId'
    get:
      x-okta-lifecycle:
        features:
          - DEVICE_INTEGRATIONS_PUBLIC_API
      summary: Retrieve a device integration
      description: Retrieves a device integration by `deviceIntegrationId`
      operationId: getDeviceIntegration
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DeviceIntegrations'
              examples:
                CrowdStrike:
                  $ref: '#/components/examples/DeviceIntegrationCrowdStrikeResponse'
                WindowsSecurityCenter:
                  $ref: '#/components/examples/DeviceIntegrationWindowsSecurityCenterResponse'
                ChromeDeviceTrustConnector:
                  $ref: '#/components/examples/DeviceIntegrationChromeDeviceTrustConnectorResponse'
                DevicePostureIdP:
                  $ref: '#/components/examples/DeviceIntegrationDevicePostureIdPResponse'
                DevicePostureCheck:
                  $ref: '#/components/examples/DeviceIntegrationDevicePostureCheckResponse'
                AndroidZeroTrust:
                  $ref: '#/components/examples/DeviceIntegrationAndroidZeroTrustResponse'
        '401':
          $ref: ./Common.yaml#/components/responses/ErrorInvalidToken401
        '403':
          $ref: ./Common.yaml#/components/responses/ErrorAccessDenied403
        '429':
          $ref: ./Common.yaml#/components/responses/ErrorTooManyRequests429
      security:
        - apiToken: []
        - oauth2:
            - okta.deviceIntegrations.read
      tags:
        - DeviceIntegrations
  /api/v1/device-integrations/{deviceIntegrationId}/lifecycle/activate:
    parameters:
      - $ref: '#/components/parameters/pathDeviceIntegrationId'
    post:
      x-okta-lifecycle:
        features:
          - DEVICE_INTEGRATIONS_PUBLIC_API
      summary: Activate a device integration
      description: Activates a device integration and populates the related configurations by `deviceIntegrationId`
      operationId: activateDeviceIntegration
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DeviceIntegrations'
              examples:
                ChromeDeviceTrustConnector:
                  $ref: '#/components/examples/DeviceIntegrationChromeDeviceTrustConnectorResponse'
                DevicePostureIdP:
                  $ref: '#/components/examples/DeviceIntegrationDevicePostureIdPResponse'
                DevicePostureCheck:
                  $ref: '#/components/examples/DeviceIntegrationDevicePostureCheckResponse'
                AndroidZeroTrust:
                  $ref: '#/components/examples/DeviceIntegrationAndroidZeroTrustResponse'
        '401':
          $ref: ./Common.yaml#/components/responses/ErrorInvalidToken401
        '403':
          $ref: ./Common.yaml#/components/responses/ErrorAccessDenied403
        '404':
          $ref: ./Common.yaml#/components/responses/ErrorResourceNotFound404
        '429':
          $ref: ./Common.yaml#/components/responses/ErrorTooManyRequests429
      security:
        - apiToken: []
        - oauth2:
            - okta.deviceIntegrations.manage
      tags:
        - DeviceIntegrations
  /api/v1/device-integrations/{deviceIntegrationId}/lifecycle/deactivate:
    parameters:
      - $ref: '#/components/parameters/pathDeviceIntegrationId'
    post:
      x-okta-lifecycle:
        features:
          - DEVICE_INTEGRATIONS_PUBLIC_API
      summary: Deactivate a device integration
      description: Deactivates a device integration by `deviceIntegrationId`
      operationId: deactivateDeviceIntegration
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DeviceIntegrations'
              examples:
                CrowdStrike:
                  $ref: '#/components/examples/DeviceIntegrationCrowdStrikeResponse'
                WindowsSecurityCenter:
                  $ref: '#/components/examples/DeviceIntegrationWindowsSecurityCenterResponse'
        '401':
          $ref: ./Common.yaml#/components/responses/ErrorInvalidToken401
        '403':
          $ref: ./Common.yaml#/components/responses/ErrorAccessDenied403
        '404':
          $ref: ./Common.yaml#/components/responses/ErrorResourceNotFound404
        '429':
          $ref: ./Common.yaml#/components/responses/ErrorTooManyRequests429
      security:
        - apiToken: []
        - oauth2:
            - okta.deviceIntegrations.manage
      tags:
        - DeviceIntegrations
