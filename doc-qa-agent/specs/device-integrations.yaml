  parameters:
    pathDeviceIntegrationId:
      in: path
      name: deviceIntegrationId
      required: true
      description: The ID of the device integration
      schema:
        type: string
  schemas:
    DeviceIntegrations:
      title: DeviceIntegrations
      type: object
      properties:
        id:
          type: string
          readOnly: true
          description: The ID of the device integration
        name:
          $ref: '#/components/schemas/DeviceIntegrationsName'
        displayName:
          type: string
          description: The display name of the device integration
        status:
          $ref: '#/components/schemas/DeviceIntegrationsStatus'
        platform:
          $ref: '#/components/schemas/DeviceIntegrationsPlatform'
        metadata:
          $ref: '#/components/schemas/DeviceIntegrationsMetadata'
        _links:
          $ref: ./Common.yaml#/components/schemas/LinksSelfAndLifecycle
    DeviceIntegrationsName:
      description: The namespace of the device integration
      type: string
      enum:
        - com.crowdstrike.zta
        - com.okta.windowssecuritycenter
        - com.google.dtc
        - com.okta.deviceidp
        - com.okta.workspaceone
        - com.okta.device.osquery
        - com.android.zero.trust
    DeviceIntegrationsStatus:
      description: The status of the device integration
      type: string
      enum:
        - ACTIVE
        - DEACTIVATED
    DeviceIntegrationsPlatform:
      type: string
      enum:
        - MACOS
        - WINDOWS
        - CHROMEOS
        - IOS
        - ANDROID
    DeviceIntegrationsMetadata:
      description: The metadata of the device integration
      type: object
      x-okta-ignore-redocly-rules-for-sdk: true
      oneOf:
        - type: object
          properties:
            type:
              type: string
              enum:
                - CHROME
            serviceAccountName:
              type: string
            serviceAccountEmail:
              type: string
          required:
            - type
            - serviceAccountName
            - serviceAccountEmail
        - type: object
          properties:
            type:
              type: string
              enum:
                - WORKSPACE_ONE
            provider:
              type: string
            enrollmentUrl:
              type: string
            idpId:
              type: string
          required:
            - type
            - provider
            - enrollmentUrl
            - idpId
        - type: object
          properties:
            type:
              type: string
              enum:
                - DEVICE_IDP
            idpId:
              type: string
          required:
            - type
            - idpId
  securitySchemes:
    $ref: ../base.yaml#/components/securitySchemes
