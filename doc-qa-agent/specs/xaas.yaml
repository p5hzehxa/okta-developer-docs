      description: Replaces an existing user for the given identity source instance and external ID
      operationId: replaceExistingIdentitySourceUser
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserRequestSchema'
            examples:
              userReplacePayload:
