        - apiToken: []
        - oauth2:
            - okta.identitySources.manage
      tags:
        - IdentitySource
    x-okta-team-detail:
      x-team-slack: eng-iga
  /api/v1/identity-sources/{identitySourceId}/sessions/{sessionId}/bulk-groups-upsert:
    parameters:
