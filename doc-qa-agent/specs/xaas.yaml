      operationId: getIdentitySourceGroupMemberships
      parameters:
        - $ref: ./Common.yaml#/components/parameters/queryAfter
        - name: limit
          in: query
          description: |-
            Specifies the number of group membership results in a page. Okta recommends using a specific value other than the default or maximum.
            If your request times out, retry your request with a smaller `limit` and [page the results](https://developer.okta.com/docs/api/#pagination).
