  /api/v1/apps/{appId}/credentials/csrs:
    parameters:
      - $ref: ./Common.yaml#/components/parameters/pathAppId
    get:
      summary: List all certificate signing requests
      description: Lists all certificate signing requests for an app
      operationId: listCsrsForApplication
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Csr'
        '403':
          $ref: ./Common.yaml#/components/responses/ErrorAccessDenied403
        '404':
          $ref: ./Common.yaml#/components/responses/ErrorResourceNotFound404
        '429':
          $ref: ./Common.yaml#/components/responses/ErrorTooManyRequests429
      security:
        - apiToken: []
        - oauth2:
            - okta.apps.read
      tags:
        - ApplicationSSOCredentialKey
    post:
      summary: Generate a certificate signing request
      description: |-
        Generates a new key pair and returns the certificate signing request (CSR) for it. The information in a CSR is used by the Certificate Authority (CA) to verify and create your certificate. It also contains the public key that's included in your certificate.

        Returns CSR in `pkcs#10` format if the `Accept` media type is `application/pkcs10` or a CSR object if the `Accept` media type is `application/json`.
        > **Note:** The key pair isn't listed in the key credentials for the app until it's published.
      operationId: generateCsrForApplication
      x-codegen-request-body-name: metadata
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CsrMetadata'
        required: true
      responses:
        '201':
          description: Created
          headers:
            Content-Type:
              schema:
                type: string
              description: The Content-Type of the response
              examples:
                pkcs10Header:
                  summary: application/pkcs10 Content-Type header
                  value: application/pkcs10; filename=okta.p10
                json:
                  summary: application/json Content-Type header
                  value: application/json
            Content-Transfer-Encoding:
              schema:
                type: string
              description: Encoding of the response
              example: base64
          content:
            application/pkcs10:
              schema:
                $ref: '#/components/schemas/AppCsrPkcs10'
              examples:
                CsrPkcs10Response:
                  $ref: '#/components/examples/AppCsrPkcs10Response'
            application/json:
              schema:
                $ref: '#/components/schemas/Csr'
              examples:
                CsrJsonResponse:
                  $ref: '#/components/examples/AppCsrJsonResponse'
        '400':
          $ref: ./Common.yaml#/components/responses/ErrorApiValidationFailed400
        '403':
          $ref: ./Common.yaml#/components/responses/ErrorAccessDenied403
        '404':
          $ref: ./Common.yaml#/components/responses/ErrorResourceNotFound404
        '429':
          $ref: ./Common.yaml#/components/responses/ErrorTooManyRequests429
      security:
        - apiToken: []
        - oauth2:
            - okta.apps.manage
      tags:
        - ApplicationSSOCredentialKey
    x-okta-team-detail:
      x-team-slack: amp-eng-outbound-fed
