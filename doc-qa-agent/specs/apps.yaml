            description: Unique string associated with each authentication request
        - name: state
          in: query
          schema:
            type: string
            description: A temporary code string that the client exchanges for an access token
      responses:
        '204':
          description: No content
        '403':
          $ref: ./Common.yaml#/components/responses/ErrorAccessDenied403
        '404':
          $ref: ./Common.yaml#/components/responses/ErrorResourceNotFound404
        '429':
          $ref: ./Common.yaml#/components/responses/ErrorTooManyRequests429
      security:
        - apiToken: []
        - oauth2:
            - okta.apps.manage
      tags:
        - ApplicationConnections
    x-okta-team-detail:
      x-team-slack: eng-msapps
  /api/v1/apps/{appId}/sso/saml/metadata:
    parameters:
      - $ref: ./Common.yaml#/components/parameters/pathAppId
    get:
      summary: Preview the application SAML metadata
