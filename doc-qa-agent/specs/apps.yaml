openapi: 3.0.3
info:
  title: Apps API
  version: 1.0.0
servers:
  - url: https://example.okta.com
tags:
  $ref: ../base.yaml#/tags
paths:
  /api/v1/apps:
    get:
      summary: List all applications
      description: |-
        Lists all apps in the org with pagination. A subset of apps can be returned that match a supported filter expression or query. The results are [paginated](/#pagination) according to the `limit` parameter. If there are multiple pages of results, the header contains a `next` link. Treat the link as an opaque value (follow it, don't parse it).

        > **Note:** To list all of a member's assigned app links, use the [List all assigned app links endpoint in the User Resources API](/openapi/okta-management/management/userresources/listapplinks).
      operationId: listApplications
      parameters:
        - name: q
          in: query
          description: Searches for apps with `name` or `label` properties that starts with the `q` value using the `startsWith` operation
          schema:
            type: string
            example: Okta
        - name: after
          in: query
          description: Specifies the [pagination](/#pagination) cursor for the next page of results. Treat this as an opaque value obtained through the `next` link relationship.
          schema:
            type: string
            example: 16278919418571
        - name: useOptimization
          in: query
          description: Specifies whether to use query optimization. If you specify `useOptimization=true` in the request query, the response contains a subset of app instance properties.
          schema:
            type: boolean
            default: false
        - name: alwaysIncludeVpnSettings
          in: query
          description: Specifies whether to include the VPN configuration for existing notifications in the result, regardless of whether VPN notifications are configured
          schema:
            type: boolean
            default: false
        - name: limit
          in: query
          description: Specifies the number of results per page
          schema:
            type: integer
            format: int32
            default: -1
            maximum: 200
        - name: filter
          in: query
          description: 'Filters apps with a supported expression for a subset of properties. Filtering supports the following limited number of properties: `id`, `status`, `credentials.signing.kid`, `settings.slo.enabled`, or `name`. See [Filter](https://developer.okta.com/docs/api/#filter).'
          schema:
            type: string
          x-okta-feature-flag-amends:
            SECURE_AI_AGENTS_APP_INSTANCE:
              schema:
                type: string
              description: 'Filters apps with a supported expression for a subset of properties. Filtering supports the following limited number of properties: `id`, `status`, `credentials.signing.kid`, `settings.slo.enabled`, `name`, `agentic`, or `agentic.linkable`.'
          examples:
            ActiveStatusEx:
              value: status%20eq%20%22ACTIVE%22
              summary: Filter for active apps
            NameFilterEx:
              value: name%20eq%20%22okta_org2org%22
              summary: Filter for apps with `okta_org2org` name
            CredKidEx:
              value: credentials.signing.kid%20eq%20%22SIMcCQNY3uwXoW3y0vf6VxiBb5n9pf8L2fK8d-F1bm4%22
              summary: Filter for apps using a specific key
        - $ref: '#/components/parameters/queryAppsExpand'
        - name: includeNonDeleted
          description: Specifies whether to include non-active, but not deleted apps in the results
          in: query
          schema:
            type: boolean
            default: false
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Application'
              examples:
                ResponseExample1:
                  $ref: '#/components/examples/GetApplicationsByUserResponseEx'
                ResponseExample2:
                  $ref: '#/components/examples/GetApplicationsByGroupResponseEx'
                ResponseExample3:
                  $ref: '#/components/examples/GetApplicationsByKeyResponseEx'
                ResponseExample4:
                  $ref: '#/components/examples/GetApplicationsByNameResponseEx'
        '403':
          $ref: ./Common.yaml#/components/responses/ErrorAccessDenied403
        '429':
          $ref: ./Common.yaml#/components/responses/ErrorTooManyRequests429
      security:
        - apiToken: []
        - oauth2:
            - okta.apps.read
      tags:
        - Application
    post:
      summary: Create an application
      description: |
        Creates an app instance in your Okta org.

        You can either create an OIN app instance or a custom app instance:
        * OIN app instances have prescribed `name` (key app definition) and `signOnMode` options. See the [OIN schemas](/openapi/okta-management/management/application/googleapplication) for the request body.
        * For custom app instances, select the [signOnMode](/openapi/okta-management/management/tags/application/other/createapplication#application/createapplication/t=request&path=&d=0/signonmode) that pertains to your app and specify the required parameters in the request body.
      operationId: createApplication
      parameters:
        - name: activate
          in: query
          description: Executes activation lifecycle operation when creating the app
          schema:
            type: boolean
            default: true
        - name: OktaAccessGateway-Agent
          in: header
          schema:
            type: string
      x-codegen-request-body-name: application
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Application'
            examples:
              BOOKMARK:
                $ref: '#/components/examples/BookmarkEx'
              AUTO_LOGIN:
                $ref: '#/components/examples/AutoLoginEx'
              BASIC_AUTH:
                $ref: '#/components/examples/BasicAuthEx'
              SECURE_PASSWORD_STORE:
                $ref: '#/components/examples/SecurePasswordStoreEx'
              WS_FEDERATION:
                $ref: '#/components/examples/WSFederationEx'
              BROWSER_PLUGIN:
                $ref: '#/components/examples/BrowserPluginEx'
              BROWSER_PLUGIN_SWA_3FIELD:
                $ref: '#/components/examples/BrowserPluginSwa3FieldEx'
              SAML_2_0:
                $ref: '#/components/examples/Saml2.0Ex'
              OPENID_CONNECT:
                $ref: '#/components/examples/OpenidConnectEx'
        required: true
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Application'
              examples:
                BOOKMARK:
                  $ref: '#/components/examples/BookmarkAppResponseEx'
                AUTO_LOGIN:
                  $ref: '#/components/examples/AutoLoginAppResponseEx'
                BASIC_AUTH:
                  $ref: '#/components/examples/BasicAuthResponseEx'
                SECURE_PASSWORD_STORE:
                  $ref: '#/components/examples/SecurePasswordStoreResponseEx'
                WS_FEDERATION:
                  $ref: '#/components/examples/WSFederationResponseEx'
                BROWSER_PLUGIN:
                  $ref: '#/components/examples/BrowserPluginResponseEx'
                BROWSER_PLUGIN_SWA_3FIELD:
                  $ref: '#/components/examples/BrowserPluginSwa3FieldResponseEx'
                SAML_2_0:
                  $ref: '#/components/examples/Saml2.0ResponseEx'
                OPENID_CONNECT:
                  $ref: '#/components/examples/OpenidConnectResponseEx'
        '400':
          $ref: ./Common.yaml#/components/responses/ErrorApiValidationFailed400
        '403':
          $ref: ./Common.yaml#/components/responses/ErrorAccessDenied403
        '429':
          $ref: ./Common.yaml#/components/responses/ErrorTooManyRequests429
      security:
        - apiToken: []
        - oauth2:
            - okta.apps.manage
      tags:
        - Application
    x-okta-team-detail:
      x-team-slack: oin-integration-platform
  /api/v1/apps/{appId}:
    parameters:
      - $ref: ./Common.yaml#/components/parameters/pathAppId
    get:
      summary: Retrieve an application
      description: Retrieves an application from your Okta organization by `id`
      operationId: getApplication
      parameters:
        - name: expand
          in: query
          description: |-
            An optional query parameter to return the specified [Application User](/openapi/okta-management/management/applicationusers) in the `_embedded` property.
            Valid value: `expand=user/{userId}`
          schema:
            type: string
            example: user/0oa1gjh63g214q0Hq0g4
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Application'
              examples:
                RetrieveEx1:
                  $ref: '#/components/examples/GetApplicationsResponseEx'
        '403':
          $ref: ./Common.yaml#/components/responses/ErrorAccessDenied403
        '404':
          $ref: ./Common.yaml#/components/responses/ErrorResourceNotFound404
        '429':
          $ref: ./Common.yaml#/components/responses/ErrorTooManyRequests429
      security:
        - apiToken: []
        - oauth2:
            - okta.apps.read
      tags:
        - Application
    put:
      summary: Replace an application
      description: |
        Replaces properties for an application
        > **Notes:**
        > * All required properties must be specified in the request body
        > * You can't modify system-assigned properties, such as `id`, `name`, `status`, `created`, and `lastUpdated`. The values for these properties in the PUT request body are ignored.
      operationId: replaceApplication
      x-codegen-request-body-name: application
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Application'
            examples:
              BOOKMARK:
                $ref: '#/components/examples/BookmarkPutEx'
              AUTO_LOGIN:
                $ref: '#/components/examples/AutoLoginPutEx'
              BASIC_AUTH:
                $ref: '#/components/examples/BasicAuthPutEx'
              SECURE_PASSWORD_STORE:
                $ref: '#/components/examples/SecurePasswordStorePutEx'
              WS_FEDERATION:
                $ref: '#/components/examples/WSFederationPutEx'
              BROWSER_PLUGIN:
                $ref: '#/components/examples/BrowserPluginPutEx'
              BROWSER_PLUGIN_SWA_3FIELD:
                $ref: '#/components/examples/BrowserPluginSwa3FieldPutEx'
              SAML_2_0:
                $ref: '#/components/examples/Saml2.0PutEx'
              OPENID_CONNECT:
                $ref: '#/components/examples/OpenidConnectPutEx'
        required: true
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Application'
              examples:
                BOOKMARK:
                  $ref: '#/components/examples/BookmarkPutResponseEx'
                AUTO_LOGIN:
                  $ref: '#/components/examples/AutoLoginPutResponseEx'
                BASIC_AUTH:
                  $ref: '#/components/examples/BasicAuthPutResponseEx'
                SECURE_PASSWORD_STORE:
                  $ref: '#/components/examples/SecurePasswordStorePutResponseEx'
                WS_FEDERATION:
                  $ref: '#/components/examples/WSFederationPutResponseEx'
                BROWSER_PLUGIN:
                  $ref: '#/components/examples/BrowserPluginPutResponseEx'
                BROWSER_PLUGIN_SWA_3FIELD:
                  $ref: '#/components/examples/BrowserPluginSwa3FieldPutResponseEx'
                SAML_2_0:
                  $ref: '#/components/examples/Saml2.0PutResponseEx'
                OPENID_CONNECT:
                  $ref: '#/components/examples/OpenidConnectPutResponseEx'
        '400':
          $ref: ./Common.yaml#/components/responses/ErrorApiValidationFailed400
        '403':
          $ref: ./Common.yaml#/components/responses/ErrorAccessDenied403
        '404':
          $ref: ./Common.yaml#/components/responses/ErrorResourceNotFound404
        '429':
          $ref: ./Common.yaml#/components/responses/ErrorTooManyRequests429
      security:
        - apiToken: []
        - oauth2:
            - okta.apps.manage
      tags:
        - Application
    delete:
      summary: Delete an application
      description: Deletes an inactive application
      operationId: deleteApplication
      responses:
        '204':
          description: No Content
          content: {}
        '403':
          $ref: ./Common.yaml#/components/responses/ErrorAccessDenied403
        '404':
          $ref: ./Common.yaml#/components/responses/ErrorResourceNotFound404
        '429':
          $ref: ./Common.yaml#/components/responses/ErrorTooManyRequests429
      security:
        - apiToken: []
        - oauth2:
            - okta.apps.manage
      tags:
        - Application
    x-okta-team-detail:
      x-team-slack: oin-integration-platform
  /api/v1/apps/{appId}/connections/default:
    parameters:
      - $ref: ./Common.yaml#/components/parameters/pathAppId
    get:
      summary: Retrieve the default provisioning connection
      description: Retrieves the default provisioning connection for an app
      operationId: getDefaultProvisioningConnectionForApplication
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProvisioningConnectionResponse'
              examples:
                ProvisioningConnectionTokenZscalerEx:
                  $ref: '#/components/examples/ProvisioningConnectionTokenResponseWithProfileZscalerEx'
                ProvisioningConnectionTokenOrg2OrgEx:
                  $ref: '#/components/examples/ProvisioningConnectionTokenResponseWithProfileOrg2OrgEx'
                ProvisioningConnectionOauthO365Ex:
                  $ref: '#/components/examples/ProvisioningConnectionOauthResponseEx'
        '403':
          $ref: ./Common.yaml#/components/responses/ErrorAccessDenied403
        '404':
          $ref: ./Common.yaml#/components/responses/ErrorResourceNotFound404
        '429':
          $ref: ./Common.yaml#/components/responses/ErrorTooManyRequests429
      security:
        - apiToken: []
        - oauth2:
            - okta.apps.read
      tags:
        - ApplicationConnections
    post:
      summary: Update the default provisioning connection
      description: Updates the default provisioning connection for an app
      operationId: updateDefaultProvisioningConnectionForApplication
      parameters:
        - in: query
          name: activate
          schema:
            type: boolean
          description: Activates the provisioning connection
      requestBody:
        content:
          application/json:
            schema:
              oneOf:
                - $ref: '#/components/schemas/ProvisioningConnectionTokenRequest'
                - $ref: '#/components/schemas/ProvisioningConnectionOauthRequest'
            examples:
              ProvisioningConnectionTokenZscalerEx:
                $ref: '#/components/examples/ProvisioningConnectionTokenRequestEx'
              ProvisioningConnectionTokenOrg2OrgEx:
                $ref: '#/components/examples/ProvisioningConnectionTokenOrg2OrgRequestEx'
              ProvisioningConnectionOAuthOrg2OrgEx:
                $ref: '#/components/examples/ProvisioningConnectionOAuthOrg2OrgWithRotationRequestEx'
              ProvisioningConnectionOauthO365Ex:
                $ref: '#/components/examples/ProvisioningConnectionOauthO365RequestEx'
        required: true
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProvisioningConnectionResponse'
              examples:
                ProvisioningConnectionTokenZscalerEx:
                  $ref: '#/components/examples/ProvisioningConnectionTokenResponseWithProfileZscalerEx'
                ProvisioningConnectionTokenOrg2OrgEx:
                  $ref: '#/components/examples/ProvisioningConnectionTokenResponseWithProfileOrg2OrgEx'
                ProvisioningConnectionOAuthOrg2OrgEx:
                  $ref: '#/components/examples/ProvisioningConnectionOAuthOrg2OrgWithRotationResponseEx'
                ProvisioningConnectionOauthO365Ex:
                  $ref: '#/components/examples/ProvisioningConnectionOauthResponseEx'
        '400':
          $ref: ./Common.yaml#/components/responses/ErrorApiValidationFailed400
        '403':
          $ref: ./Common.yaml#/components/responses/ErrorAccessDenied403
        '404':
          $ref: ./Common.yaml#/components/responses/ErrorResourceNotFound404
        '429':
          $ref: ./Common.yaml#/components/responses/ErrorTooManyRequests429
      security:
        - apiToken: []
        - oauth2:
            - okta.apps.manage
      tags:
        - ApplicationConnections
    x-okta-team-detail:
      x-team-slack: oin-integration-platform
  /api/v1/apps/{appId}/connections/default/lifecycle/activate:
    parameters:
      - $ref: ./Common.yaml#/components/parameters/pathAppId
    post:
      summary: Activate the default provisioning connection
      description: Activates the default provisioning connection for an app
      operationId: activateDefaultProvisioningConnectionForApplication
      responses:
        '204':
          description: No Content
        '403':
          $ref: ./Common.yaml#/components/responses/ErrorAccessDenied403
        '404':
          $ref: ./Common.yaml#/components/responses/ErrorResourceNotFound404
        '429':
          $ref: ./Common.yaml#/components/responses/ErrorTooManyRequests429
      security:
        - apiToken: []
        - oauth2:
            - okta.apps.manage
      tags:
        - ApplicationConnections
    x-okta-team-detail:
      x-team-slack: oin-integration-platform
  /api/v1/apps/{appId}/connections/default/lifecycle/deactivate:
    parameters:
      - $ref: ./Common.yaml#/components/parameters/pathAppId
    post:
      summary: Deactivate the default provisioning connection
      description: Deactivates the default provisioning connection for an app
      operationId: deactivateDefaultProvisioningConnectionForApplication
      responses:
        '204':
          description: No Content
        '403':
          $ref: ./Common.yaml#/components/responses/ErrorAccessDenied403
        '404':
          $ref: ./Common.yaml#/components/responses/ErrorResourceNotFound404
        '429':
          $ref: ./Common.yaml#/components/responses/ErrorTooManyRequests429
      security:
        - apiToken: []
        - oauth2:
            - okta.apps.manage
      tags:
        - ApplicationConnections
    x-okta-team-detail:
      x-team-slack: oin-integration-platform
  /api/v1/apps/{appId}/connections/default/jwks:
    parameters:
      - $ref: ./Common.yaml#/components/parameters/pathAppId
    get:
      summary: Retrieve a JSON Web Key Set (JWKS) for the default provisioning connection
      description: Retrieves a JWKS for the default provisioning connection.  This can be used by the OAuth 2.0 app's `jwk_uri` property in the target org.
      operationId: getUserProvisioningConnectionJWKS
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AppConnectionUserProvisionJWKResponse'
              examples:
                UserProvisioningJsonWebKeysResponseExample:
                  $ref: '#/components/examples/UserProvisioningJsonWebKeysResponse'
        '401':
          $ref: ./Common.yaml#/components/responses/ErrorInvalidToken401
        '404':
          $ref: ./Common.yaml#/components/responses/ErrorResourceNotFound404
        '429':
          $ref: ./Common.yaml#/components/responses/ErrorTooManyRequests429
      security:
        - apiToken: []
        - oauth2:
            - okta.apps.read
      tags:
        - ApplicationConnections
    x-okta-team-detail:
      x-team-slack: eng-account-services
  /api/v1/apps/{appName}/{appId}/oauth2/callback:
    parameters:
      - $ref: '#/components/parameters/pathOAuthProvisioningAppName'
      - $ref: ./Common.yaml#/components/parameters/pathAppId
    post:
      summary: Verify the provisioning connection
      description: |
        Verifies the OAuth 2.0-based connection as part of the OAuth 2.0 consent flow. The validation of the consent flow is the last step of the provisioning setup for an OAuth 2.0-based connection.
        Currently, this operation only supports `office365`,`google`, `zoomus`, and `slack` apps.
      operationId: verifyProvisioningConnectionForApplication
      parameters:
        - name: code
          in: query
          schema:
            type: string
            description: Unique string associated with each authentication request
        - name: state
          in: query
          schema:
            type: string
            description: A temporary code string that the client exchanges for an access token
      responses:
        '204':
          description: No content
        '403':
          $ref: ./Common.yaml#/components/responses/ErrorAccessDenied403
        '404':
          $ref: ./Common.yaml#/components/responses/ErrorResourceNotFound404
        '429':
          $ref: ./Common.yaml#/components/responses/ErrorTooManyRequests429
      security:
        - apiToken: []
        - oauth2:
            - okta.apps.manage
      tags:
        - ApplicationConnections
    x-okta-team-detail:
      x-team-slack: oin-integration-platform
  /api/v1/apps/google/{appId}/oauth2/callback:
    parameters:
      - $ref: ./Common.yaml#/components/parameters/pathAppId
    post:
      summary: Verify the provisioning connection for Google Workspace
      x-okta-lifecycle:
        lifecycle: PRODUCT_DEV
        isGenerallyAvailable: false
        SKUs: []
      description: |
        Verifies the OAuth 2.0-based connection as part of the OAuth 2.0 consent flow. The validation of the consent flow is the last step of the provisioning setup for the Google Workspace (`google`) OAuth 2.0-based connection.
      operationId: verifyProvisioningConnectionForGoogleApplication
      parameters:
        - name: code
          in: query
          schema:
            type: string
            description: Unique string associated with each authentication request
        - name: state
          in: query
          schema:
            type: string
            description: A temporary code string that the client exchanges for an access token
      responses:
        '204':
          description: No content
        '403':
          $ref: ./Common.yaml#/components/responses/ErrorAccessDenied403
        '404':
          $ref: ./Common.yaml#/components/responses/ErrorResourceNotFound404
        '429':
          $ref: ./Common.yaml#/components/responses/ErrorTooManyRequests429
      security:
        - apiToken: []
        - oauth2:
            - okta.apps.manage
      tags:
        - ApplicationConnections
    x-okta-team-detail:
      x-team-slack: eng-adv_apps
  /api/v1/apps/office365/{appId}/oauth2/callback:
    parameters:
      - $ref: ./Common.yaml#/components/parameters/pathAppId
    post:
      summary: Verify the provisioning connection for Microsoft Office 365
      x-okta-lifecycle:
