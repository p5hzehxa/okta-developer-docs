    pathOsAccountId:
      name: osAccountId
      in: path
      description: The unique identifier for the OS account
      required: true
      schema:
        type: string
      example: dao3qgkIEKjhNZudR0g4
  schemas:
    Device:
      type: object
      properties:
        created:
          type: string
          format: date-time
          description: Timestamp when the device was created
          readOnly: true
        id:
          type: string
          description: Unique key for the device
          readOnly: true
        lastUpdated:
          type: string
          format: date-time
          description: Timestamp when the device record was last updated. Updates occur when Okta collects and saves device signals during authentication, and when the lifecycle state of the device changes.
          readOnly: true
        profile:
          $ref: '#/components/schemas/DeviceProfile'
        resourceAlternateId:
          type: string
          readOnly: true
        resourceDisplayName:
          $ref: '#/components/schemas/DeviceDisplayName'
        resourceId:
          type: string
          description: Alternate key for the `id`
          readOnly: true
        resourceType:
          type: string
          default: UDDevice
          readOnly: true
        status:
          $ref: '#/components/schemas/DeviceStatus'
        _links:
          $ref: '#/components/schemas/LinksSelfAndFullUsersLifecycle'
    DeviceList:
      x-okta-ignore-redocly-rules-for-sdk: true
      allOf:
        - $ref: '#/components/schemas/Device'
        - properties:
            _embedded:
              type: object
              description: List of associated users for the device if the `expand=user` query parameter is specified in the request. Use `expand=userSummary` to get only a summary of each associated user for the device.
              properties:
                users:
                  description: Users for the device
                  type: array
                  items:
                    $ref: '#/components/schemas/DeviceUser'
              readOnly: true
    LinksSelfAndFullUsersLifecycle:
      x-okta-ignore-redocly-rules-for-sdk: true
      allOf:
        - $ref: ./Common.yaml#/components/schemas/LinksSelfAndLifecycle
        - type: object
          properties:
            suspend:
              $ref: ./Common.yaml#/components/schemas/HrefObjectSuspendLink
            unsuspend:
              $ref: ./Common.yaml#/components/schemas/HrefObjectUnsuspendLink
            users:
              description: Link to device users
              allOf:
                - $ref: ./Common.yaml#/components/schemas/HrefObject
    DeviceDisplayName:
      type: object
      description: Display name of the device
      properties:
        sensitive:
          type: boolean
          description: Indicates whether the associated value is Personal Identifiable Information (PII) and requires masking
          default: false
        value:
          type: string
          description: Display name of the device
    DevicePlatform:
      description: OS platform of the device
      type: string
      enum:
        - ANDROID
        - IOS
        - MACOS
        - WINDOWS
    OSAccountPlatform:
      description: OS platform for OS accounts (desktop platforms only)
      type: string
      enum:
        - MACOS
        - WINDOWS
      x-enumDescriptions:
        MACOS: macOS operating system
        WINDOWS: Windows operating system
    DiskEncryptionTypeDef:
      description: |-
        Type of encryption used on the device
        > **Note:** The following values map to Disk Encryption ON: `FULL`, `USER`, `ALL_INTERNAL_VOLUMES`. All other values map to Disk Encryption OFF.
      type: string
      enum:
        - NONE
        - FULL
        - USER
        - ALL_INTERNAL_VOLUMES
        - SYSTEM_VOLUME
      x-enumDescriptions:
        NONE: No encryption has been set.
        FULL: Disk is fully encrypted. Only applicable to `IOS` and `ANDROID` platforms.
        USER: Encryption key is tied to the user or profile. Only applicable to `ANDROID` platform.
        ALL_INTERNAL_VOLUMES: All internal disks are encrypted. Only applicable to `WINDOWS` and `MACOS` platforms.
        SYSTEM_VOLUME: Only the system volume is encrypted. Only applicable to `WINDOWS` and `MACOS` platforms.
    DeviceUser:
      type: object
      properties:
        created:
          type: string
          description: Timestamp when device was created
        managementStatus:
          type: string
          description: The management status of the device
          enum:
            - MANAGED
            - NOT_MANAGED
          x-enumDescriptions:
            MANAGED: The device has management software installed
            NOT_MANAGED: The device doesn't have management software installed
        screenLockType:
          type: string
          description: Screen lock type of the device
          enum:
            - NONE
            - PASSCODE
            - BIOMETRIC
        user:
          $ref: ./users.yaml#/components/schemas/User
    DeviceProfile:
      type: object
      properties:
        displayName:
          type: string
          description: Display name of the device
          minLength: 1
          maxLength: 255
        imei:
          type: string
          description: International Mobile Equipment Identity (IMEI) of the device
          minLength: 14
          maxLength: 17
        manufacturer:
          type: string
          description: Name of the manufacturer of the device
          maxLength: 127
        managed:
          type: boolean
          description: Indicates if the device is managed by mobile device management (MDM) software
        meid:
          type: string
          description: Mobile equipment identifier of the device
          maxLength: 14
        model:
          type: string
          description: Model of the device
          maxLength: 127
        osVersion:
          type: string
          description: Version of the device OS
          maxLength: 127
        platform:
          $ref: '#/components/schemas/DevicePlatform'
        registered:
          type: boolean
          description: Indicates if the device is registered at Okta
        secureHardwarePresent:
          type: boolean
          description: Indicates if the device contains a secure hardware functionality
        serialNumber:
          type: string
          description: Serial number of the device
          maxLength: 127
        sid:
          type: string
          description: Windows Security identifier of the device
          maxLength: 256
        tpmPublicKeyHash:
          type: string
          description: Windows Trusted Platform Module hash value
        udid:
          type: string
          description: macOS Unique device identifier of the device
          maxLength: 47
        diskEncryptionType:
          $ref: '#/components/schemas/DiskEncryptionTypeDef'
        integrityJailbreak:
          type: boolean
          description: Indicates if the device is jailbroken or rooted. Only applicable to `IOS` and `ANDROID` platforms
      required:
        - displayName
        - platform
        - registered
    DeviceStatus:
      type: string
      description: The state object of the device
      enum:
        - ACTIVE
        - DEACTIVATED
        - SUSPENDED
        - UNSUSPENDED
      x-enumDescriptions:
        ACTIVE: Use activated devices to create and delete device user links
        DEACTIVATED: Deactivation causes a device to lose all device user links. Set the device status to `DEACTIVATED` before deleting it.
        SUSPENDED: Use suspended devices to create and delete device user links. You can only unsuspend or deactivate suspended devices.
        UNSUSPENDED: Returns a suspended device to `ACTIVE`.
    OSAccount:
      type: object
      required:
        - id
        - deviceId
        - created
        - lastUpdated
        - platform
        - _links
      properties:
        id:
          type: string
          description: Unique identifier for the OS account
          readOnly: true
        deviceId:
          type: string
          description: Unique identifier of the device this OS account belongs to
          readOnly: true
        created:
          type: string
          format: date-time
          description: Timestamp when the OS account was created
          readOnly: true
        lastUpdated:
          type: string
          format: date-time
          description: Timestamp when the OS account was last updated
          readOnly: true
        platform:
          $ref: '#/components/schemas/OSAccountPlatform'
        _links:
          $ref: '#/components/schemas/OSAccountLinks'
      discriminator:
        propertyName: platform
        mapping:
          WINDOWS: '#/components/schemas/OSAccountWindows'
          MACOS: '#/components/schemas/OSAccountMacOS'
    OSAccountWindows:
      allOf:
        - $ref: '#/components/schemas/OSAccount'
        - type: object
          required:
            - profile
          properties:
            profile:
              $ref: '#/components/schemas/WindowsOSAccountProfile'
    OSAccountMacOS:
      allOf:
        - $ref: '#/components/schemas/OSAccount'
        - type: object
          required:
            - profile
          properties:
            profile:
              $ref: '#/components/schemas/MacOSAccountProfile'
    WindowsOSAccountProfile:
      type: object
      properties:
        securityId:
          type: string
          description: Windows Security Identifier (SID)
          example: S-1-5-21-1004336348-1177238915-682003330-512
        GUID:
          type: string
          format: uuid
          description: Globally Unique Identifier for the account
          example: 4ac29c85-d847-4492-96cb-46e337170c33
        directoryJoinStatus:
          type: string
          description: Active Directory join status
          example: AD
        fullName:
          type: string
          description: Full name of the account user
          example: Carmel Sonne
        downLevelUsername:
          type: string
          description: Domain\username format (down-level logon name)
          example: okta\carmel.sonne
        upn:
          type: string
          description: User principal name
          example: carmel.sonne@okta.com
        qualifiedUsername:
          type: string
          description: Fully qualified username
          example: okta\carmel.sonne
    MacOSAccountProfile:
      type: object
      properties:
        accountUUID:
          type: string
          format: uuid
          description: Unique identifier for the macOS account
          example: 4ac29c85-d847-4492-96cb-46e337170c33
        username:
          type: string
          description: Username of the account
          example: carmel.sonne
        fullName:
          type: string
          description: Full name of the account user
          example: Carmel Sonne
    OSAccountLinks:
      type: object
      properties:
        self:
          $ref: './Common.yaml#/components/schemas/HrefObject'
        device:
          $ref: './Common.yaml#/components/schemas/HrefObject'
  securitySchemes:
    $ref: ../base.yaml#/components/securitySchemes
