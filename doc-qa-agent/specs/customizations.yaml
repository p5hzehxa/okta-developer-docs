  parameters:
    pathBrandId:
      name: brandId
      in: path
      required: true
      schema:
        type: string
      description: The ID of the brand
    pathCustomizationId:
      name: customizationId
      in: path
      required: true
      schema:
        type: string
      description: The ID of the email customization
    pathTemplateName:
      name: templateName
      in: path
      required: true
      schema:
        type: string
      description: The name of the email template
    pathThemeId:
      name: themeId
      in: path
      required: true
      schema:
        type: string
      description: The ID of the theme
    pathWellKnownUriPath:
      name: path
      in: path
      required: true
      schema:
        type: string
        enum:
          - apple-app-site-association
          - assetlinks.json
          - webauthn
      description: The path of the well-known URI
    queryExpandWellKnownUri:
      name: expand
      in: query
      style: form
      explode: false
      required: false
      schema:
        type: array
        items:
          type: string
          enum:
            - customized
      description: Specifies additional metadata to include in the response
    queryExpandWellKnownUris:
      name: expand
      in: query
      style: form
      explode: false
      required: false
      schema:
        type: array
        items:
          type: string
          enum:
            - all
            - apple-app-site-association
            - assetlinks.json
            - webauthn
      description: Specifies additional metadata to include in the response
    queryExpandBrand:
      name: expand
      in: query
      style: form
      explode: false
      required: false
      schema:
        type: array
        items:
          type: string
          enum:
            - themes
            - domains
            - emailDomain
      description: Specifies additional metadata to be included in the response
    queryExpandEmailTemplate:
      name: expand
      in: query
      style: form
      explode: false
      required: false
      schema:
        type: array
        items:
          type: string
          enum:
            - settings
            - customizationCount
      description: Specifies additional metadata to be included in the response
    queryExpandPageRoot:
      name: expand
      in: query
      style: form
      explode: false
      required: false
      schema:
        type: array
        items:
          type: string
          enum:
            - default
            - customized
            - customizedUrl
            - preview
            - previewUrl
      description: Specifies additional metadata to be included in the response
    queryLanguage:
      name: language
      schema:
        $ref: ./Common.yaml#/components/schemas/Language
      in: query
      description: The language to use for the email. Defaults to the current user's language if unspecified.
  schemas:
    Brand:
      type: object
      properties:
        agreeToCustomPrivacyPolicy:
          type: boolean
          description: Consent for updating the custom privacy URL. Not required when resetting the URL.
        customPrivacyPolicyUrl:
          type: string
          description: Custom privacy policy URL
          default: null
        defaultApp:
          $ref: '#/components/schemas/DefaultApp'
        emailDomainId:
          type: string
          description: The ID of the email domain
        id:
          readOnly: true
          type: string
          description: The Brand ID
        isDefault:
          readOnly: true
          type: boolean
          description: If `true`, the Brand is used for the Okta subdomain
        locale:
          $ref: ./Common.yaml#/components/schemas/Language
        name:
          type: string
          description: The name of the Brand
        removePoweredByOkta:
          type: boolean
          default: false
          description: Removes "Powered by Okta" from the sign-in page in redirect authentication deployments, and "© [current year] Okta, Inc." from the Okta End-User Dashboard
    BrandWithEmbedded:
      x-okta-ignore-redocly-rules-for-sdk: true
      allOf:
        - $ref: '#/components/schemas/Brand'
      type: object
      properties:
        _embedded:
          type: object
          properties:
            themes:
              type: array
              items:
                $ref: '#/components/schemas/ThemeResponse'
            domains:
              items:
                $ref: ./domains.yaml#/components/schemas/DomainResponse
              type: array
            emailDomain:
              $ref: ./emailDomains.yaml#/components/schemas/EmailDomainResponse
          readOnly: true
        _links:
          allOf:
            - $ref: ./Common.yaml#/components/schemas/LinksSelf
            - properties:
                themes:
                  $ref: ./Common.yaml#/components/schemas/HrefObject
    BrandDomains:
      description: Defines a list of domains with a subset of the properties for each domain
      type: object
      properties:
        domains:
          description: Each element of the array defines an individual domain
          type: array
          items:
            $ref: ./domains.yaml#/components/schemas/DomainResponse
    BrandRequest:
      type: object
      properties:
        agreeToCustomPrivacyPolicy:
          type: boolean
          description: Consent for updating the custom privacy URL. Not required when resetting the URL.
        customPrivacyPolicyUrl:
          type: string
          description: Custom privacy policy URL
        defaultApp:
          $ref: '#/components/schemas/DefaultApp'
        emailDomainId:
          type: string
          description: The ID of the email domain
        locale:
          $ref: ./Common.yaml#/components/schemas/Language
        name:
          type: string
          description: |-
            The name of the brand

            > **Note:** You can't use the reserved `DRAPP_DOMAIN_BRAND` name.
        removePoweredByOkta:
          type: boolean
          default: false
          description: Removes "Powered by Okta" from the sign-in page in redirect authentication deployments, and "© [current year] Okta, Inc." from the Okta End-User Dashboard
      required:
        - name
    ContentSecurityPolicySetting:
      type: object
      properties:
        mode:
          type: string
          enum:
            - enforced
            - report_only
        reportUri:
          type: string
        srcList:
          type: array
          items:
            type: string
    CreateBrandRequest:
      title: CreateBrandRequest
      type: object
      properties:
        name:
          type: string
          description: |-
            The name of the brand

            > **Note:** You can't use the reserved `DRAPP_DOMAIN_BRAND` name.
      required:
        - name
    CustomizablePage:
      type: object
      properties:
        pageContent:
          type: string
          description: The HTML for the page
    DefaultApp:
      type: object
      properties:
        appInstanceId:
          type: string
          description: ID for the App instance
        appLinkName:
          type: string
          description: Name for the app instance
        classicApplicationUri:
          type: string
          description: Application URI for classic Orgs
    EmailContent:
      type: object
      properties:
        body:
          type: string
          description: |
            The HTML body of the email. May contain [variable references](https://velocity.apache.org/engine/1.7/user-guide.html#references). 

            <x-lifecycle class="ea"></x-lifecycle> Not required if Custom languages for Okta Email Templates is enabled. A `null` body is replaced with a default value from one of the following in priority order:

            1. An existing default email customization, if one exists
            2. Okta-provided translated content for the specified language, if one exists
            3. Okta-provided translated content for the brand locale, if it's set 
            4. Okta-provided content in English
        subject:
          type: string
          description: |
            The email subject. May contain [variable references](https://velocity.apache.org/engine/1.7/user-guide.html#references).

            <x-lifecycle class="ea"></x-lifecycle> Not required if Custom languages for Okta Email Templates is enabled. A `null` subject is replaced with a default value from one of the following in priority order:

            1. An existing default email customization, if one exists
            2. Okta-provided translated content for the specified language, if one exists
            3. Okta-provided translated content for the brand locale, if it's set
            4. Okta-provided content in English
      required:
        - subject
        - body
    EmailCustomization:
      x-okta-ignore-redocly-rules-for-sdk: true
      allOf:
        - $ref: '#/components/schemas/EmailContent'
        - type: object
          properties:
            created:
              type: string
              format: date-time
              readOnly: true
              description: The UTC time at which this email customization was created.
            id:
              type: string
              readOnly: true
              description: A unique identifier for this email customization
            isDefault:
              type: boolean
              description: Whether this is the default customization for the email template. Each customized email template must have exactly one default customization. Defaults to `true` for the first customization and `false` thereafter.
            language:
              $ref: ./Common.yaml#/components/schemas/Language
            lastUpdated:
              type: string
              format: date-time
              readOnly: true
              description: The UTC time at which this email customization was last updated.
            _links:
              allOf:
                - $ref: ./Common.yaml#/components/schemas/LinksSelf
                - properties:
                    self:
                      $ref: ./Common.yaml#/components/schemas/HrefObject
                    template:
                      $ref: ./Common.yaml#/components/schemas/HrefObject
                    preview:
                      $ref: ./Common.yaml#/components/schemas/HrefObject
                    test:
                      $ref: ./Common.yaml#/components/schemas/HrefObject
          required:
            - language
    EmailDefaultContent:
      x-okta-ignore-redocly-rules-for-sdk: true
      allOf:
        - $ref: '#/components/schemas/EmailContent'
        - type: object
          properties:
            _links:
              type: object
              allOf:
                - $ref: ./Common.yaml#/components/schemas/LinksSelf
                - properties:
                    template:
                      $ref: ./Common.yaml#/components/schemas/HrefObject
                    preview:
                      $ref: ./Common.yaml#/components/schemas/HrefObject
                    test:
                      $ref: ./Common.yaml#/components/schemas/HrefObject
    EmailPreview:
      type: object
      x-okta-ignore-redocly-rules-for-sdk: true
      properties:
        body:
          type: string
          readOnly: true
          description: The email's HTML body
        subject:
          type: string
          readOnly: true
          description: The email's subject
        _links:
          allOf:
            - $ref: ./Common.yaml#/components/schemas/LinksSelf
            - properties:
                contentSource:
                  $ref: ./Common.yaml#/components/schemas/HrefObject
                template:
                  $ref: ./Common.yaml#/components/schemas/HrefObject
                test:
                  $ref: ./Common.yaml#/components/schemas/HrefObject
                defaultContent:
                  $ref: ./Common.yaml#/components/schemas/HrefObject
    EmailSettingsResponse:
      type: object
      x-okta-ignore-redocly-rules-for-sdk: true
      properties:
        recipients:
          type: string
          enum:
            - ALL_USERS
            - ADMINS_ONLY
            - NO_USERS
        _links:
          allOf:
            - $ref: ./Common.yaml#/components/schemas/LinksSelf
            - properties:
                self:
                  $ref: ./Common.yaml#/components/schemas/HrefObject
                template:
                  $ref: ./Common.yaml#/components/schemas/HrefObject
    EmailSettings:
      type: object
      properties:
        recipients:
          type: string
          enum:
            - ALL_USERS
            - ADMINS_ONLY
            - NO_USERS
      required:
