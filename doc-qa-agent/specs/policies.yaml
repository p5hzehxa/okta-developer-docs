            The following policy types are available with Identity Engine: `ACCESS_POLICY`, `PROFILE_ENROLLMENT`, `POST_AUTH_SESSION`, <x-lifecycle class="ea"></x-lifecycle> `DEVICE_SIGNAL_COLLECTION`, <x-lifecycle class="ea"></x-lifecycle> `SESSION_VIOLATION_DETECTION`, `ENTITY_RISK`.
          enum:
            - ACCESS_POLICY
            - <x-lifecycle class="ea"></x-lifecycle> DEVICE_SIGNAL_COLLECTION
            - IDP_DISCOVERY
            - MFA_ENROLL
            - OKTA_SIGN_ON
            - PASSWORD
            - PROFILE_ENROLLMENT
            - POST_AUTH_SESSION
            - ENTITY_RISK
            - <x-lifecycle class="ea"></x-lifecycle> SESSION_VIOLATION_DETECTION
        OKTA_VERIFY_RELEASE_CONTROL_POLICY:
          description: |-
            All Okta orgs contain only one IdP discovery policy with an immutable default rule routing to your org's sign-in page, one entity risk policy, and one session protection policy.
            Creating or replacing a policy with the `IDP_DISCOVERY` type, the `ENTITY_RISK` type, the `POST_AUTH_SESSION`, or the <x-lifecycle class="ea"></x-lifecycle> `CLIENT_UPDATE` type isn't supported.
            The following policy types are available with Identity Engine: `ACCESS_POLICY`, `PROFILE_ENROLLMENT`, `POST_AUTH_SESSION`, <x-lifecycle class="ea"></x-lifecycle> `DEVICE_SIGNAL_COLLECTION`, `ENTITY_RISK`.
          enum:
