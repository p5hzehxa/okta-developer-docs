openapi: 3.0.3
info:
  title: Policies API
  version: 1.0.0
servers:
  - url: https://example.okta.com
tags:
  $ref: ../base.yaml#/tags
paths:
  /api/v1/policies:
    get:
      summary: List all policies
      description: Lists all policies with the specified type
      operationId: listPolicies
      parameters:
        - name: type
          in: query
          required: true
          schema:
            type: string
            enum:
              - OKTA_SIGN_ON
              - PASSWORD
              - MFA_ENROLL
              - IDP_DISCOVERY
              - ACCESS_POLICY
              - DEVICE_SIGNAL_COLLECTION
              - PROFILE_ENROLLMENT
              - POST_AUTH_SESSION
              - ENTITY_RISK
          description: Specifies the type of policy to return. The following policy types are available only with the Okta Identity Engine - `ACCESS_POLICY`, <x-lifecycle class="ea"></x-lifecycle> `DEVICE_SIGNAL_COLLECTION`, `PROFILE_ENROLLMENT`, `POST_AUTH_SESSION` and `ENTITY_RISK`.
          x-okta-feature-flag-amends:
            SESSION_VIOLATION_DETECTION_CONFIGURATION:
              schema:
                type: string
                enum:
                  - OKTA_SIGN_ON
                  - PASSWORD
                  - MFA_ENROLL
                  - IDP_DISCOVERY
                  - ACCESS_POLICY
                  - DEVICE_SIGNAL_COLLECTION
                  - PROFILE_ENROLLMENT
                  - POST_AUTH_SESSION
                  - SESSION_VIOLATION_DETECTION
                  - ENTITY_RISK
              description: Specifies the type of policy to return. The following policy types are available only with the Okta Identity Engine - `ACCESS_POLICY`, <x-lifecycle class="ea"></x-lifecycle> `DEVICE_SIGNAL_COLLECTION`, `PROFILE_ENROLLMENT`, `POST_AUTH_SESSION`, <x-lifecycle class="ea"></x-lifecycle> `SESSION_VIOLATION_DETECTION` and `ENTITY_RISK`.
            OKTA_VERIFY_RELEASE_CONTROL_POLICY:
              schema:
                type: string
                enum:
                  - OKTA_SIGN_ON
                  - PASSWORD
                  - MFA_ENROLL
                  - IDP_DISCOVERY
                  - ACCESS_POLICY
                  - DEVICE_SIGNAL_COLLECTION
                  - PROFILE_ENROLLMENT
                  - POST_AUTH_SESSION
                  - ENTITY_RISK
                  - CLIENT_UPDATE
              description: Specifies the type of policy to return. The following policy types are available only with the Okta Identity Engine - `ACCESS_POLICY`, <x-lifecycle class="ea"></x-lifecycle> `DEVICE_SIGNAL_COLLECTION`, `PROFILE_ENROLLMENT`, `POST_AUTH_SESSION`, `ENTITY_RISK`, and <x-lifecycle class="ea"></x-lifecycle> `CLIENT_UPDATE`.
        - name: status
          in: query
          schema:
            type: string
          description: Refines the query by the `status` of the policy - `ACTIVE` or `INACTIVE`
        - name: q
          in: query
          schema:
            type: string
          description: Refines the query by policy name prefix (startWith method) passed in as `q=string`
        - name: expand
          in: query
          schema:
            type: string
            default: ''
        - name: sortBy
          in: query
          schema:
            type: string
          description: Refines the query by sorting on the policy `name` in ascending order
        - name: limit
          in: query
          schema:
            type: string
          description: Defines the number of policies returned, see [Pagination](https://developer.okta.com/docs/api/#pagination)
        - name: resourceId
          in: query
          schema:
            type: string
          description: Reference to the associated authorization server
        - name: after
          in: query
          schema:
            type: string
          description: End page cursor for pagination, see [Pagination](https://developer.okta.com/docs/api/#pagination)
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Policy'
              examples:
                password:
                  $ref: '#/components/examples/password-policy-response'
                mfa-enroll:
                  $ref: '#/components/examples/mfa-enroll-policy-response'
                idp-discovery:
                  $ref: '#/components/examples/idp-discovery-policy-response'
                profile-enrollment:
                  $ref: '#/components/examples/profile-enrollment-policy-response'
                access-policy:
                  $ref: '#/components/examples/list-access-policy-response'
                device-signal-collection-policy:
                  $ref: '#/components/examples/list-device-signal-collection-policy-response'
                okta-sign-on-policy:
                  $ref: '#/components/examples/list-okta-sign-on-policy-response'
                entity-risk-policy:
                  $ref: '#/components/examples/list-entity-risk-policy-response'
                post-auth-session-policy:
                  $ref: '#/components/examples/list-post-auth-session-policy-response'
              x-okta-feature-flag-amends:
                SESSION_VIOLATION_DETECTION_CONFIGURATION:
                  examples:
                    session-violation-detection-policy:
                      $ref: '#/components/examples/list-session-violation-detection-policy-response'
                BREACHED_CREDENTIALS_ADMIN_UX:
                  examples:
                    passwordWithBreachedProtection:
                      $ref: '#/components/examples/password-policy-with-breached-protection-response'
                ENROLLMENT_POLICY_GRACE_PERIOD:
                  examples:
                    mfa-enroll:
                      $ref: '#/components/examples/mfa-enroll-policy-with-grace-period-response'
        '403':
          $ref: ./Common.yaml#/components/responses/ErrorAccessDenied403
        '429':
          $ref: ./Common.yaml#/components/responses/ErrorTooManyRequests429
      security:
        - apiToken: []
        - oauth2:
            - okta.policies.read
      tags:
        - Policy
    post:
      summary: Create a policy
      description: Creates a policy. There are many types of policies that you can create. See [Policies](https://developer.okta.com/docs/concepts/policies/) for an overview of the types of policies available and links to more indepth information.
      operationId: createPolicy
      parameters:
        - name: activate
          description: This query parameter is only valid for Classic Engine orgs.
          in: query
          schema:
            type: boolean
            default: true
      x-codegen-request-body-name: policy
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateOrUpdatePolicy'
        required: true
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CreateOrUpdatePolicy'
              examples:
                password:
                  $ref: '#/components/examples/password-policy-response'
                mfa-enroll:
                  $ref: '#/components/examples/mfa-enroll-policy-response'
                idp-discovery:
                  $ref: '#/components/examples/idp-discovery-policy-response'
                profile-enrollment:
                  $ref: '#/components/examples/profile-enrollment-policy-response'
                access-policy:
                  $ref: '#/components/examples/create-access-policy-response'
                device-signal-collection-policy:
                  $ref: '#/components/examples/device-signal-collection-policy-response'
                okta-sign-on-policy:
                  $ref: '#/components/examples/create-okta-sign-on-policy-response'
              x-okta-feature-flag-amends:
                BREACHED_CREDENTIALS_ADMIN_UX:
                  examples:
                    passwordWithBreachedProtection:
                      $ref: '#/components/examples/password-policy-with-breached-protection-response'
                ENROLLMENT_POLICY_GRACE_PERIOD:
                  examples:
                    mfa-enroll:
                      $ref: '#/components/examples/mfa-enroll-policy-with-grace-period-response'
        '400':
          $ref: ./Common.yaml#/components/responses/ErrorApiValidationFailed400
        '403':
          $ref: ./Common.yaml#/components/responses/ErrorAccessDenied403
        '429':
          $ref: ./Common.yaml#/components/responses/ErrorTooManyRequests429
      security:
        - apiToken: []
        - oauth2:
            - okta.policies.manage
      tags:
        - Policy
    x-okta-team-detail:
      x-team-slack: amp-eng-authn-platform
  /api/v1/policies/{policyId}:
    parameters:
      - $ref: '#/components/parameters/pathPolicyId'
    get:
      summary: Retrieve a policy
      description: Retrieves a policy
      operationId: getPolicy
      parameters:
        - name: expand
          in: query
          schema:
            type: string
            default: ''
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Policy'
              examples:
                password:
                  $ref: '#/components/examples/password-policy-response'
                mfa-enroll:
                  $ref: '#/components/examples/mfa-enroll-policy-response'
                idp-discovery:
                  $ref: '#/components/examples/idp-discovery-policy-response'
                profile-enrollment:
                  $ref: '#/components/examples/profile-enrollment-policy-response'
                access-policy:
                  $ref: '#/components/examples/create-access-policy-response'
                device-signal-collection-policy:
                  $ref: '#/components/examples/device-signal-collection-policy-response'
                okta-sign-on-policy:
                  $ref: '#/components/examples/create-okta-sign-on-policy-response'
                entity-risk-policy:
                  $ref: '#/components/examples/get-entity-risk-policy-response'
                post-auth-session-policy:
                  $ref: '#/components/examples/get-post-auth-session-policy-response'
              x-okta-feature-flag-amends:
                SESSION_VIOLATION_DETECTION_CONFIGURATION:
                  examples:
                    session-violation-detection-policy:
                      $ref: '#/components/examples/get-session-violation-detection-policy-response'
                BREACHED_CREDENTIALS_ADMIN_UX:
                  examples:
                    passwordWithBreachedProtection:
                      $ref: '#/components/examples/password-policy-with-breached-protection-response'
                ENROLLMENT_POLICY_GRACE_PERIOD:
                  examples:
                    mfa-enroll:
                      $ref: '#/components/examples/mfa-enroll-policy-with-grace-period-response'
        '403':
          $ref: ./Common.yaml#/components/responses/ErrorAccessDenied403
        '404':
          $ref: ./Common.yaml#/components/responses/ErrorResourceNotFound404
        '429':
          $ref: ./Common.yaml#/components/responses/ErrorTooManyRequests429
      security:
        - apiToken: []
        - oauth2:
            - okta.policies.read
      tags:
        - Policy
    put:
      summary: Replace a policy
      description: Replaces the properties of a policy identified by `policyId`
      operationId: replacePolicy
      x-codegen-request-body-name: policy
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateOrUpdatePolicy'
        required: true
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Policy'
              examples:
                password:
                  $ref: '#/components/examples/password-policy-response'
                mfa-enroll:
                  $ref: '#/components/examples/mfa-enroll-policy-response'
                idp-discovery:
                  $ref: '#/components/examples/idp-discovery-policy-response'
                profile-enrollment:
                  $ref: '#/components/examples/profile-enrollment-policy-response'
                access-policy:
                  $ref: '#/components/examples/create-access-policy-response'
                device-signal-collection-policy:
                  $ref: '#/components/examples/device-signal-collection-policy-response'
                okta-sign-on-policy:
                  $ref: '#/components/examples/create-okta-sign-on-policy-response'
              x-okta-feature-flag-amends:
                BREACHED_CREDENTIALS_ADMIN_UX:
                  examples:
                    passwordWithBreachedProtection:
                      $ref: '#/components/examples/password-policy-with-breached-protection-response'
                ENROLLMENT_POLICY_GRACE_PERIOD:
                  examples:
                    mfa-enroll:
                      $ref: '#/components/examples/mfa-enroll-policy-with-grace-period-response'
        '400':
          $ref: ./Common.yaml#/components/responses/ErrorApiValidationFailed400
        '403':
          $ref: ./Common.yaml#/components/responses/ErrorAccessDenied403
        '404':
          $ref: ./Common.yaml#/components/responses/ErrorResourceNotFound404
        '429':
          $ref: ./Common.yaml#/components/responses/ErrorTooManyRequests429
      security:
        - apiToken: []
        - oauth2:
            - okta.policies.manage
      tags:
        - Policy
    delete:
      summary: Delete a policy
      description: Deletes a policy
      operationId: deletePolicy
      responses:
        '204':
          description: No Content
        '403':
          $ref: ./Common.yaml#/components/responses/ErrorAccessDenied403
        '404':
          $ref: ./Common.yaml#/components/responses/ErrorResourceNotFound404
        '429':
          $ref: ./Common.yaml#/components/responses/ErrorTooManyRequests429
      security:
        - apiToken: []
        - oauth2:
            - okta.policies.manage
      tags:
        - Policy
    x-okta-team-detail:
      x-team-slack: amp-eng-authn-platform
  /api/v1/policies/{policyId}/app:
    parameters:
      - $ref: '#/components/parameters/pathPolicyId'
    get:
      deprecated: true
      summary: List all apps mapped to a policy
      description: |-
        Lists all applications mapped to a policy identified by `policyId`

        > **Note:** Use [List all resources mapped to a policy](https://developer.okta.com/docs/api/openapi/okta-management/management/tags/policy/#tag/Policy/operation/listPolicyMappings) to list all applications mapped to a policy.
      operationId: listPolicyApps
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: ./apps.yaml#/components/schemas/Application
        '403':
          $ref: ./Common.yaml#/components/responses/ErrorAccessDenied403
        '404':
          $ref: ./Common.yaml#/components/responses/ErrorResourceNotFound404
        '429':
          $ref: ./Common.yaml#/components/responses/ErrorTooManyRequests429
      security:
        - apiToken: []
        - oauth2:
            - okta.policies.read
      tags:
        - Policy
  /api/v1/policies/{policyId}/clone:
    parameters:
      - $ref: '#/components/parameters/pathPolicyId'
    post:
      summary: Clone an existing policy
      description: Clones an existing policy
      operationId: clonePolicy
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Policy'
              examples:
                password:
                  $ref: '#/components/examples/password-policy-response'
                mfa-enroll:
                  $ref: '#/components/examples/mfa-enroll-policy-response'
                idp-discovery:
                  $ref: '#/components/examples/idp-discovery-policy-response'
                profile-enrollment:
                  $ref: '#/components/examples/profile-enrollment-policy-response'
                access-policy:
                  $ref: '#/components/examples/create-access-policy-response'
                okta-sign-on-policy:
                  $ref: '#/components/examples/create-okta-sign-on-policy-response'
              x-okta-feature-flag-amends:
                BREACHED_CREDENTIALS_ADMIN_UX:
                  examples:
                    passwordWithBreachedProtection:
                      $ref: '#/components/examples/password-policy-with-breached-protection-response'
                ENROLLMENT_POLICY_GRACE_PERIOD:
                  examples:
                    mfa-enroll:
                      $ref: '#/components/examples/mfa-enroll-policy-with-grace-period-response'
        '400':
          $ref: ./Common.yaml#/components/responses/ErrorApiValidationFailed400
        '403':
          $ref: ./Common.yaml#/components/responses/ErrorAccessDenied403
        '404':
          $ref: ./Common.yaml#/components/responses/ErrorResourceNotFound404
        '429':
          $ref: ./Common.yaml#/components/responses/ErrorTooManyRequests429
      security:
        - apiToken: []
        - oauth2:
            - okta.policies.manage
      tags:
        - Policy
    x-okta-team-detail:
      x-team-slack: amp-eng-authn-platform
  /api/v1/policies/{policyId}/lifecycle/activate:
    parameters:
      - $ref: '#/components/parameters/pathPolicyId'
    post:
      summary: Activate a policy
      description: Activates a policy
      operationId: activatePolicy
      responses:
        '204':
          description: No Content
          content: {}
        '403':
          $ref: ./Common.yaml#/components/responses/ErrorAccessDenied403
        '404':
          $ref: ./Common.yaml#/components/responses/ErrorResourceNotFound404
        '429':
          $ref: ./Common.yaml#/components/responses/ErrorTooManyRequests429
      security:
        - apiToken: []
        - oauth2:
            - okta.policies.manage
      tags:
        - Policy
    x-okta-team-detail:
      x-team-slack: amp-eng-authn-platform
  /api/v1/policies/{policyId}/lifecycle/deactivate:
    parameters:
      - $ref: '#/components/parameters/pathPolicyId'
    post:
      summary: Deactivate a policy
      description: Deactivates a policy
      operationId: deactivatePolicy
      responses:
        '204':
          description: No Content
          content: {}
        '403':
          $ref: ./Common.yaml#/components/responses/ErrorAccessDenied403
        '404':
          $ref: ./Common.yaml#/components/responses/ErrorResourceNotFound404
        '429':
          $ref: ./Common.yaml#/components/responses/ErrorTooManyRequests429
      security:
        - apiToken: []
        - oauth2:
            - okta.policies.manage
      tags:
        - Policy
    x-okta-team-detail:
      x-team-slack: amp-eng-authn-platform
  /api/v1/policies/{policyId}/mappings:
    parameters:
      - $ref: '#/components/parameters/pathPolicyId'
    get:
      summary: List all resources mapped to a policy
      description: Lists all resources mapped to a policy identified by `policyId`
      operationId: listPolicyMappings
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/PolicyMapping'
              examples:
                policy-mapping-response:
                  $ref: '#/components/examples/policy-mapping-list-response'
        '403':
          $ref: ./Common.yaml#/components/responses/ErrorAccessDenied403
        '404':
          $ref: ./Common.yaml#/components/responses/ErrorResourceNotFound404
        '429':
          $ref: ./Common.yaml#/components/responses/ErrorTooManyRequests429
      security:
        - apiToken: []
        - oauth2:
            - okta.policies.read
      tags:
        - Policy
    post:
      summary: Map a resource to a policy
      description: |-
        Maps a resource to a policy identified by `policyId`

        > **Note:** Use the [Assign an app sign-in policy](https://developer.okta.com/docs/api/openapi/okta-management/management/tag/ApplicationPolicies/#tag/ApplicationPolicies/operation/assignApplicationPolicy) endpoint to assign an app sign-in policy to an app.
      operationId: mapResourceToPolicy
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PolicyMappingRequest'
        required: true
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PolicyMapping'
              examples:
                policy-mapping-response:
                  $ref: '#/components/examples/policy-mapping-response'
        '400':
          $ref: ./Common.yaml#/components/responses/ErrorApiValidationFailed400
        '403':
          $ref: ./Common.yaml#/components/responses/ErrorAccessDenied403
        '404':
          $ref: ./Common.yaml#/components/responses/ErrorResourceNotFound404
        '429':
          $ref: ./Common.yaml#/components/responses/ErrorTooManyRequests429
      security:
        - apiToken: []
        - oauth2:
            - okta.policies.manage
      tags:
        - Policy
    x-okta-team-detail:
      x-team-slack: amp-eng-authn-platform
  /api/v1/policies/{policyId}/mappings/{mappingId}:
    parameters:
      - $ref: '#/components/parameters/pathPolicyId'
      - $ref: '#/components/parameters/pathPolicyMappingId'
    get:
      summary: Retrieve a policy resource mapping
      description: Retrieves a resource mapping for a policy identified by `policyId` and `mappingId`
      operationId: getPolicyMapping
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PolicyMapping'
              examples:
                policy-mapping-response:
                  $ref: '#/components/examples/policy-mapping-response'
        '403':
          $ref: ./Common.yaml#/components/responses/ErrorAccessDenied403
        '404':
          $ref: ./Common.yaml#/components/responses/ErrorResourceNotFound404
        '429':
          $ref: ./Common.yaml#/components/responses/ErrorTooManyRequests429
      security:
        - apiToken: []
        - oauth2:
            - okta.policies.read
      tags:
        - Policy
    delete:
      summary: Delete a policy resource mapping
      description: Deletes the resource mapping for a policy identified by `policyId` and `mappingId`
      operationId: deletePolicyResourceMapping
      responses:
        '204':
          description: No Content
          content: {}
        '403':
          $ref: ./Common.yaml#/components/responses/ErrorAccessDenied403
        '404':
          $ref: ./Common.yaml#/components/responses/ErrorResourceNotFound404
        '429':
          $ref: ./Common.yaml#/components/responses/ErrorTooManyRequests429
      security:
        - apiToken: []
        - oauth2:
            - okta.policies.manage
      tags:
        - Policy
    x-okta-team-detail:
      x-team-slack: amp-eng-authn-platform
  /api/v1/policies/{policyId}/rules:
    parameters:
      - $ref: '#/components/parameters/pathPolicyId'
      - $ref: '#/components/parameters/limitParameter'
    get:
      summary: List all policy rules
      description: Lists all policy rules
      operationId: listPolicyRules
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/PolicyRule'
              examples:
                okta-sign-on:
                  $ref: '#/components/examples/list-all-sign-on-policy-rule-response'
                access:
                  $ref: '#/components/examples/list-all-access-policy-rule-response'
                device-signal-collection:
                  $ref: '#/components/examples/list-all-device-signal-collection-rule-response'
                entity-risk:
                  $ref: '#/components/examples/list-all-entity-risk-policy-rule-response'
                post-auth-session:
                  $ref: '#/components/examples/list-all-post-auth-session-policy-rule-response'
                password:
                  $ref: '#/components/examples/list-all-password-policy-rule-response'
                idp-discovery:
                  $ref: '#/components/examples/list-all-idp-discovery-policy-rule-response'
                mfa-enroll:
                  $ref: '#/components/examples/list-all-mfa-enroll-policy-rule-response'
                profile-enrollment:
                  $ref: '#/components/examples/list-all-profile-enrollment-policy-rule-response'
                session-violation-detection:
                  $ref: '#/components/examples/list-all-session-violation-detection-policy-rule-response'
        '403':
          $ref: ./Common.yaml#/components/responses/ErrorAccessDenied403
        '404':
          $ref: ./Common.yaml#/components/responses/ErrorResourceNotFound404
        '429':
          $ref: ./Common.yaml#/components/responses/ErrorTooManyRequests429
      security:
        - apiToken: []
        - oauth2:
            - okta.policies.read
      tags:
        - Policy
    post:
      summary: Create a policy rule
      description: |-
        Creates a policy rule

        > **Note:** You can't create additional rules for the `PROFILE_ENROLLMENT` or `POST_AUTH_SESSION` policies.
      x-okta-feature-flag-amends:
        OKTA_VERIFY_RELEASE_CONTROL_POLICY:
          description: |-
            Creates a policy rule

            > **Note:** You can't create additional rules for the `PROFILE_ENROLLMENT`, `POST_AUTH_SESSION` or `CLIENT_UPDATE` policies.
      operationId: createPolicyRule
      parameters:
        - name: activate
          description: Set this parameter to `false` to create an `INACTIVE` rule.
          in: query
          schema:
            type: boolean
            default: true
      x-codegen-request-body-name: policyRule
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PolicyRule'
            examples:
              CreateAuthPolicyRuleDevicePlatformCondition:
                $ref: '#/components/examples/create-auth-policy-rule-condition'
              Enable2FAPreciseAuth:
                $ref: '#/components/examples/twofa-enabled-disallow-password-allow-phishing'
              CreateAuthPolicyRule2FAEnablePostAuthKmsi:
                $ref: '#/components/examples/twofa-enabled-post-auth-kmsi-enabled'
              CreateAuthPolicyRule2FADisablePostAuthKmsi:
                $ref: '#/components/examples/twofa-enabled-post-auth-kmsi-disabled'
              CreateAuthPolicyRuleAmc2Chains:
                $ref: '#/components/examples/amc-two-chain'
              DeviceSignalCollectionRule:
                $ref: '#/components/examples/create-device-signal-collection-rule'
              SignOnPolicy:
                $ref: '#/components/examples/sign-on-policy-rule'
              SkipFactorChallengeOnPremRule:
                $ref: '#/components/examples/skip-factor-challenge-on-prem-rule'
              RadiusRule:
                $ref: '#/components/examples/radius-rule'
