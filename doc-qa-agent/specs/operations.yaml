openapi: 3.0.3
info:
  title: Operations API
  version: 1.0.0
servers:
  - url: https://example.okta.com
tags:
  $ref: ../base.yaml#/tags
paths:
  /api/v1/operations/{operationId}:
    parameters:
      - $ref: '#/components/parameters/operationId'
    get:
      x-okta-lifecycle:
        lifecycle: PRODUCT_DEV
      operationId: getOperationStatus
      summary: Retrieve an operation status
      description: Retrieves an asynchronous operation and its current status
      tags:
        - OperationsIntegration
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OperationResponse'
              examples:
                OperationCompleted:
                  $ref: '#/components/examples/OperationCompletedResponse'
                OperationInProgress:
                  $ref: '#/components/examples/OperationInProgressResponse'
                OperationFailed:
                  $ref: '#/components/examples/OperationFailedResponse'
        '400':
          $ref: ./Common.yaml#/components/responses/ErrorApiValidationFailed400
        '403':
          $ref: ./Common.yaml#/components/responses/ErrorAccessDenied403
        '404':
          $ref: ./Common.yaml#/components/responses/ErrorResourceNotFound404
        '429':
          $ref: ./Common.yaml#/components/responses/ErrorTooManyRequests429
      security:
        - oauth2:
            - okta.operations.read
    x-okta-team-detail:
      x-team-slack: eng-ud-core
components:
  parameters:
    operationId:
      name: operationId
      in: path
      description: ID of the asynchronous operation in Okta
      schema:
        type: string
      required: true
  examples:
    OperationFailedResponse:
      summary: Operation Failed Response
      value:
        id: rdj2ccmltchKESW8u0g5
        type: read:directories
        status: FAILED
        created: '2023-10-01T12:00:00Z'
        started: '2023-10-01T12:05:00Z'
        completed: '2023-10-01T12:10:00Z'
    OperationInProgressResponse:
      summary: Operation In Progress Response
      value:
        id: rdj2ccmltchKESW8u0g5
        type: read:directories
        status: IN_PROGRESS
        created: '2023-10-01T12:00:00Z'
        started: '2023-10-01T12:05:00Z'
    OperationCompletedResponse:
      summary: Operation Completed Response
      value:
        id: rdj2ccmltchKESW8u0g5
        type: read:directories
        status: COMPLETED
        created: '2023-10-01T12:00:00Z'
        started: '2023-10-01T12:05:00Z'
        completed: '2023-10-01T12:10:00Z'
  schemas:
    OperationResponse:
      type: object
      required:
        - id
        - type
        - status
        - created
      properties:
        id:
          type: string
          description: ID of the asynchronous operation
        type:
          type: string
          description: The operation type
        status:
          type: string
          description: The status of the asynchronous operation
          enum:
            - COMPLETED
            - SCHEDULED
            - IN_PROGRESS
            - FAILED
        created:
          type: string
          description: Timestamp of when the operation was created
          format: date-time
        started:
          type: string
          description: Timestamp of when the operation started
          format: date-time
        completed:
          type: string
          description: Timestamp of when the operation completed
          format: date-time
    Error:
      title: Error
      type: object
      properties:
        errorCauses:
          type: array
          items:
            $ref: '#/components/schemas/ErrorCause'
        errorCode:
          type: string
          description: An Okta code for this type of error
        errorId:
          type: string
          description: A unique identifier for this error. This can be used by Okta Support to help with troubleshooting.
        errorLink:
          type: string
          description: An Okta code for this type of error
        errorSummary:
          type: string
          description: A short description of what caused this error. Sometimes this contains dynamically-generated information about your specific error.
    ErrorCause:
      type: object
      properties:
        errorSummary:
          type: string
  securitySchemes:
    $ref: ../base.yaml#/components/securitySchemes
