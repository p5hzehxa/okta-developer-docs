openapi: 3.0.3
info:
  title: Service Account Management API
  description: Service Account Management API
  version: 1.0.0
servers:
  - url: https://example.okta.com
tags:
  $ref: ../base.yaml#/tags
paths:
  ## The following endpoints are internal and will be deprecated.
  ## they will be replaced by /privileged-access/api/v1/service-accounts
  /privileged-access/api/v1/accounts:
    post:
      summary: Create a service account
      x-okta-lifecycle:
        lifecycle: PRODUCT_DEV
        isGenerallyAvailable: false
        SKUs: [ ]
      deprecated: true
      description: Creates a new service account for managing an Okta User or SaaS app account
      operationId: createServiceAccount
      x-codegen-request-body-name: body
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ServiceAccount'
        required: true
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ServiceAccount'
        '400':
          $ref: ./Common.yaml#/components/responses/ErrorApiValidationFailed400
        '403':
          $ref: ./Common.yaml#/components/responses/ErrorAccessDenied403
        '404':
          $ref: ./Common.yaml#/components/responses/ErrorResourceNotFound404
        '429':
          $ref: ./Common.yaml#/components/responses/ErrorTooManyRequests429
      security:
        - apiToken: [ ]
        - oauth2:
            - okta.serviceAccounts.manage
      tags:
        - ServiceAccount
    get:
      summary: List all service accounts
      x-okta-lifecycle:
        lifecycle: PRODUCT_DEV
        isGenerallyAvailable: false
        SKUs: [ ]
      deprecated: true
      description: Lists all service accounts
      operationId: listServiceAccounts
      parameters:
        - name: limit
          in: query
          description: Specifies the number of results returned
          schema:
            type: integer
            format: int32
            default: 200
        - $ref: ./Common.yaml#/components/parameters/queryAfter
        - name: q
          in: query
          description: Searches for service accounts where the account name, username, app instance name, or global app name contains the given value
          schema:
            type: string
      responses:
        '200':
          description: Success
          content:
            application/json:
              examples:
                ListServiceAccounts:
                  $ref: '#/components/examples/ListServiceAccounts'
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ServiceAccount'
        '400':
          $ref: ./Common.yaml#/components/responses/ErrorApiValidationFailed400
        '403':
          $ref: ./Common.yaml#/components/responses/ErrorAccessDenied403
        '404':
          $ref: ./Common.yaml#/components/responses/ErrorResourceNotFound404
        '429':
          $ref: ./Common.yaml#/components/responses/ErrorTooManyRequests429
      security:
        - apiToken: [ ]
        - oauth2:
            - okta.serviceAccounts.read
      tags:
        - ServiceAccount
    x-okta-team-detail:
      x-team-slack: eng-asa
  /privileged-access/api/v1/accounts/{id}:
    parameters:
      - $ref: '#/components/parameters/serviceAccountId'
    get:
      summary: Retrieve a service account
      x-okta-lifecycle:
        lifecycle: PRODUCT_DEV
        isGenerallyAvailable: false
        SKUs: [ ]
      deprecated: true
      description: Retrieves a service account specified by ID
      operationId: getServiceAccount
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ServiceAccount'
        '400':
          $ref: ./Common.yaml#/components/responses/ErrorApiValidationFailed400
        '403':
          $ref: ./Common.yaml#/components/responses/ErrorAccessDenied403
        '404':
          $ref: ./Common.yaml#/components/responses/ErrorResourceNotFound404
        '429':
          $ref: ./Common.yaml#/components/responses/ErrorTooManyRequests429
      security:
        - apiToken: [ ]
        - oauth2:
            - okta.serviceAccounts.read
      tags:
        - ServiceAccount
    patch:
      summary: Update a service account
      x-okta-lifecycle:
        lifecycle: PRODUCT_DEV
        isGenerallyAvailable: false
        SKUs: [ ]
      deprecated: true
      description: Updates a service account specified by ID
      operationId: updateServiceAccount
      x-codegen-request-body-name: body
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ServiceAccountForUpdate'
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ServiceAccount'
        '400':
          $ref: ./Common.yaml#/components/responses/ErrorApiValidationFailed400
        '403':
          $ref: ./Common.yaml#/components/responses/ErrorAccessDenied403
        '404':
          $ref: ./Common.yaml#/components/responses/ErrorResourceNotFound404
        '429':
          $ref: ./Common.yaml#/components/responses/ErrorTooManyRequests429
      security:
        - apiToken: [ ]
        - oauth2:
            - okta.serviceAccounts.manage
      tags:
        - ServiceAccount
    delete:
      summary: Delete a service account
      x-okta-lifecycle:
        lifecycle: PRODUCT_DEV
        isGenerallyAvailable: false
        SKUs: [ ]
      deprecated: true
      description: Deletes a service account specified by ID
      operationId: deleteServiceAccount
      responses:
        '204':
          description: No Content
        '400':
          $ref: ./Common.yaml#/components/responses/ErrorApiValidationFailed400
        '403':
          $ref: ./Common.yaml#/components/responses/ErrorAccessDenied403
        '404':
          $ref: ./Common.yaml#/components/responses/ErrorResourceNotFound404
        '429':
          $ref: ./Common.yaml#/components/responses/ErrorTooManyRequests429
      security:
        - apiToken: [ ]
        - oauth2:
            - okta.serviceAccounts.manage
      tags:
        - ServiceAccount

    ## The following endpoints will be available publicly for all app service accounts operations.
    x-okta-team-detail:
      x-team-slack: eng-asa
  /privileged-access/api/v1/service-accounts:
    post:
      summary: Create an app service account
      description: Creates a new app service account for managing an app account
      operationId: createAppServiceAccount
      x-codegen-request-body-name: body
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AppServiceAccount'
        required: true
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AppServiceAccount'
        '400':
          $ref: './Common.yaml#/components/responses/ErrorApiValidationFailed400'
        '403':
          $ref: './Common.yaml#/components/responses/ErrorAccessDenied403'
        '404':
          $ref: './Common.yaml#/components/responses/ErrorResourceNotFound404'
        '429':
          $ref: './Common.yaml#/components/responses/ErrorTooManyRequests429'
      security:
        - apiToken: [ ]
        - oauth2:
            - okta.serviceAccounts.manage
      tags:
        - ServiceAccount
    get:
      summary: List all app service accounts
      description: Lists all app service accounts
      operationId: listAppServiceAccounts
      parameters:
        - $ref: './Common.yaml#/components/parameters/queryLimit'
        - $ref: './Common.yaml#/components/parameters/queryAfter'
        - $ref: '#/components/parameters/matchQueryFilter'
      responses:
        '200':
          description: Success
          content:
            application/json:
              examples:
                ListAppServiceAccounts:
                  $ref: '#/components/examples/ListAppServiceAccounts'
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/AppServiceAccount'
        '400':
          $ref: './Common.yaml#/components/responses/ErrorApiValidationFailed400'
        '403':
          $ref: './Common.yaml#/components/responses/ErrorAccessDenied403'
        '404':
          $ref: './Common.yaml#/components/responses/ErrorResourceNotFound404'
        '429':
          $ref: './Common.yaml#/components/responses/ErrorTooManyRequests429'
      security:
        - apiToken: [ ]
        - oauth2:
            - okta.serviceAccounts.read
      tags:
        - ServiceAccount
    x-okta-team-detail:
      x-team-slack: eng-asa
  /privileged-access/api/v1/service-accounts/{id}:
    parameters:
      - $ref: '#/components/parameters/serviceAccountId'
    get:
      summary: Retrieve an app service account
      description: Retrieves an app service account specified by ID
      operationId: getAppServiceAccount
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AppServiceAccount'
        '400':
          $ref: './Common.yaml#/components/responses/ErrorApiValidationFailed400'
        '403':
          $ref: './Common.yaml#/components/responses/ErrorAccessDenied403'
        '404':
          $ref: './Common.yaml#/components/responses/ErrorResourceNotFound404'
        '429':
          $ref: './Common.yaml#/components/responses/ErrorTooManyRequests429'
      security:
        - apiToken: [ ]
        - oauth2:
            - okta.serviceAccounts.read
      tags:
        - ServiceAccount
    patch:
      summary: Update an existing app service account
      description: Updates an existing app service account specified by ID
      operationId: updateAppServiceAccount
      x-codegen-request-body-name: body
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AppServiceAccountForUpdate'
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AppServiceAccount'
        '400':
          $ref: './Common.yaml#/components/responses/ErrorApiValidationFailed400'
        '403':
          $ref: './Common.yaml#/components/responses/ErrorAccessDenied403'
        '404':
          $ref: './Common.yaml#/components/responses/ErrorResourceNotFound404'
        '429':
          $ref: './Common.yaml#/components/responses/ErrorTooManyRequests429'
      security:
        - apiToken: [ ]
        - oauth2:
            - okta.serviceAccounts.manage
      tags:
        - ServiceAccount
    delete:
      summary: Delete an app service account
      description: Deletes an app service account specified by ID
      operationId: deleteAppServiceAccount
      responses:
        '204':
          description: No Content
        '400':
          $ref: './Common.yaml#/components/responses/ErrorApiValidationFailed400'
        '403':
          $ref: './Common.yaml#/components/responses/ErrorAccessDenied403'
        '404':
          $ref: './Common.yaml#/components/responses/ErrorResourceNotFound404'
        '429':
          $ref: './Common.yaml#/components/responses/ErrorTooManyRequests429'
      security:
        - apiToken: [ ]
        - oauth2:
            - okta.serviceAccounts.manage
      tags:
        - ServiceAccount

  ## Okta Managed User Account APIs (NEW)
    x-okta-team-detail:
      x-team-slack: eng-asa
  /privileged-access/api/v1/okta-service-accounts:
    post:
      summary: Create an Okta managed user account
      description: |-
        Creates a new Okta managed user account for managing a Universal Directory user as a service account.
        
        You must specify an existing Okta user in your org with the `oktaUserId` request parameter.
      operationId: createOktaManagedUserAccount
      x-codegen-request-body-name: body
      x-okta-iam-admin-roles:
        - SUPER_ADMIN
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/OktaManagedUserAccountRequest'
            examples:
              CreateOktaManagedUserAccount:
                $ref: '#/components/examples/CreateOktaManagedUserAccountRequest'
        required: true
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OktaManagedUserAccountResponse'
              examples:
                OktaManagedUserAccountResponse:
                  $ref: '#/components/examples/OktaManagedUserAccountResponse'
        '400':
          $ref: './Common.yaml#/components/responses/ErrorApiValidationFailed400'
        '403':
          $ref: './Common.yaml#/components/responses/ErrorAccessDenied403'
        '404':
          $ref: './Common.yaml#/components/responses/ErrorResourceNotFound404'
        '429':
          $ref: './Common.yaml#/components/responses/ErrorTooManyRequests429'
      security:
        - apiToken: [ ]
        - oauth2:
            - okta.serviceAccounts.okta.manage
      tags:
        - OktaManagedUserAccount
    get:
      summary: List all Okta managed user accounts
      description: |-
        Lists all Okta managed user accounts in your org.
        
        Use the `match` parameter to search for accounts where the account name (`name`) or username (`username`) contains the specified value.
      operationId: listOktaManagedUserAccounts
      parameters:
        - $ref: './Common.yaml#/components/parameters/queryLimit'
        - $ref: './Common.yaml#/components/parameters/queryAfter'
        - $ref: '#/components/parameters/oktaManagedUserMatchQueryFilter'
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/OktaManagedUserAccountResponse'
              examples:
                ListOktaManagedUserAccounts:
                  $ref: '#/components/examples/ListOktaManagedUserAccounts'
        '400':
          $ref: './Common.yaml#/components/responses/ErrorApiValidationFailed400'
        '403':
          $ref: './Common.yaml#/components/responses/ErrorAccessDenied403'
        '429':
          $ref: './Common.yaml#/components/responses/ErrorTooManyRequests429'
      security:
        - apiToken: [ ]
        - oauth2:
            - okta.serviceAccounts.okta.read
      tags:
        - OktaManagedUserAccount
      x-okta-iam-admin-roles:
        - SUPER_ADMIN
    x-okta-team-detail:
      x-team-slack: eng-asa
  /privileged-access/api/v1/okta-service-accounts/{id}:
    parameters:
      - $ref: '#/components/parameters/oktaManagedUserAccountId'
    get:
      summary: Retrieve an Okta managed user account
      description: Retrieves an Okta managed user account specified by ID
      operationId: getOktaManagedUserAccount
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OktaManagedUserAccountResponse'
              examples:
                OktaManagedUserAccountResponse:
                  $ref: '#/components/examples/OktaManagedUserAccountResponse'
        '400':
          $ref: './Common.yaml#/components/responses/ErrorApiValidationFailed400'
        '403':
          $ref: './Common.yaml#/components/responses/ErrorAccessDenied403'
        '404':
          $ref: './Common.yaml#/components/responses/ErrorResourceNotFound404'
        '429':
          $ref: './Common.yaml#/components/responses/ErrorTooManyRequests429'
      security:
        - apiToken: [ ]
        - oauth2:
            - okta.serviceAccounts.okta.read
      tags:
        - OktaManagedUserAccount
      x-okta-iam-admin-roles:
        - SUPER_ADMIN
    patch:
      summary: Update an Okta managed user account
      description: |-
        Updates an existing Okta managed user account specified by ID.
        
        You can only update the `name`, `description`, `ownerUserIds`, and `ownerGroupIds` properties.
      operationId: updateOktaManagedUserAccount
      x-codegen-request-body-name: body
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/OktaManagedUserAccountForUpdate'
            examples:
              UpdateOktaManagedUserAccount:
                $ref: '#/components/examples/UpdateOktaManagedUserAccountRequest'
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OktaManagedUserAccountResponse'
              examples:
                OktaManagedUserAccountResponse:
                  $ref: '#/components/examples/OktaManagedUserAccountResponse'
        '400':
          $ref: './Common.yaml#/components/responses/ErrorApiValidationFailed400'
        '403':
          $ref: './Common.yaml#/components/responses/ErrorAccessDenied403'
        '404':
          $ref: './Common.yaml#/components/responses/ErrorResourceNotFound404'
        '429':
          $ref: './Common.yaml#/components/responses/ErrorTooManyRequests429'
      security:
        - apiToken: [ ]
        - oauth2:
            - okta.serviceAccounts.okta.manage
      tags:
        - OktaManagedUserAccount
      x-okta-iam-admin-roles:
        - SUPER_ADMIN
    delete:
      summary: Delete an Okta managed user account
      description: |-
        Deletes an Okta managed user account specified by ID.
        
        This operation removes the service account management for the Okta user, suspends the underlying Okta user account, 
        but doesn't delete the user from Universal Directory.
      operationId: deleteOktaManagedUserAccount
      responses:
        '204':
          description: No Content
        '400':
          $ref: './Common.yaml#/components/responses/ErrorApiValidationFailed400'
        '403':
          $ref: './Common.yaml#/components/responses/ErrorAccessDenied403'
        '404':
          $ref: './Common.yaml#/components/responses/ErrorResourceNotFound404'
        '429':
          $ref: './Common.yaml#/components/responses/ErrorTooManyRequests429'
      security:
        - apiToken: [ ]
        - oauth2:
            - okta.serviceAccounts.okta.manage
      tags:
        - OktaManagedUserAccount
      x-okta-iam-admin-roles:
        - SUPER_ADMIN

    x-okta-team-detail:
      x-team-slack: eng-asa
components:
  parameters:
    serviceAccountId:
      name: id
      in: path
      description: ID of an existing service account
      required: true
      schema:
        type: string
    oktaManagedUserAccountId:
      name: id
      in: path
      description: ID of an existing Okta managed user account
      required: true
      schema:
        type: string
        format: regex
        pattern: (?i)^[0-9a-f]{8}-[0-9a-f]{4}-[1-5][0-9a-f]{3}-[89ab][0-9a-f]{3}-[0-9a-f]{12}$
        example: a747a818-a4c4-4446-8a87-704216495a08
    matchQueryFilter:
      name: match
      description: Searches for app service accounts where the account name (`name`), username (`username`), app instance label (`containerInstanceName`), or OIN app key name (`containerGlobalName`) contains the given value
      in: query
      required: false
      schema:
        type: string
        minLength: 3
        maxLength: 255
        example: salesforce
    oktaManagedUserMatchQueryFilter:
      name: match
      description: Searches for Okta managed user accounts where the account name (`name`), email (`email`) or username (`username`) contains the given value
      in: query
      required: false
      schema:
        type: string
        minLength: 3
        maxLength: 255
        example: admin
  schemas:
    AppServiceAccount:
      type: object
      required:
        - name
        - containerOrn
        - username
      properties:
        id:
          description: The UUID of the app service account
          format: regex
          pattern: (?i)^[0-9a-f]{8}-[0-9a-f]{4}-[1-5][0-9a-f]{3}-[89ab][0-9a-f]{3}-[0-9a-f]{12}$
          readOnly: true
          type: string
          example: a747a818-a4c4-4446-8a87-704216495a08
        name:
          description: The user-defined name for the app service account
          format: regex
          maxLength: 50
          minLength: 1
          pattern: ^[\w\-_. ]+$
          type: string
          example: salesforce Prod-5 account
        description:
          description: The description of the app service account
          format: regex
          maxLength: 255
          minLength: 0
          type: string
          example: This is for accessing salesforce Prod-5
        username:
          type: string
          description: The username that serves as the direct link to your managed app account. Ensure that this value precisely matches the identifier of the target app account.
          minLength: 1
          maxLength: 100
          example: testuser-salesforce-5@example.com
        password:
          type: string
          writeOnly: true
          description: The app service account password. Required for apps that don't have provisioning enabled or don't support password synchronization.
          format: password
        containerOrn:
          description: |-
            The [ORN](/openapi/okta-management/guides/roles/#okta-resource-name-orn) of the relevant resource.
            
            Use the specific app ORN format (`orn:{partition}:idp:{yourOrgId}:apps:{appType}:{appId}`) to identify an Okta app instance in your org.
          type: string
          example: orn:okta:idp:00o1n8sbwArJ7OQRw406:apps:salesforce:0oa1gjh63g214q0Hq0g4
        containerGlobalName:
          description: The key name of the app in the Okta Integration Network (OIN)
          readOnly: true
          type: string
          example: salesforce
        containerInstanceName:
          description: The app instance label
          readOnly: true
          type: string
          example: salesforce Prod 5
        ownerUserIds:
          description: A list of IDs of the Okta users who own the app service account
          type: array
          items:
            type: string
          minItems: 0
          maxItems: 10
          example: [ '00u11s48P9zGW8yqm0g5' ]
        ownerGroupIds:
          description: A list of IDs of the Okta groups who own the app service account
          type: array
          items:
            type: string
          minItems: 0
          maxItems: 10
          example: [ '00g57qp78yZT2XBA40g7' ]
        status:
          $ref: '#/components/schemas/ServiceAccountStatus'
        statusDetail:
          $ref: '#/components/schemas/ServiceAccountStatusDetail'
        created:
          type: string
          format: date-time
          description: Timestamp when the app service account was created
          readOnly: true
        lastUpdated:
          type: string
          format: date-time
          description: Timestamp when the app service account was last updated
          readOnly: true
    AppServiceAccountForUpdate:
      type: object
      properties:
        name:
          description: The user-defined name for the app service account
          format: regex
          maxLength: 50
          minLength: 1
          pattern: ^[\w\-_. ]+$
          type: string
          example: salesforce Prod-5 account
        description:
          description: The description of the app service account
          format: regex
          maxLength: 255
          minLength: 0
          type: string
          example: This is for accessing salesforce Prod-5
        ownerUserIds:
          description: A list of IDs of the Okta users who own the app service account
          type: array
          items:
            type: string
          minItems: 0
          maxItems: 10
          example: [ '00u11s48P9zGW8yqm0g5' ]
        ownerGroupIds:
          description: A list of IDs of the Okta groups who own the app service account
          type: array
          items:
            type: string
          minItems: 0
          maxItems: 10
          example: [ '00g57qp78yZT2XBA40g7' ]

    OktaManagedUserAccountRequest:
      description: Request body for creating an Okta managed user account
      type: object
      required:
        - name
        - oktaUserId
      properties:
        name:
          description: The user-defined name for the Okta managed user account
          format: regex
          maxLength: 50
          minLength: 1
          pattern: ^[\w\-_. ]+$
          type: string
          example: AD Integrations Admin
        description:
          description: The description of the Okta managed user account
          format: regex
          maxLength: 255
          minLength: 0
          type: string
          example: Shared admin account for managing AD integrations
        oktaUserId:
          description: |-
            The ID of the Okta user to manage as a service account. 
            This must be an existing user in your Okta org.
          type: string
          minLength: 20
          maxLength: 20
          pattern: ^[a-zA-Z0-9]+$
          example: 00u11s48P9zGW8yqm0g5
        ownerUserIds:
          description: A list of IDs of the Okta users who own the Okta managed user account
          type: array
          items:
            type: string
            minLength: 20
            maxLength: 20
          minItems: 0
          maxItems: 10
          example: [ '00u11s48P9zGW8yqm0g5' ]
        ownerGroupIds:
          description: A list of IDs of the Okta groups who own the Okta managed user account
          type: array
          items:
            type: string
            minLength: 20
            maxLength: 20
          minItems: 0
          maxItems: 10
          example: [ '00g57qp78yZT2XBA40g7' ]
    OktaManagedUserAccountResponse:
      description: An Okta managed user account representing a Universal Directory user managed as a service account
      type: object
      required:
        - id
        - name
        - oktaUserId
        - username
        - email
      properties:
        id:
          description: The UUID of the Okta managed user account
          format: regex
          pattern: (?i)^[0-9a-f]{8}-[0-9a-f]{4}-[1-5][0-9a-f]{3}-[89ab][0-9a-f]{3}-[0-9a-f]{12}$
          readOnly: true
          type: string
          example: d1b65a78-21ed-429b-8ea3-eec96f2748d6
        name:
          description: The user-defined name for the Okta managed user account
          format: regex
          maxLength: 50
          minLength: 1
          pattern: ^[\w\-_. ]+$
          type: string
          example: AD Integrations Admin
        description:
          description: The description of the Okta managed user account
          format: regex
          maxLength: 255
          minLength: 0
          type: string
          example: Shared admin account for managing AD integrations
        oktaUserId:
          description: The ID of the Okta user being managed as a service account
          type: string
          minLength: 20
          maxLength: 20
          example: 00u11s48P9zGW8yqm0g5
        username:
          description: |-
            The username associated with the Okta user. This parameter is read-only, and it is derived from the Okta user profile.
          type: string
          readOnly: true
