        email:
          description: |-
            The email address associated with the Okta user. This parameter is read-only, and it is derived from the Okta user profile.
          type: string
          example: foo@bar.com
          readOnly: true
        ownerUserIds:
          description: A list of IDs of the Okta users who own the Okta managed user account
          type: array
          items:
            type: string
          minItems: 0
          maxItems: 10
          example: [ '00u11s48P9zGW8yqm0g5' ]
        ownerGroupIds:
          description: A list of IDs of the Okta groups who own the Okta managed user account
          type: array
          items:
            type: string
          minItems: 0
          maxItems: 10
          example: [ '00g57qp78yZT2XBA40g7' ]
