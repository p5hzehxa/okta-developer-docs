openapi: 3.0.3
info:
  title: Group Push Mappings API
  version: 1.0.0
servers:
  - url: https://example.okta.com
tags:
  $ref: ../base.yaml#/tags
paths:
  /api/v1/apps/{appId}/group-push/mappings:
    parameters:
      - $ref: './Common.yaml#/components/parameters/pathAppId'
    get:
      summary: List all group push mappings
      description: Lists all group push mappings with pagination support
      operationId: listGroupPushMappings
      x-okta-lifecycle:
        features:
          - GROUP_PUSH_MAPPINGS_PUBLIC_API
      parameters:
        - name: after
          description: Specifies the pagination cursor for the next page of mappings
          in: query
          schema:
            type: string
        - name: limit
          in: query
          description: Specifies the number of results returned
          schema:
            type: integer
            format: int32
            default: 100
            maximum: 1000
            minimum: 1
        - name: lastUpdated
          description: |-
            Filters group push mappings by last updated date. The `lastUpdated` parameter supports the following format: `YYYY-MM-DDTHH:mm:ssZ`. This filters mappings updated on or after the specified date and time in UTC.
            
            If you don't specify a value, all group push mappings are returned.
          in: query
          schema:
            type: string
            example: '2025-01-01T00:00:00Z'
        - name: sourceGroupId
          description: |-
            Filters group push mappings by source group ID. If you don't specify a value, all group push mappings are returned.
          in: query
          schema:
            type: string
            example: '00g00000000000000000'
        - name: status
          description: |-
            Filters group push mappings by status. If you don't specify a value, all group push mappings are returned.
          in: query
          schema:
            $ref: '#/components/schemas/GroupPushMappingStatus'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/GroupPushMapping'
              examples:
                List group push mappings:
                  $ref: '#/components/examples/ListGroupPushMappingsResponse_Example'
                List group push mappings with active filter:
                  $ref: '#/components/examples/ListGroupPushMappingsResponse_ExampleWithActiveFilter'
        '401':
          $ref: ./Common.yaml#/components/responses/ErrorInvalidToken401
        '403':
          $ref: ./Common.yaml#/components/responses/ErrorAccessDenied403
        '429':
          $ref: ./Common.yaml#/components/responses/ErrorTooManyRequests429
      security:
        - apiToken: [ ]
        - oauth2:
            - okta.apps.read
            - okta.groups.read
      tags:
        - GroupPushMapping
    post:
      summary: Create a group push mapping
      description: |-
        Creates or links a group push mapping.
        
        **Note:** Either `targetGroupId` or `targetGroupName` must be provided, but not both. If `targetGroupId` is provided, it links to an existing group. If `targetGroupName` is provided, it creates a new group.
      operationId: createGroupPushMapping
      x-codegen-request-body-name: body
      x-okta-lifecycle:
        features:
          - GROUP_PUSH_MAPPINGS_PUBLIC_API
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateGroupPushMappingRequest'
            examples:
              Create group push mapping (create new group):
                $ref: '#/components/examples/CreateGroupPushMappingRequest_ExampleCreate'
              Create group push mapping (Active Directory):
                $ref: '#/components/examples/CreateGroupPushMappingRequest_ExampleCreate_ActiveDirectory'
              Create group push mapping (link existing group):
                $ref: '#/components/examples/CreateGroupPushMappingRequest_ExampleLink'
        required: true
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GroupPushMapping'
              examples:
                Create group push mapping:
                  $ref: '#/components/examples/CreateGroupPushMappingResponse_ExampleCreate'
                Create group push mapping (Active Directory):
                  $ref: '#/components/examples/CreateGroupPushMappingResponse_ExampleCreate_ActiveDirectory'
                Create group push mapping (link existing group):
                  $ref: '#/components/examples/CreateGroupPushMappingResponse_ExampleLink'
        '400':
          $ref: ./Common.yaml#/components/responses/ErrorApiValidationFailed400
        '401':
          $ref: ./Common.yaml#/components/responses/ErrorInvalidToken401
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: ./Common.yaml#/components/schemas/Error
              examples:
                Access Denied:
                  $ref: ./Common.yaml#/components/examples/ErrorAccessDenied
        '429':
          $ref: ./Common.yaml#/components/responses/ErrorTooManyRequests429
      security:
        - apiToken: [ ]
        - oauth2:
            - okta.apps.manage
            - okta.groups.manage
      tags:
        - GroupPushMapping
  /api/v1/apps/{appId}/group-push/mappings/{mappingId}:
    parameters:
      - $ref: './Common.yaml#/components/parameters/pathAppId'
      - $ref: '#/components/parameters/pathGroupPushMappingId'
    delete:
      summary: Delete a group push mapping
      description: Deletes a specific group push mapping. The group push mapping must be in an `INACTIVE` state.
      operationId: deleteGroupPushMapping
      x-okta-lifecycle:
        features:
          - GROUP_PUSH_MAPPINGS_PUBLIC_API
      parameters:
        - in: query
          name: deleteTargetGroup
          description: If set to `true`, the target group is also deleted. If set to `false`, the target group isn't deleted.
          required: true
          schema:
            type: boolean
            default: false
      responses:
        '204':
          description: No Content
        '401':
          $ref: ./Common.yaml#/components/responses/ErrorInvalidToken401
        '403':
          description: Forbidden
          headers: { }
          content:
            application/json:
              schema:
                $ref: ./Common.yaml#/components/schemas/Error
              examples:
                Access Denied:
                  $ref: ./Common.yaml#/components/examples/ErrorAccessDenied
        '404':
          $ref: ./Common.yaml#/components/responses/ErrorResourceNotFound404
        '429':
          $ref: ./Common.yaml#/components/responses/ErrorTooManyRequests429
      security:
        - apiToken: [ ]
        - oauth2:
            - okta.apps.manage
            - okta.groups.manage
      tags:
        - GroupPushMapping
    get:
      summary: Retrieve a group push mapping
      description: Retrieves a group push mapping by ID
      operationId: getGroupPushMapping
      x-okta-lifecycle:
        features:
          - GROUP_PUSH_MAPPINGS_PUBLIC_API
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GroupPushMapping'
              examples:
                Retrieve group push mapping:
                  $ref: '#/components/examples/RetrieveGroupPushMappingResponse_Example'
                Retrieve group push mapping (Active Directory):
                  $ref: '#/components/examples/RetrieveGroupPushMappingResponse_Example_ActiveDirectory'
        '401':
          $ref: ./Common.yaml#/components/responses/ErrorInvalidToken401
        '403':
          $ref: ./Common.yaml#/components/responses/ErrorAccessDenied403
        '404':
          $ref: ./Common.yaml#/components/responses/ErrorResourceNotFound404
        '429':
          $ref: ./Common.yaml#/components/responses/ErrorTooManyRequests429
      security:
        - apiToken: [ ]
        - oauth2:
            - okta.apps.read
            - okta.groups.read
      tags:
        - GroupPushMapping
    patch:
      summary: Update a group push mapping
      description: Updates the status of a group push mapping
      operationId: updateGroupPushMapping
      x-codegen-request-body-name: body
      x-okta-lifecycle:
        features:
          - GROUP_PUSH_MAPPINGS_PUBLIC_API
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateGroupPushMappingRequest'
            examples:
              Update group push mapping:
                $ref: '#/components/examples/UpdateGroupPushMappingRequest_Example'
        required: true
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GroupPushMapping'
              examples:
                Update group push mapping:
                  $ref: '#/components/examples/UpdateGroupPushMappingResponse_Example'
        '400':
          $ref: ./Common.yaml#/components/responses/ErrorApiValidationFailed400
        '401':
          $ref: ./Common.yaml#/components/responses/ErrorInvalidToken401
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: ./Common.yaml#/components/schemas/Error
              examples:
                Access Denied:
                  $ref: ./Common.yaml#/components/examples/ErrorAccessDenied
        '404':
          $ref: ./Common.yaml#/components/responses/ErrorResourceNotFound404
        '429':
          $ref: ./Common.yaml#/components/responses/ErrorTooManyRequests429
      security:
        - apiToken: [ ]
        - oauth2:
            - okta.apps.manage
            - okta.groups.manage
      tags:
        - GroupPushMapping
components:
  parameters:
    pathGroupPushMappingId:
      name: mappingId
      description: Group push mapping ID
      in: path
      required: true
      schema:
        type: string
        example: gPm00000000000000000
  examples:
    CreateGroupPushMappingRequest_ExampleCreate:
      value:
        sourceGroupId: '00g00000000000000000'
        status: ACTIVE
        targetGroupName: 'NewGroup'
    CreateGroupPushMappingRequest_ExampleCreate_ActiveDirectory:
